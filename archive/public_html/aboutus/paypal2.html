<p style="text-align=center">Donate to St Nicholas Orthodox Church</p>

<p>
<!-- BEGIN:PayPal -->
<!-- Start of Form -->
<form target="_self" action="https://www.paypal.com/cgi-bin/webscr" method="post">
<!-- If using a Business or Company Logo Graphic, include the "cpp_header_image" variable. -->
<input type="hidden" name="cpp_header_image" value="https://www.orthodox.net//church_rus.gif">
<input type="hidden" name="cmd" value="_donations">
<!-- Replace "business" value with your PayPal Email Address or your Merchant Account ID -->
<input type="hidden" name="business" value="treasurer@orthodox.net">
<input type="hidden" name="item_name">
<input type="hidden" name="item_number" value="WF-1001">
<input type="hidden" name="tax" value="0">
<input type="hidden" name="no_shipping" value="2">
<input type="hidden" name="lc" value="US">
<input type="hidden" name="currency_code" value="USD">
<!-- Replace value with the web page you want the customer to return to after a successful transaction -->
<input type="hidden" name="return" value="http://www.yourwebsite.com/ThankYou.html">
<!-- Replace value with the web page you want the customer to return to after item cancellation -->
<input type="hidden" name="cancel_return" value="http://www.yourwebsite.com/Cancel.html">
<input type="hidden" name="bn" value="PP-DonationsBF:btn_donateCC_LG.gif:NonHosted">
<input type="hidden" name="button_subtype" value="products">
<input type="hidden" name="no_note" value="0">
<input type="hidden" name="cn" value="Add special instructions to the church treasurer:">

<p style="text-align:center"><b>One-time donation:</b></p>
<!-- -->
Please enter your donation amount: (Example - 10.00)
<input type="text" name="amount" size="5">
<br><br>
Which Fund do you wish to contribute to?:&nbsp;&nbsp;
<select name="item_name">
<option value="St. Nicholas General Fund" selected>General Fund</option>
<option value="St. Nicholas Mortgage Debt Reduction">Debt Reduction</option>
<option value="St. Nicholas Building Fund">Building Fund</option>
<option value="St. Joseph the All-Comely Prison Ministry">Prison Ministry</option>
</select>
