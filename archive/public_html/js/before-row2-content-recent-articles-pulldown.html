<option value="https://www.orthodox.net//sermons/great-lent-sunday-02_2011-03-11+saint-gregory-palamas-i-am-the-door-by-me-if-any-man-enter-in-he-shall-be-saved-and-shall-go-in-and-out-and-find-pasture_john10-9-16.mp3#This is an important discussion, too wonderful to believe for most Christians, but absolutely true, and the main teaching of St Gregory Palamas: To be Christian is to become perfect. The Gospel for St. Gregory teaches this in a hidden way, when it says: &quot;I am the door: by me if any man enter in, he shall be saved, and shall go in and out, and find pasture&quot;. Let us look in wonder at his teaching, the Gospel John 10:9-16, and the Matins Theotokion: &quot;Adam&#39;s nature was made Godlike O Virgin, when without undergoing change, God took flesh within thy womb, and we who were deceived of old by the hope of becoming Gods, have been set free from the ancient condemnation&quot;, and how we are to pursue perfection."><font size=-1>2011-03-11 2nd Sunday of Great Lent (mp3 format)</font></option>

<option value="https://www.orthodox.net//sermons/great-lent-sunday-02_2011-03-20+personalizing-the-prodigal-son+adams-nature-was-made-godlike_matins.mp3#In an ongoing series of commentary on the service texts between Vespers and Matins at the vigil, we look at the Parable of the prodigal son, which the church explores in a very personal way throughout all of Great Lent. So should we look at this parable in a very personal way, and especially the canon at matins gives us an example of how to do this, such as: &quot;I fed on dark and swinish thoughts when, like the Prodigal, I left Thee, O Savior, and went into a far country; but now I cry: I have sinned; save me, for fervently I run for refuge to Thy tender mercy. (Second Sunday of Great Lent, Matins, Ode 3)&quot;. We discuss what sin REALLY is - it is not just things we do or do not do, and it almost always is a product of our thoughts, attitudes, disposition. We also explore the beautiful, intricate and dogmatic theology in one of the theotokia of the matins canon: &quot; Adams nature was made godlike, O Virgin, when without undergoing change God took flesh within thy womb; and we who were deceived of old by the hope of  becoming gods, have been set free from the ancient condemnation&quot; (Second Sunday of Great Lent, Theotokion, Matins, Ode 3)"><font size=-1>2011-03-20 2nd Sunday of Great Lent (mp3 format)</font></option>

<option value="https://www.orthodox.net//sermons/great-lent-sunday-02_2013-03-31+healing-of-the-paralytic-borne-of-four+what-is-the-press-and-how-do-we-fight-it_mark2-1-12.mp3#In the healing of the paralytic borne of four, the helpers of the paralytic could not reach Jesus because of the press (the crowd), and with great effort and ingenuity, found a way to present their friend before Jesus by making a hole in the roof. The &quot;press&quot; has deep theological meaning. It can be described by several words starting with &quot;P&quot;: PASSIONS, PRIORITIES, PEOPLE, our PAST  and PATTERNS in our life. We look at each of these, with much practical advice about defeating them."><font size=-1>2013-03-31 The healing of the paralytic borne of four; what is the press and how do we defeat it?  (mp3 format)</font></option>

<!--original title:2012-03-18 What is the way of the cross, and what does the Lord mean when He tells us to deny ourselves? What are the answers to the questions? (mp3 format)-->
