<h1>The meeting</h1>


<a name='Wednesday,_February_14/27_2001
'></a> <!--GOOSE 817-->

<h2>Wednesday, February 14/27 2001</h2>
<!-- END:Row1Col3Text -->

<!-- BEGIN:Row2Col3Text -->
<p>
It's Wednesday afternoon;
<BR>I am going to a meeting.
<BR>I am planning in secret,
<BR>arranging an exchange,
<BR>commodities for commodities,
<BR>souls for souls.
<BR>No money will be exchanged;
<BR>I am not a Judas,
<BR><i>but</i> I am thinking of him.

<!-- END:Row2Col3Text -->
