	<HEAD>
	Explanation of Scripture read by Orthodox Christians on the 7th Sunday of Pascha
	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR>These words spake Jesus, and lifted up his eyes to heaven, and said, Father,the hour is come; glorify thy Son, that<BR>thy Son also may glorify thee:<BR><P><BR>What is Jesus teaching by example here? There are at least two things. Note His posture and the context of his prayer \(what He says to the disciples before it\). <BR><BR>';

<!-- Question 1 -->
q[1]='<BR>Why did Jesus pray aloud? <BR><BR>';

<!-- Question 2 -->
q[2]='<BR>What does Jesus mean by "the hour has come"? <BR> <BR>';

<!-- Question 3 -->
q[3]='<BR>Generally, we a person receives glory from someone superior to himself, such as a child being praised by his parents, or a worker being commended by his boss, or we, who are servants of God, being blessed by God. Therefore, taken out of context, Jesus request to the Father, "glorify thy son", may be taken to be a sign of His inferiority to the Father, as indeed, the wicked heresy of Arianism teaches. Why does Jesus request imply no inferiority on His part? <BR><BR>';

<!-- Question 4 -->
q[4]='<BR>"<span class=n>{2}</span> As thou hast given him power over all flesh, that he should give eternal life to as many as thou hast given him. "<BR><P><BR>What does He mean by "All flesh"? <BR><BR>';

<!-- Question 5 -->
q[5]='<BR>"<span class=n>{3}</span> And this is life eternal, that they might know thee the only true God, and Jesus Christ, whom thou hast sent. "<BR><P><BR>How do Jesus words contradict Arianism? Of course, one must first understand what Arianism is. Define it in one sentence, then give your answer. <BR>';


	<!-- Answer   0 -->
a[0]='   After having said, In the world you shall have tribulation, our Lord turns from admonition to prayer; thus teaching us in our tribulations to abandon all other things, and flee to God.  <BR>St John Chrysostom  <P> He lifted up His eyes to heaven to teach us intentness in our prayers: that we should stand with uplifted eyes, not of the body only, but of the mind.  <BR>St John Chrysostom <BR>';

<!-- Answer   1 -->
a[1]='<BR>Our Lord, in the form of a servant, could have prayed in silence had He pleased; but He remembered that He had not only to pray, but to teach. For not only His discourse, but His prayer also, was for His disciples\' edification, yes and for ours who read the same. <BR>Blessed Augustine. <BR>';

<!-- Answer   2 -->
a[2]=' Our Lord, in the form of a servant, could have prayed in silence had He pleased; but He remembered that He had not only to pray, but to teach. For not only His discourse, but His prayer also, was for His disciples\' edification, yes and for ours who read the same.  <BR>St Hilary of Potiers<BR>';

<!-- Answer   3 -->
a[3]=' Our Lord did not only ask to be glorified by the Father, but He in turn promised to glorify him. How can an inferior glorify his superior?  <P> But perhaps this proves weakness in the Son; His waiting to be glorified by one superior to Himself. And who does not confess that the Father is superior, seeing that He Himself said, The Father is greater than I? But beware lest the honor of the Father impair the glory of the Son. It follows: That Your Son also may glorify You. So then the Son is not weak, inasmuch as He gives back in His turn glory for the glory which He receives. This petition for glory to be given and repaid, shows the same divinity to be in both.  <BR>St Hilary of Potiers<BR>';

<!-- Answer   4 -->
a[4]=' All flesh refers to mankind. <BR>';

<!-- Answer   5 -->
a[5]=' The heresy of Arianism postulates that Jesus Christ was the highest CREATURE, and therefore, He was not of one essence with the Father.  <P> Since Jesus defines eternal life as the knowledge of the Father AND Himself, it is clear that He  a part of the Godhead, in no way inferior to the Father.  <P> "The Arians hold, that as the Father is the only true, only just, only wise God, the Son has no communion of these attributes; for that which is proper to one, cannot be partaken of by another. And as these are as they think in the Father alone, and not in the Son, they necessarily consider the Son a false and vain God. " <BR>St Hilary of Potiers <P> "And in what eternal life is, He then shows: And this is life eternal, that they might know You, the only true God. To know the only true God is life, but this alone does not constitute life. What else then is added? And Jesus Christ whom thou hast sent." <BR>St Hilary of Potiers<BR>';
