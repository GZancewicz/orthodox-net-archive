	<SCRIPT>
	var q = new Object();

	<!-- Question 0 -->
q[0]='<BR>12 And Jesus went into the temple of God, and cast out all them that sold and bought in the temple, and overthrew the tables of the moneychangers, and the seats of them that sold doves,<span class=n>{13}</span> And said unto them, It is written, My house shall be called the house of prayer; but ye have made it a den of thieves. <BR><P><BR>How many times did Jesus do this \(occurrences\)? <BR>How were they spaced in time?<BR>Describe other occurrences, and compare with this one. <BR><BR>';

<!-- Question 1 -->
q[1]='<BR><i>"It is written, My house shall be called the house of prayer; but ye have made it a den of thieves. "</i><BR><P><BR>Where is this written?<BR>';

<!-- Question 2 -->
q[2]='<BR>Why did he call the money changers and sellers a "den of thieves"?<BR>';

<!-- Question 3 -->
q[3]='<BR><QUOTE" <span class=n>{15}</span> And when the chief priests and scribes saw the wonderful things that he did, and the children crying in the temple, and saying, Hosanna to the son of David; they were sore displeased..."</i><BR><P><BR>Why were the chief priests and scribes displeased?<BR>';

<!-- Question 4 -->
q[4]='<BR>Why is Jesus called the "Son of David". What were the implications of this appellation to the Jewish people? What does "Hosanna" mean? <BR>';

<!-- Question 5 -->
q[5]='<BR><i>"16 And said unto him, Hearest thou what these say? And Jesus saith unto them, Yea; have ye never read, Out of the mouth of babes and sucklings thou hast perfected praise? "</i><BR><P><BR>Where is this written? <BR>';

<!-- Question 7 -->
q[7]='<BR><i>"18 Now in the morning as he returned into the city, he hungered.<span class=n>{19}</span> And when he saw a fig tree in the way, he came to it, and found nothing thereon, but leaves only, and said unto it, Let no fruit grow on thee henceforward for ever. And presently the fig tree withered away." </i><BR><P><BR>What does the fig tree represent? What is the teaching of the miracle? Recall a parable about the fig tree. <BR><BR>';

	<!-- Answer   0 -->
a[0]=' Jesus also cast out the moneychangers very early in Him ministry, after His first miracle: <P> <i>"11 This beginning of miracles did Jesus in Cana of Galilee, and manifested forth his glory; and his disciples believed on him.<span class=n>{12}</span> After this he went down to Capernaum, he, and his mother, and his brethren, and his disciples: and they continued there not many days.<span class=n>{13}</span> And the Jews\' passover was at hand, and Jesus went up to Jerusalem.<span class=n>{14}</span> And found in the temple those that sold oxen and sheep and doves, and the changers of money sitting:<span class=n>{15}</span> And when he had made a scourge of small cords, he drove them all out of the temple, and the sheep, and the oxen; and poured out the changers\' money, and overthrew the tables;<span class=n>{16}</span> And said unto them that sold doves, Take these things hence; make not my Father\'s house an house of merchandise.<span class=n>{17}</span> And his disciples remembered that it was written, The zeal of thine house hath eaten me up. "</i> <SPAN class=n>\(John 2:11-17\)</SPAN> <P> The present occurrence we are studying occurred very late in His ministry. His response was much more harsh, as the Jews had learned little in three years, and still did not obey Him, therefore, He calls them "thieves".<BR>';

<!-- Answer   1 -->
a[1]=' <i>" Even them will I bring to my holy mountain, and make them joyful in my house of prayer: their burnt offerings and their sacrifices shall be accepted upon mine altar; for mine house shall be called an house of prayer for all people. "</i> <SPAN class=n>\(Isaiah 56:8\)</SPAN><BR>';

<!-- Answer   2 -->
a[2]=' This is the fulfillment of a prophesy in Jeremiah:  <i>"<span class=n>{1}</span> The word that came to Jeremiah from the LORD, saying,<span class=n>{2}</span> Stand in the gate of the LORD\'s house, and proclaim there this word, and say, Hear the word of the LORD, all ye of Judah, that enter in at these gates to worship the LORD.<span class=n>{3}</span> Thus saith the LORD of hosts, the God of Israel, Amend your ways and your doings, and I will cause you to dwell in this place.<span class=n>{4}</span> Trust ye not in lying words, saying, The temple of the LORD, The temple of the LORD, The temple of the LORD, are these.<span class=n>{5}</span> For if ye throughly amend your ways and your doings; if ye throughly execute judgment between a man and his neighbour;<span class=n>{6}</span> If ye oppress not the stranger, the fatherless, and the widow, and shed not innocent blood in this place, neither walk after other gods to your hurt:<span class=n>{7}</span> Then will I cause you to dwell in this place, in the land that I gave to your fathers, for ever and ever.<span class=n>{8}</span> Behold, ye trust in lying words, that cannot profit.<span class=n>{9}</span> Will ye steal, murder, and commit adultery, and swear ! falsely, and burn incense unto Baal, and walk after other gods whom ye know not;<span class=n>{10}</span> And come and stand before me in this house, which is called by my name, and say, We are delivered to do all these abominations?<span class=n>{11}</span> <STRONG>Is this house, which is called by my name, become a den of robbers in your eyes?</STRONG> Behold, even I have seen it, saith the LORD. "</i> <SPAN class=n>\(Jeremiah 7:1-11\)</SPAN> <P> A "den of thieves" is a proverbial expression, indicating wicked and unprincipled men. <BR>';

<!-- Answer   3 -->
a[3]=' Jealousy. They saw Jesus as a threat to their position and way of life. "Is thine eye evil because I am good"? <BR>';

<!-- Answer   4 -->
a[4]=' The Jews knew that the Messiah had been prophesied to be of the line of David the King. The appellation "Son of David" was another name for the Messiah. Hosanna means "Save now, we beseech thee". <BR>';

<!-- Answer   5 -->
a[5]=' <i>"Out of the mouth of babes and sucklings hast thou ordained strength because of thine enemies, that thou mightest still the enemy and the avenger. "</i> <SPAN class=n>\(Psalms 8:2\)</SPAN><BR>';

<!-- Answer   6 -->
a[6]=' Jesus\' good friend Lazarus \(who he raised form the dead after four days\), and Martha and Mary lived in Bethany, and He stayed with them when He was there. <BR>';

<!-- Answer   7 -->
a[7]=' The fig tree represents the Jews, or rather, those who would remain obdurate in their religion, and reject the Messiah.  <P> "He withers the tree, then, in order to chasten men. The disciples marvel, and with good reason. For the fig tree contains a great amount of sap, and so the fact that it withered immediately serves all  the more to indicate the miracle. The fig tree means the synagogue of the Jews, which has only leaves, that is, the visible letter of the law, but not the fruit of the Spirit. But also every man who gives himself over to the sweetness of the present life is likened to a fig tree, who has no spiritual fruit to give to Jesus who is hungry for such fruit, but only leaves, that is, temporal appearances which fall away and are gone. This man, then, hears himself cursed. For Christ says, Go, ye accursed, into the fire. But he is also dried up; for as he roasts in the flame, his tongue is parched and withered like that of the rich man of the parable, who in his life had ignored Lazarus." <SPAN class=n>Blessed Theophylact, Commentary on Matthew\)</SPAN><BR>';

<!-- Answer   8 -->
a[8]=' The Evangelist indefinitely said "Presently" the fig tree withered away. From St Marks\'s account, we can see that it was withered the next day:  <P> <i>"11 And Jesus entered into Jerusalem, and into the temple: and when he had looked round about upon all things, and now the eventide was come, he went out unto Bethany with the twelve.  12 And on the morrow, when they were come from Bethany, he was hungry:<span class=n>{13}</span> And seeing a fig tree afar off having leaves, he came, if haply he might find any thing thereon: and when he came to it, he found nothing but leaves; for the time of figs was not yet.<span class=n>{14}</span> And Jesus answered and said unto it, No man eat fruit of thee hereafter for ever. And his disciples heard it.<span class=n>{15}</span> And they come to Jerusalem: and Jesus went into the temple, and began to cast out them that sold and bought in the temple, and overthrew the tables of the moneychangers, and the seats of them that sold doves;<span class=n>{16}</span> And would not suffer that any man should carry any vessel through the temple. <span class=n>{17}</span> And he taught, saying unto them, Is it not written, My house shall be called of all nations the house of prayer? but ye have made it a den of thieves.<span class=n>{18}</span> And the scribes and chief priests heard it, and sought how they might destroy him: for they feared him, because all the people was astonished at his doctrine.<span class=n>{19}</span> And when even was come, he went out of the city.<span class=n>{20}</span> <STRONG>And in the morning, as they passed by, they saw the fig tree dried up from the roots.</STRONG>"</i> <SPAN class=n>\(Mark 11:11-20\)</SPAN><BR>';

<!-- Answer   9 -->
a[9]=' "21 And Peter calling to remembrance saith unto him, Master, behold, the fig tree which thou cursedst is withered away. <span class=n>{22}</span> And Jesus answering saith unto them, Have faith in God. <span class=n>{23}</span> For verily I say unto you, That whosoever shall say unto this mountain, Be thou removed, and be thou cast into the sea; and shall not doubt in his heart, but shall believe that those things which he saith shall come to pass; he shall have whatsoever he saith. <span class=n>{24}</span> Therefore I say unto you, What things soever ye desire, when ye pray, believe that ye receive them, and ye shall have them. <span class=n>{25}</span> And when ye stand praying, forgive, if ye have ought against any: that your Father also which is in heaven may forgive you your trespasses. <span class=n>{26}</span> But if ye do not forgive, neither will your Father which is in heaven forgive your trespasses." <SPAN class=n>\(Mark 11:21-26\)</SPAN><BR> ';
