	<!-- Answer   0 -->

<!-- Answer   1 -->
a[1]=' Love is perfect and fulfills all things, so that is over-rids that which is imperfect and incomplete. <BR>';

<!-- Answer   2 -->
a[2]=' The childhood is spiritual childhood, before we know of God. As God enlightens us, we grow into a man spiritually and put off our childish ways of thinking. <BR>';

<!-- Answer   3 -->
a[3]=' To see through a mirror darkly means to try to see through a soul that is murky with sins, but when we see face to face, it is like seeing through a pure soul enlightened by God. <BR>';

a[4]=' Prayer<BR>';

<!-- Answer   5 -->
a[5]=' His first miracle was to change the water into wine at the wedding in Cana, and we was hesitant to do it as, as he said, his "hour has not yet come"; it was not yet time for his ministry and to be revealed. <BR>';

a[6]=' He cast them out because it\'s unclean and a defilement of the temple to do such things in the temple. "do not make my Father\'s house a den of thieves." <BR>';

a[7]=' The householder is God, and the laborers are those in the Church who struggle for God. <BR>';

<!-- Answer   8 -->
a[8]=' God will reward us for our struggles, not differentiating whether we have struggled all our life, or if we have just entered the Church and begun our struggle a short time ago. <BR>';
