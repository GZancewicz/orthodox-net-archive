	<HTML>
	<HEAD>
	<TITLE>Explanation of Scripture read by Orthodox Christians on the 10th Friday after Pentecost 2 Corinthians 1:12-20 Matthew 22:23-33

</TITLE>

	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR><STRONG>"The same day came to him the Sadducees, which say that there is no resurrection, and asked him ..."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Mat 22:23\)</FONT><BR><P><BR>What had happened previously on that day? <BR>';

<!-- Question 1 -->
q[1]='<BR>Describe the two sects of the Jews, the Pharisees and Sadducees.<BR>';

<!-- Question 2 -->
q[2]='<BR><STRONG>"Master, Moses said, If a man die, having no children, his brother shall marry his wife, and raise up seed unto his brother."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Vs 24\)</FONT><BR><P><BR>Describe the custom mentioned, and the reasons for it. <BR>';

<!-- Question 3 -->
q[3]='<BR><STRONG>"For in the resurrection they neither marry, nor are given in marriage, but are as the angels of God in heaven."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Matthew 22:30\)</FONT><BR><P><BR>How are the blessed like the angels in heaven? <BR>';

<!-- Question 4 -->
q[4]='<BR><STRONG>"But as touching the resurrection of the dead, have ye not read that which was spoken unto you by God, saying, {32} I am the God of Abraham, and the God of Isaac, and the God of Jacob? God is not the God of the dead, but of the living."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Vs. 31\)</FONT><BR><P><BR>What is Jesus quoting? <BR>';

<!-- Question 5 -->
q[5]='<BR><STRONG>"But as touching the resurrection of the dead, have ye not read that which was spoken unto you by God, saying, {32} I am the God of Abraham, and the God of Isaac, and the God of Jacob? God is not the God of the dead, but of the living."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Vs. 31,32\)</FONT><BR><P><BR>Jesus\' retort to the Sadducees is somewhat ambiguous, and clearer evidences of the teaching of the resurrection exist in the Old Testament. Why did He choose these? <BR><BR>';

<!-- Question 6 -->
q[6]='<BR>In another place it says: <BR><STRONG>"For to this end Christ both died, and rose, and revived, that he might be Lord both of the dead and living."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Rom 14:9\)</FONT><BR><P><BR>Reconcile this with:<BR><STRONG>"But as touching the resurrection of the dead, have ye not read that which was spoken unto you by God, saying, {32} I am the God of Abraham, and the God of Isaac, and the God of Jacob? God is not the God of the dead, but of the living."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Vs. 31,32\)</FONT><BR><BR>';


	<!-- Answer   0 -->
a[0]=' <I>"The disciples of the Pharisees with the Herodians being thus confuted, the Sadducees next offer themselves, whereas the overthrow of those before them ought to have kept them back. But presumption is shameless, stubborn, and ready to attempt things impossible. So the Evangelist, wondering at their folly, expresses this, saying, The same day came to him the Sadducees."</I> <FONT SIZE="-2" FACE="Arial">\(St John Chrysostom\)</FONT><BR>';

<!-- Answer   1 -->
a[1]=' <I>"There were two sects among the Jews, the Pharisees and the Sadducees; the Pharisees pretended to the righteousness of traditions and observances, whence they were called by the people \'separate\'. The Sadducees \(the word is interpreted \'righteous\'\) also passed themselves for what they were not; and whereas the first believed the resurrection of body and soul, and confessed both Angel and spirit, these, according to the Acts of the Apostles, denied them all, as it is here also said, Who say that there is no resurrection."</I> <FONT SIZE="-2" FACE="Arial">\(St Jerome\)</FONT><BR>';

<!-- Answer   2 -->
a[2]=' <I>"For because death to the Jews, who did all things for the present life, seemed an unmixed evil, Moses ordered that the wife of one who died without sons should be given to his brother, that a son might be born to the dead man by his brother, and his name should not perish, which was some alleviation of death. And none other but a brother or relation was commanded to take the wife of the dead; otherwise the child born would not have been considered the son of the dead; and also because a stranger could have no concern in establishing the house of him that was dead, as a brother whose kindred obliged him thereto. "</I> <FONT SIZE="-2" FACE="Arial">\(St. John Chrysostom\)</FONT><BR>';

<!-- Answer   3 -->
a[3]=' <I>"For then when we shall be incorruptible and immortal, by the visible presence of God Himself we shall be filled with most chaste contemplations, and shall share the gift of light to the understanding in our impassible and immaterial soul after the fashion of the exalted souls in heaven; on which account it is said that we shall be equal to the Angels."</I> <FONT SIZE="-2" FACE="Arial">\(St Dionysios\)</FONT><BR>';

<!-- Answer   4 -->
a[4]=' <STRONG>"Moreover he said, I am the God of thy father, the God of Abraham, the God of Isaac, and the God of Jacob. And Moses hid his face; for he was afraid to look upon God."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Exodus 3:6\)</FONT><BR>';

<!-- Answer   5 -->
a[5]=' <I>"In proof of the resurrection there were many plainer passages which He might have cited; among others that of Isaiah, The dead shall be raised; they that are in the tombs shall rise again: and in another place, Many of them that sleep in the dust of the earth shall awake. It is inquired therefore why the Lord should have chosen this testimony which seems ambiguous, and not sufficiently belonging to the truth of the resurrection; and as if by this He had proved the point adds, He is not the God of the dead, but of the living. We have said above that the Sadducees confessed neither Angel, nor spirit, nor resurrection of the body, and taught also the death of the soul. But they also received only the five books of Moses, rejecting the Prophets. It would have been foolish therefore to have brought forward testimonies whose authority they did not admit. To prove the immortality of souls therefore, He brings forward an instance out of Moses, I am the God of Abraham, &c. and then straight subjoins, He is not the God of the dead, but of the living; so that having established that souls abide after death, \(forasmuch as God could not be the God of those who had no existence any where,\) there might fitly come in the resurrection of bodies which had together with their souls done good or evil"</I> <FONT SIZE="-2" FACE="Arial">\(St Jerome\)</FONT><BR>';

<!-- Answer   6 -->
a[6]=' Blessed Theophylact explains that St Paul is referring to those who have dies, but will live again. in other words, the dead in Christ.<BR>';
