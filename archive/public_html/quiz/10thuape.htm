	<!-- Question 0 -->
q[0]='<BR><STRONG>"Jesus saith unto them, Did ye never read in the scriptures, The<BR>stone which the builders rejected, the same is become the head of the<BR>corner: this is the Lord\'s doing, and it is marvellous in our eyes?"</STRONG> <FONT SIZE="-2" FACE="Arial">\(Matthew 21:43\)</FONT><BR><P><BR>Where would they have read this?<BR><BR>';

<!-- Question 1 -->
q[1]='<BR><STRONG>"The stone which the builders refused is become the head stone of the corner. {23} This is the LORD\'S doing; it is marvellous in our eyes."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Psalms 117:22-23\) </FONT><BR><P><BR>We read this verse very often, almost every day of the year. In which service? <BR><BR>';

<!-- Question 2 -->
q[2]='<BR>What is the stone?<BR>';

<!-- Question 3 -->
q[3]='<BR>Who are the builders?<BR>';

<!-- Question 4 -->
q[4]='<BR><STRONG>"the same is become the head of the corner:"</STRONG><BR><P><BR>What is the meaning?<BR>';

<!-- Question 5 -->
q[5]='<BR>Why did the builders reject the stone?<BR>';

<!-- Question 6 -->
q[6]='<BR><STRONG>"The kingdom of God shall be taken from you, and given to a nation bringing forth the fruits thereof"</STRONG><BR><P><BR>Now Jesus speaks more plainly about things he formerly alluded to in parables and dark sayings. What is the meaning?<BR>';

<!-- Question 7 -->
q[7]='<BR><STRONG>"And whosoever shall fall on this stone shall be broken: but on whomsoever it shall fall, it will grind him to powder."</STRONG><BR><P><BR>Who are those who will be broken? What does this mean?<BR>';

<!-- Question 8 -->
q[8]='<BR><I>And whosoever shall fall on this stone shall be broken: but on whomsoever it shall fall, it will grind him to powder."</I><BR><P><BR>Who are those who will be ground to powder? What does this mean?<BR>';

<!-- Question 9 -->
q[9]='<BR>Describe the difference between a good and evil man when he is rebuked.<BR>';


	<!-- Answer   0 -->
a[0]=' <STRONG>"The stone which the builders refused is become the head stone of the corner. {23} This is the LORD\'S doing; it is marvellous in our eyes."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Psalms 117:22-23\) </FONT><BR>';

<!-- Answer   1 -->
a[1]=' Matins, at "God is the Lord".<BR>';

<!-- Answer   2 -->
a[2]=' Jesus is the stone.  <P> <I>"Christ is called A Stone, not only because of His strength, but because He mightily crushes His enemies; whence it follows, And whoever shall fall on this stone shall be broken, and on whomever it shall fall, it shall grind him to powder"</I> <FONT SIZE="-2" FACE="Arial">\(St John Chrysostom\)</FONT><BR>';

<!-- Answer   3 -->
a[3]=' <I>"Christ is the stone, the builders are the Jewish teachers who rejected Christ, saying, This man is not of God."</I> <FONT SIZE="-2" FACE="Arial">\(St John Chrysostom\)</FONT><BR>';

<!-- Answer   4 -->
a[4]=' <I>"He is become the head of the corner, because He is the union of both sides between the Law and the Gentiles."</I> <FONT SIZE="-2" FACE="Arial">\(St Hilary of Potiers\)</FONT>   ';

<!-- Answer   5 -->
a[5]=' Jealousy and pride and a desire to keep  the status quo.<BR>';

<!-- Answer   6 -->
a[6]=' The majority of the Jews would reject the Messiah and the church would be populated majorly by the Gentiles.<BR>';

<!-- Answer   7 -->
a[7]=' <I>"Whoever sins, yet believes in Him, falls indeed upon a stone and is broken, yet is not altogether crushed, but is preserved to salvation through endurance."</I> <FONT SIZE="-2" FACE="Arial">\(St Jerome\)</FONT><BR>';

<!-- Answer   8 -->
a[8]=' <I>"But on whomsoever it shall fall, that is, whomsoever this stone shall itself assault, and whosoever shall utterly deny Christ, it shall so crush him, that not a bone of him shall be left in which a drop of water could be taken up."</I> <FONT SIZE="-2" FACE="Arial">\(St Jerome\)</FONT><BR>';

<!-- Answer   9 -->
a[9]=' <I>"Here is the difference between good and bad men. The good man when taken in a sin has sorrow because he has sinned, the bad man is grieved not because he has sinned, but because he is found out in his sin; and he not only does not repent, but is indignant with him that reproved him. Thus they being taken in their sins were stirred up to still greater wickedness; And they sought to lay hands on him, but feared the multitude because they took him for a Prophet."</I> <FONT SIZE="-2" FACE="Arial">\(St John Chrysostom\)</FONT><BR>';
