	<HTML>
	<HEAD>
	<TITLE>Explanation of Scripture read by Orthodox Christians on the 10th Wednesday after Pentecost 1 Corinthians 16:4-12 Matthew 21:28-32

</TITLE>

	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR><STRONG>"But what think ye? A certain man had two sons; and he came to the first, and said, Son, go work to day in my vineyard."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Matthew 21:28\)</FONT><BR><P><BR>Who is the "certain man"?<BR><BR>';

<!-- Question 1 -->
q[1]='<BR>What do the two sons symbolize?<BR><BR>';

<!-- Question 2 -->
q[2]='<BR>What did Christ use this parable to teach the Jews? <BR><BR>';

<!-- Question 3 -->
q[3]='<BR>By answering Jesus\' question, what do the Jews do to themselves?<BR>';

<!-- Question 4 -->
q[4]='<BR>What does working in the vineyard indicate?<BR>';

<!-- Question 5 -->
q[5]='<BR>How may the parable be understood in general sense?<BR>';

<!-- Question 6 -->
q[6]='<BR>Name a famous publican who became an Apostle.<BR>';

<!-- Question 7 -->
q[7]='<BR>Name a famous harlot who anointed Jesus\' feet and saw his greatest miracle in His earthly ministry.<BR>';

<!-- Question 9 -->
q[9]='<BR><STRONG>"Now I will come unto you, when I shall pass through Macedonia: for I do pass through Macedonia."</STRONG> <FONT SIZE="-2" FACE="Arial">\(1 Corinthians 16:5\)</FONT><BR><BR>Where is Macedonia?<BR><BR>';


	<!-- Answer   0 -->
a[0]='<BR>The "certain man" is God the Father. <BR>';

<!-- Answer   1 -->
a[1]=' The first son  is the Gentiles, harlots, and publicans. This is because, although they did not have the truth at the beginning and were sinners, they accepted the faith when it was given to them, as did the first son, who refused at first and later obeyed. The second son, who said "I go but did not go, is the Jews, who had the promise from the beginning but did not keep it and fell away. <BR>';

<!-- Answer   2 -->
a[2]=' He was showing the Pharisees that the harlots and publicans and sinners would enter into the kingdom of heaven before them, as the sinners accepted St. John and the truth when it was come, while they rejected it and sought only after their own power.  <P> <I>"Thus much prefaced, the Lord brings forward a parable, to convict them of their irreligion, and show them that the kingdom of God should be transferred to the Gentiles."</I> <FONT SIZE="-2" FACE="Arial">\(St Jerome\)</FONT><BR>';

<!-- Answer   3 -->
a[3]=' The Jews, by their own words pronounced judgement on themselves: <STRONG>"Whether of them twain did the will of his father? They say unto him, The first. Jesus saith unto them, Verily I say unto you, That the publicans and the harlots go into the kingdom of God before you."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Matthew 21:31\)</FONT><BR>';

<!-- Answer   4 -->
a[4]=' To work in the vineyard is to do righteousness.<BR>';

<!-- Answer   5 -->
a[5]=' <I>"Whence others think that the parable does not relate to Gentiles and Jews, but simply to the righteous and to sinners. These by their evil deeds had rejected God\'s service, but after received from John the baptism of repentance; while the Pharisees who made a show of righteousness, and boasted that they did the law of God, despising John\'s baptism, did not follow his precepts."</I> <FONT SIZE="-2" FACE="Arial">\(St. Jerome\)</FONT><BR>';

<!-- Answer   6 -->
a[6]=' Matthew the Apostle and Evangelist was a former publican.<BR>';

<!-- Answer   7 -->
a[7]=' Mary of Bethany, the sister of Lazarus, was a former harlot, and one who anointed Jesus\' feet before his crucifixion. <BR>';

<!-- Answer   9 -->
a[9]=' Macedonia is in Asia Minor. <BR>';


	var module='10wedape.htm';
	</SCRIPT>
