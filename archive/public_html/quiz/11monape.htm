	<HTML>
	<HEAD>
	<TITLE>Explanation of Scripture read by Orthodox Christians on the 11th Monday after Pentecost - Matthew 23:13-22 2 Corinthians 2:4-15

</TITLE>

	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR><STRONG>"Woe unto you, scribes and Pharisees, hypocrites! for ye devour widows\' houses, and for a pretence make long prayer: therefore ye shall receive the greater damnation."</STRONG> <FONT SIZE="-2" FACE="Arial">Matthew 23:14</FONT><BR><P><BR>How did the Pharisees "devour widows\' houses"? <BR>';

<!-- Question 1 -->
q[1]='<BR>What made the Pharisees\' criminal conduct even more abominable than that of a common criminal? <BR>';

<!-- Question 2 -->
q[2]='<BR>Were all the Pharisees hypocrites? Name at least two that were saved. <BR>';

<!-- Question 3 -->
q[3]='<BR><STRONG>"Woe unto you, scribes and Pharisees, hypocrites! for ye compass sea and land to make one proselyte, and when he is made, ye make him twofold more the child of hell than yourselves."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Vs 15\)</FONT><BR><P><BR>According to one of the fathers, when Jesus mentions "for ye compass sea and land", it is a sort of prophesy. What?<BR>';

<!-- Question 4 -->
q[4]='<BR><STRONG>"Woe unto you, ye blind guides, which say, Whosoever shall swear by the temple, it is nothing; but whosoever shall swear by the gold of the temple, he is a debtor!"</STRONG> <FONT SIZE="-2" FACE="Arial">\(Vs 16</FONT><BR><P><BR>What false custom is Jesus describing? What was the primary motivation of this custom? <BR>';

<!-- Question 5 -->
q[5]='<BR><STRONG>{15} For we are unto God a sweet savour of Christ, in them that are saved, and in them that perish:"</STRONG> <FONT SIZE="-2" FACE="Arial">\(A Corinthians 2:15\)</FONT><BR><P><BR>St. Paul\'s statements brings to mind Old Testament imagery, where he links to "sweet savour" unto God and Christ. What is he alluding to? <BR>';


	<!-- Answer   0 -->
a[0]=' The Pharisees "devoured widows houses" by cheating people because of their greed, by taking advantage of their position and the trust given to them by the people. <BR>';

<!-- Answer   1 -->
a[1]=' They committed crimes in the name of religion - on top of their crime, they were hypocrites.  <P> <I>"The manner of this plundering is grievous for they make long prayers. Every one who does evil deserves punishment; but he who takes occasion for his offense from religion, deserves more severe punishment; Therefore you shall receive the greater damnation."</I> <FONT SIZE="-2" FACE="Arial">\(St John Chrysostom\)</FONT><BR>';

<!-- Answer   2 -->
a[2]=' The Apostle Paul <BR>Nicodemus<BR>';

<!-- Answer   3 -->
a[3]=' <I>"That they compass sea and land signifies that throughout the whole world they shall be enemies of Christ\'s Gospel, and shall bring men under the yoke of the Law against the justification of faith. There were proselytes made into the Synagogue from among the Gentiles, the small number of whom is here denoted by what is said one proselyte. For after the preaching of Christ there was no faith left in their doctrine, but whoever was gained to the faith of the Jews became a child of hell."<I> <FONT SIZE="-2" FACE="Arial">\(St Hilary of Potiers\)</FONT><BR>';

<!-- Answer   4 -->
a[4]=' <I>"As by making broad phylacteries and fringes they sought after the reputation of sanctity, and made this again a means of gain, so now He charges them with being teachers of wickedness by their fraudulent presence of tradition. For when in any dispute or quarrel, or ambiguous cause, one swore by the temple, and was afterwards convicted of falsehood, he was not held guilty. This is what is meant by that, Whosoever shall swear by the temple, it is nothing, that is, he owes nothing, But if he had sworn by the gold, or by the money which was offered to the Priests in the temple, he was immediately compelled to pay down that by which he had sworn."</I> <FONT SIZE="-2" FACE="Arial">\(St Jerome\)</FONT> <P> The reason the Pharisees so twisted the law is their greed.<BR>';

<!-- Answer   5 -->
a[5]=' Christ is our sacrifice, and we in turn must be a sacrifice. In days of sacrifice, the Jews believed that the sacrifice of animals brought up a "sweet savor" to God.  <P> <I>"I beseech you therefore, brethren, by the mercies of God, that ye present your bodies a living sacrifice, holy, acceptable unto God, which is your reasonable service. {2} And be not conformed to this world: but be ye transformed by the renewing of your mind, that ye may prove what is that good, and acceptable, and perfect, will of God. {3} For I say, through the grace given unto me, to every man that is among you, not to think of himself more highly than he ought to think; but to think soberly, according as God hath dealt to every man the measure of faith."</I> <FONT SIZE="-2" FACE="Arial">\(Rom 12:1-3\)  </FONT> <P> <I>"And Noah builded an altar unto the LORD; and took of every clean beast, and of every clean fowl, and offered burnt offerings on the altar. {21} And the LORD smelled a sweet savour; and the LORD said in his heart, I will not again curse the ground any more for man\'s sake; for the imagination of man\'s heart is evil from his youth; neither will I again smite any more every thing living, as I have done."</I> <FONT SIZE="-2" FACE="Arial">\(Gen 8:20-21\) </FONT> <P> <I>"And thou shalt burn the whole ram upon the altar: it is a burnt offering unto the LORD: it is a sweet savour, an offering made by fire unto the LORD."</I> <FONT SIZE="-2" FACE="Arial">\(Exo 29:18\)</FONT> <P> <I>"By so much was Jesus made a surety of a better testament. {23} And they truly were many priests, because they were not suffered to continue by reason of death: {24} But this man, because he continueth ever, hath an unchangeable priesthood. {25} Wherefore he is able also to save them to the uttermost that come unto God by him, seeing he ever liveth to make intercession for them. {26} For such an high priest became us, who is holy, harmless, undefiled, separate from sinners, and made higher than the heavens; {27} Who needeth not daily, as those high priests, to offer up sacrifice, first for his own sins, and then for the people\'s: for this he did once, when he offered up himself."</I> <FONT SIZE="-2" FACE="Arial">\(Heb 7:22-27\)</FONT> <P> <I>"For then must he often have suffered since the foundation of the world: but now once in the end of the world hath he appeared to put away sin by the sacrifice of himself."</I> <FONT SIZE="-2" FACE="Arial">\(Heb 9:26\)</FONT><BR>';


	var module='11monape.htm';
	</SCRIPT>
