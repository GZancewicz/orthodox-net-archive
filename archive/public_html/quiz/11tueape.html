	<HTML>
	<HEAD>
	Explanation of Scripture read by Orthodox Christians on the 11 Tuesday after Pentecost - 2 Cor 2:14-17,3:1-3 Matthew 23:23-28
	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR><STRONG><i>"For we are unto God a sweet savour of Christ, in them that are saved, and in them that perish: <span class=n>{16}</span> To the one we are the savour of death unto death; and to the other the savour of life unto life."</STRONG></i> <SPAN class=n>\(2 Corinthians 2:15,16\)</SPAN><BR><P><BR>St Paul mentions one "sweet savour", but two effects of this "savour". What is this savour? Why are it\'s effects twofold? Explain. <BR><BR>';

<!-- Question 1 -->
q[1]='<BR><STRONG><i>"For we are unto God a sweet savour of Christ, in them that are saved, and in them that perish: <span class=n>{16}</span> To the one we are the savour of death unto death; and to the other the savour of life unto life."</STRONG></i> <SPAN class=n>\(2 Corinthians 2:15,16\)</SPAN><BR><P><BR>There is another meaning of "sweet savour", which should be applied to the we live our daily lives, and incorporated in every action. Recall the imagery of a "sweet savour" - it implies a sacrifice, and the scent of the holocost, which is pleasing to God. How may we be this type of "savour"? <BR><BR>';

<!-- Question 2 -->
q[2]='<BR><STRONG><i>"For we are unto God a sweet savour of Christ, in them that are saved, and in them that perish: <span class=n>{16}</span> To the one we are the savour of death unto death; and to the other the savour of life unto life."</STRONG></i> <SPAN class=n>\(2 Corinthians 2:15,16\)</SPAN><BR><P><BR>We must continue to meditate upon this verse, because it speaks an important truth to us. What should we expect from those who do not believe in Christ? <BR>What does their sometime response tell us abut the effect of good and holy things? <BR><BR>';

<!-- Question 3 -->
q[3]='<BR><STRONG><i>"To the one we are the savour of death unto death; and to the other the savour of life unto life. And who is sufficient for these things?"</STRONG></i> <SPAN class=n>\(2 Corinthians 2:16\)</SPAN><BR><P><BR>Explain St Paul\'s emotional, rhetorical question: "And who is sufficient for these things?"<BR><BR>';


	<!-- Answer   0 -->
a[0]=' We send up a "sweet savour" unto God, by living in Christ, with true belief and holy works. A way of life which believes the truth firmly and without equivocation, and lives righteously in this truth,. is pleasing to God. It leads those who are of the same mind to life, but to those who are opposed to Christ, it is a bitter smell.  <P> <i>"Whether, saith he, one be saved or be lost, the Gospel continues to have its proper virtue: and as the light, although it blindeth the weakly, is still light, though causing blindness; and as honey, though it be bitter to those who are diseased, is in its nature sweet; so also is the Gospel of sweet savor, even though some should be lost who believe it not."</i> <SPAN class=n>\(St John Chrysostom\)</SPAN><BR>';

<!-- Answer   1 -->
a[1]=' We are to live our lives as a sacrifice, pleasing to God. We are to give up our will for evil things and passions to God, and replace it with holy works and thoughts. We are to consider our brother\'s needs as being more important than our own. Our living in this way sends up a sweet savour to God.  <P> <i>"I beseech you therefore, brethren, by the mercies of God, that ye present your bodies a living sacrifice, holy, acceptable unto God, which is your reasonable service. <span class=n>{2}</span> And be not conformed to this world: but be ye transformed by the renewing of your mind, that ye may prove what is that good, and acceptable, and perfect, will of God. <span class=n>{3}</span> For I say, through the grace given unto me, to every man that is among you, not to think of himself more highly than he ought to think; but to think soberly, according as God hath dealt to every man the measure of faith."</i> <SPAN class=n>\(Rom 12:1-3\)  </SPAN> <P> <i>"The expression also, "sweet savor of Christ," appears to me to admit of a double interpretation: for he means either that in dying they offered themselves a sacrifice: or that they were a sweet savor of the death of Christ, as if one should say, this incense is a sweet savor of this victim. The expression then, sweet savor, either signifieth this, or, as I first said, that they are daily sacrificed for Christ\'s sake."<i> <SPAN class=n>\(St John Chrysostom\)</SPAN><BR>';

<!-- Answer   2 -->
a[2]=' We must understand that there are those in the world who will hate us because we are Christians. This is because our "savour" is a stench to those who are opposed to Christ, and our light is blinding and hurts the eyes of those who do not wish to be in the light. We should expect harsh responses, and be offended when those outside of Christ, and even weak Christians are offended by our savour, but we must take care to cultivate this sweet savour, so that we offend only by our obedience to God, and not by our own fetid passions. <P> We must also understand that good things help the good, and destroy the wicked - their effect is twofold:  <P> <i>"For this sweet savor some so receive that they are saved, others so that they perish. So that should any one be lost, the fault is from hismelf: for both ointment is said to suffocate swine, and light \(as I before observed,\)to blind the weak. And such is the nature of good things; they not only correct what is akin to them, but also destroy the opposite: and in this way is their power most displayed. For so both fire, not only when it giveth light and when it purifieth gold, but even when it consumeth thorns, doth very greatly display its proper power, and so show itself to be fire: and Christ too herein also doth discover His own majesty when He "shall consume" Antichrist "with the breath of His mouth, and bring him to nought with the manifestation of His coming." <SPAN class=n>\(2 Thessalonians 2:18\)</SPAN>"</i> <SPAN class=n>\(St John Chrysostom\)</SPAN><BR>';

<!-- Answer   3 -->
a[3]=' St Paul had just laid out the great dignity and responsibility of the Christian - we are to be a "sweet savour". The task is so great, and we are so weak - how can not exclaim in awe: "And who is sufficient for these things?".  <P> <i>"Seeing he had uttered great things, that `we are a sacrifice of Christ and a sweet savor, and are every where made to triumph,\' he again useth moderation, referring all to God. Whence also he saith, "and who is sufficient for these things?" `for all,\' saith he, `is Christ\'s, nothing our own.\' Seest thou how opposite his language to the false Apostles\'? For they indeed glory, as contributing somewhat from themselves unto the message: he, on the contrary, saith, he therefore glorieth, because he saith that nothing is his own. "For our glorying is this, the testimony of our conscience, that not in fleshly wisdom, but in the grace of God, we behaved ourselves in the world." And that which they considered it a glory to acquire, I mean the wisdom from without, he makes it his to take away. Whence also he here saith, "And who is sufficient for these things?" But if none are sufficient, that which is done is of grace."</i> <SPAN class=n>St John Chrysostom\)</SPAN><BR>';
