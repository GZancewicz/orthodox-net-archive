	<HTML>
	<HEAD>
	Explanation of Scripture read by Orthodox Christians on the 12th Tuesday after Pentecost 2 Corinthians 5:15-21 Mark 1:16-22
	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR><STRONG><i>Now as he walked by the sea of Galilee, he saw Simon and Andrew his brother casting a net into the sea: for they were fishers. </STRONG></i> <SPAN class=n>\(Vs. 16\)</SPAN><BR><P><BR>Was this the first time Simon and Andrew had encountered Jesus? Explain.<BR>';

<!-- Question 1 -->
q[1]='<BR><STRONG><i>"And when he had gone a little farther thence, he saw James the son of Zebedee, and John his brother, who also were in the ship mending their nets. <span class=n>{20}</span> And straightway he called them: and they left their father Zebedee in the ship with the hired servants, and went after him. "</STRONG></i> <SPAN class=n>\(Mark 1:19,20\)</SPAN><BR><P><BR>Zebedee was left behind, but what of James\' and John\'s mother? Do we know her name, and if she followed Jesus?<BR>';

<!-- Question 2 -->
q[2]='<BR><STRONG><i>"And they went into Capernaum; and straightway on the sabbath day he entered into the synagogue, and taught.  22   And they were astonished at his doctrine: for he taught them as one that had authority, and not as the scribes."</STRONG></i> <SPAN class=n>\(Mark 1:21,22\)</SPAN><BR><P><BR>What is the most important thing we must do to have authority when we teach or even speak of holy things, according to the example of Jesus Christ? <BR><BR>';

<!-- Question 3 -->
q[3]='<BR><STRONG><i>" And that he died for all, that they which live should not henceforth live unto themselves, but unto him which died for them,and rose again. "</STRONG></i> <SPAN class=n>\(2<BR>Cor 5:15\)</SPAN><BR><P><BR>This is a difficult saying. What does Paul indicate by stating that we should not henceforth live unto ourselves? <BR>';

<!-- Question 4 -->
q[4]='<BR><STRONG><i>"Wherefore henceforth know we no man after the flesh: yea, though we have known Christ after the flesh, yet now henceforth know we him no more. "</STRONG></i><BR><SPAN class=n>\(2 Cor 5:16"\)</SPAN><BR><P><BR>What does St Paul mean by saying: "know we no man after the flesh"? <BR><BR>';

<!-- Question 5 -->
q[5]='<BR>"Even though we have known Christ after the flesh, yet now we know Him so no more."<BR><P><BR>Does this mean that Christ, after having risen, is no longer in the flesh?<BR>';


	<!-- Answer   0 -->
a[0]=' Simon and Andrew were disciples of St John the Forerunner. Their first meeting with Jesus is described in the St John\'s gospel. This was when St John was still alive and ministering:  <P> <i>"Again the next day after John stood, and two of his disciples;  36 And looking upon Jesus as he walked, he saith, Behold the Lamb of God!  37 And the two disciples heard him speak, and they followed Jesus.  38 Then Jesus turned, and saw them following, and saith unto them, What seek ye? They said unto him, Rabbi, \(which is to   say, being interpreted, Master,\) where dwellest thou?  39 He saith unto them, Come and see. They came and saw where he dwelt, and abode with him that day: for it was about the tenth hour.  40   One of the two which heard John speak, and followed him, was Andrew, Simon Peter\'s brother."</i> <SPAN class=n>\(John 1:35-40\)</SPAN><BR>';

<!-- Answer   1 -->
a[1]=' Holy Tradition places Salome, a daughter of St Joseph the betrothed from a previous marriage, and the mother of St James and John. she also followed Jesus, and was part of the group of "women that accompanied him". She was also a holy myrhhbearer. <P> <i>"Then came to him the mother of Zebedees children with her sons, worshipping him, and desiring a certain thing of him." </i> <SPAN class=n>\(Matthew 20:20\)</SPAN> <P> <i>"And when the sabbath was past, Mary Magdalene, and Mary the mother of James, and Salome, had bought sweet spices,   that they might come and anoint him."</i> <SPAN class=n>\(Mark 16:1\)</SPAN><BR>';

<!-- Answer   2 -->
a[2]=' We must live as we teach. Moral authority can only come from living morally.  The Pharisees lacked authority in the eyes of the people because they did not live righteously. <BR>';

<!-- Answer   3 -->
a[3]=' St Athanasius the Great answers this question in an inspired way: <P> <i>"He means that the rescue of mankind from corruption was the proper part only of Him Who made them in the beginning. He points out also that the Word assumed a human body, expressly in order that He might offer it in sacrifice for other like bodies:  <P> "Since then the children are sharers in flesh and blood, He also Himself assumed the same, in order that through death He might bring to nought Him that hath the power of death, that is to say, the Devil, and might rescue those      who all their lives were enslaved by the fear of death."<SPAN CLASS=n>[3]</SPAN>  <P> For by the sacrifice of His own body He did two things: He put an end to the law of death which barred our way; and He made a new beginning of life for us, by giving us the hope of resurrection. By man death has gained its power over men; by the Word made Man death has been destroyed and life raised up anew. That is what Paul says, that true servant of Christ:  <P> "For since by man came death, by man came also the resurrection of the dead. Just as in Adam all die, even so in Christ shall all be made alive,"<SPAN CLASS=n>[4]</SPAN> and so forth. Now, therefore, when we die we no longer o so as men condemned to death, but as those who are  even now in process of rising we await the general resurrection of all, "which in its own times He shall show,"<SPAN CLASS=n>[5]</SPAN> even God Who wrought it and bestowed it on us.  "</i> <REF\(St Athanasius, on the Incarnation, Chapter 2\)</SPAN><BR>';

<!-- Answer   4 -->
a[4]=' St. Paul is speaking of the way we should live. We are new creatures and must live, act and think differently than we lived when we were "in the flesh" only, that is, unbaptized.  <P> <i>"For if all died and all rose again; and in such sort died as the tyranny of sin condemned them; but rose again "through the laver of regeneration and the renewing of the Holy Ghost;" <SPAN class=n>\(Titus chapter 3, verse 5\)</SPAN> he saith with reason, "we know none" of the faithful "after the flesh." For what if even they be in the flesh? Yet is that fleshly life destroyed, and we are born again by the Spirit, and have learnt another deportment and rule and life and condition, that, namely, in the heavens. And again of this itself he shows Christ to be the Author."</i> <SPAN class=n>\(St John Chrysostom\)</SPAN><BR>';

<!-- Answer   5 -->
a[5]=' <i>"What then? tell me. Did He put away the flesh, and is He now not with that body? Away with the thought, for He is even now clothed in flesh; for "this Jesus Who is taken up from you into Heaven shall so come. So? How? In flesh, with His body. How then doth he say, "Even though we have known Christ after the flesh, yet now henceforth no more?" <SPAN class=n>\(Acts chapter 1, verse 11\)</SPAN> For in us indeed "after the flesh" is being in sins, and "not after the flesh" not being in sins; but in Christ, "after the flesh" is His being subject to the affections of nature, such as to thirst, to hunger, to weariness, to sleep. For "He did no sin, neither was guile found in His mouth." <SPAN class=n>\(1 Peter chapter 2, verse 22\)</SPAN> Wherefore He also said, "Which of you convicteth Me of sin?" <SPAN class=n>\(John chapter 8, verse 46\)</SPAN> and again, "The prince of this world cometh, and he hath nothing in Me." <SPAN class=n>\(ib. xiv. 30.\)</SPAN> And "not after the flesh" is being thenceforward freed even from these things, not the being without flesh. For with this also He cometh to judge the world, His being impassible and pure. Whereunto we also shall advance when "our body" hath been "fashioned like unto His glorious body." <SPAN class=n>\(Philippians chapter 3, verse 21\)</SPAN>" <SPAN class=n>\(St John Chrysostom\)</SPAN><BR>';
