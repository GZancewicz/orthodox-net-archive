	<!-- Question 0 -->
q[0]='<BR>What does the word "Angel" mean. What is an angel?<BR>';

<!-- Question 1 -->

	<!-- Answer   0 -->
a[0]=' "Angel" means "messenger", which defines their chief task, that of service to the human race, as the Holy Paul says: " Are they not all ministering spirits, sent forth to minister for them who shall be heirs of salvation?" \(Heb 1:14\) <BR>Angels are bodiless and immortal spirits, and are part of the invisible world created by God before He created the visible world. Our symbol of faith declares that God is "... the maker of Heaven and earth, and all things visible and INVISIBLE". St. John the Damascene, who summarized the major beliefs of the church in the ninth century, teaches: "He is Himself the Maker and Creator of the angels: for He brought them out of nothing into being and created them after His own image, an incorporeal race, a sort of spirit or immaterial fire: in the words of the divine David, He maketh His angels spirits, and His ministers a flame of fire" \(Exact Exposition, Book 2 Chapter 3\)<BR>They are individual creatures, with a mind and will. Their intellect and understanding is far superior to man\'s.  In comparison to man, they are fleshless and bodiless, although in some sense, one can say that they have a body, albeit a noetic one, since only the God is pure spirit. "For all that is compared with God Who alone is incomparable, we find to be dense and material. For in reality only the Deity is immaterial and incorporeal." \(ibid.\)<BR>Although in their dealings with man, they have appeared as young men, this is only by the will of God. <BR>';

<!-- Answer   1 -->
a[1]=' We do not know how many angels there are. Their number is exceedingly great. It has been revealed that the angels are arranged in a three tiered hierarchy, in nine ranks. The ranks of angels are  Cherubim, Seraphim, Thrones,  Dominions, Powers, Virtues,  Principalities, Archangels, and angels.   The actual organization and means of communication between the angels themselves and the angels and God is largely unknown to us. The names of those in the nine ranks have been revealed, and also the names of seven Archangels. We know that the higher ranks communicate noetic knowledge to the lower, and direct them in their ministry. Most of what we understand about the organization of the angels comes from St. Dionysius the Areopagite, who wrote "Concerning the Celestial Hierarchies". St. Dionysius was a disciple of the holy Apostle Paul,  who knew much about angels, as he was "caught up to the third heaven" \(1 Cor 12:2\). <BR>Although the nine ranks have been revealed to us, we do not know the actual extent and organization of the Celestial Hierarchy. This understanding is reserved only to God, and is revealed more to those who have ascended the spiritual ladder in virtue and knowledge, and are able to apprehend the heavenly mysteries. St. Dionysius reflects concerning these things: "How many ranks of heavenly beings there are, of what sort they are, and in what way the mysteries their sacred order are performed is known precisely only to God, Who is the Cause of their hierarchy. Likewise, they themselves know their own powers, light, and order beyond this world. But we can speak of this only to the degree that god has revealed this to us through the heavenly powers themselves". \(Heavenly Hierarchy, Ch 6, quoted in "Orthodox Dogmatic Theology", Protopresbyter Michael Pomazansky\)<BR>Christians can easily see the ministry of angels, which is described many times in the scriptures, and thousands of times in the life of the church, and her saints. The understanding of angels, and their appearance to man is only possible for those who are pure in heart. <BR>';

<!-- Answer   2 -->
a[2]=' There are seven archangels whose names we know.  Michael - "Who is Like God" Gabriel  - "Man of God" Raphael - "Help \(or healing\) of God" Uriel - "Fire of God" Salathiel - "Prayer to God" Jegudiel - "Praise of God"  Barachiel - "Blessing of God"<BR>Some think that there is another Archangel, "Jeremial", \("Height of God"\) mentioned in III Esdras 4:36, but the context of this passage indicated that this is another reference to Uriel. <BR>Michael, Gabriel are mentioned prominently in the canonical scriptures. Raphael has a prominent role in Tobit, and Uriel and Salathiel are mentioned in III Esdras. Jegudiel and Barachiel are known to us through holy tradition. <BR>St. John the Evangelist and Theologian refers to the seven Archangels: "Grace be unto you, and peace from Him which is, and which was, and which is to come; and from the seven spirits which are before his throne" \(Apocalypse 1:4\). From this passage we can see clearly that God bestows grace to men through the ministry of his angels.<BR>';

<!-- Answer   3 -->
a[3]=' An innumerable host of the angels are at all times giving praise to God. Many angels, particularly those of the lower rank, the principalities, Archangels, and angels, are entrusted with the governing of the world, it\'s countries, the local Orthodox churches, and the enlightenment and succor of Orthodox Christians. Each Orthodox Christian has a guardian angel, who is with him at all times, to protect and enlighten him.  Our Lord referred to this when He said: "Take heed that ye despise not one of these little ones; for I say unto you, That in heaven their angels do always behold the  face of my Father which is in heaven." \(Matthew 18:10\)<BR>We know that the Higher ranks noetically communicate with the lower, who in turn noetically help mankind. We do not understand the method if this communication, but the results are real enough, and understood by any believer. <BR>Angels have announced so of the greatest occurrences in the history of man:  The conception of Christ.  Mt 1:20,21; Luke 1:31. The birth of Christ.  Luke 2:10-12. The resurrection of Christ.  Mt 28:5-7; Luke 24:23. The ascension and second coming of Christ.  Ac 1:11. The conception of John the Baptist.  Luke 1:13,36.<BR>They offer up prayers for the faithful. Therefore, we ask for their supplications, just as we do of the Saints. <BR>';

<!-- Answer   4 -->
a[4]=' The fallen angels, or demons, do indeed sin. The condition of an angel in regards to sin is forever locked. We who have temporary creatures, and limited intelligence in or corporeal bodies cannot understand fully the state of the angels. St. John the Damascene explains that \(their nature\) ".. is not susceptible of repentance because it is incorporeal. For it is owing to the weakness of his body that man comes to have repentance." \(Ibid.\)<BR>';
