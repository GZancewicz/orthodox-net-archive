	<HTML>
	<HEAD>
	Questions about the Holy Apostle Andrew 
	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR>The Holy Apostle Andrew has a "nick-name". Examples of other "nick-names" are: John "the dwarf", James "the brother of the Lord", John "the Theologian", etc. What is St Andrew\'s nick-name? <BR>Why?<BR><BR>';

<!-- Question 1 -->
q[1]='<BR>Who was the Apostles Andrew\'s brother, where were they from, and what was their profession?<BR><BR>';

<!-- Question 2 -->
q[2]='<BR>St Andrew was formerly a follower of someone else before following Jesus. Who? Explain.<BR><BR>';

<!-- Question 3 -->
q[3]='<BR>What great favor did St Andrew do to his brother, on the day he met Christ? He made a bold statement. Explain. <BR><BR>';

<!-- Question 4 -->
q[4]='<BR>After the giving of the Holy Spirit, St Andrew preached the gospel in many places. One place is particularly dear to Russian Orthodox Christians. Where? <BR>Describe the incident. <BR><BR>';

<!-- Question 5 -->
q[5]='<BR>Who was St Andrew\'s wife? <BR><BR>';

<!-- Question 6 -->
q[6]='<BR>How did the Holy Apostle Andrew die? <BR><BR>';

<!-- Question 7 -->
q[7]='<BR>How does St Andrew appear in icons? <BR><BR>';

<!-- Question 8 -->
q[8]='<BR>Here are some liturgical questions about the commemoration of St Andrew.<BR><OL><BR><LI>What is the "rank" of the service for St Andrew? <BR><LI>The vespers has how many readings? What type of books in the bible? Why?<BR></OL><BR><BR>';

<!-- Question 9 -->
q[9]='<BR>What feast do we begin to sing more about on St Andrew\'s day? Look at the theotokia for Lord I have cried and the Aposticha for a hint. <BR><BR>';


	<!-- Answer   0 -->
a[0]=' The Holy Apostle Andrew is known as the "First Called", because he was the first among the twelve apostles the Lord chose to follow Him. <BR>';

<!-- Answer   1 -->
a[1]=' Simon Peter was the elder brother of Andrew. They were fishermen, in Bethsaida of Galilee, near the sea of Galilee. <BR><STRONG><i>"And Jesus, walking by the sea of Galilee, saw two brethren, Simon called Peter, and Andrew his brother, casting a net into the sea: for they were fishers."</STRONG></i> <SPAN class=n>\(Mat 4:18\)</SPAN><BR><STRONG><i>"Now Philip was of Bethsaida, the city of Andrew and Peter."</STRONG></i> <SPAN class=n>\(John 1:44\)</SPAN><BR>';

<!-- Answer   2 -->
a[2]=' At first St Andrew followed St John the Baptist, but then, hearing the Forerunner speak of Jesus, he became Jesus\' disciple. <BR><STRONG><i>"Again the next day after John stood, and two of his disciples; <span class=n>{36}</span> And looking upon Jesus as he walked, he saith, Behold the Lamb of God! <span class=n>{37}</span> And the two disciples heard him speak, and they followed Jesus. <span class=n>{38}</span> Then Jesus turned, and saw them following, and saith unto them, What seek ye? They said unto him, Rabbi, \(which is to say, being interpreted, Master,\) where dwellest thou? <span class=n>{39}</span> He saith unto them, Come and see. They came and saw where he dwelt, and abode with him that day: for it was about the tenth hour. <span class=n>{40}</span> One of the two which heard John speak, and followed him, was Andrew, Simon Peter\'s brother."</STRONG></i> <SPAN class=n>\(John 1:35-40\)</SPAN><BR>';

<!-- Answer   3 -->
a[3]=' He told his brother that he had found the Messiah, and brought Peter to Jesus. <BR><STRONG><i>"One of the two which heard John speak, and followed him, was Andrew, Simon Peter\'s brother. <span class=n>{41}</span> He first findeth his own brother Simon, and saith unto him, We have found the Messias, which is, being interpreted, the Christ. <span class=n>{42}</span> And he brought him to Jesus."</STRONG></i> <SPAN class=n>\(John 1:40-42\)</SPAN><BR>';

<!-- Answer   4 -->
a[4]=' After preaching around Byzantium and the Black Sea, St Andrew traveled north, reaching the River Dnieper in the land of Russia. He halted on the shore beneath the hills of Kiev, the future site of the city of Kiev and the great monastery of the Kiev caves. There, he said to his disciples who accompanied him: "Believe me: on these hills the grace of God will shine forth. There will be a great city here, and the Lord will raise many churches in this place and enlighten all of the Russian land with holy baptism." Ascending the hills, he blessed them and planted a cross, foretelling the conversion of the people and land of Russia. <BR>';

<!-- Answer   5 -->
a[5]=' St Andrew  had no wife; he was a virgin. <BR>';

<!-- Answer   6 -->
a[6]=' St Andrew healed of a disease of the eyes and then converted Maximilla, the wife of Aegeates, proconsul of the city of Patras in the Peloponnese, for which he was tortured and beaten and finally crucified upside down. From his cross he preached and exhorted the people, converting many to the true Faith. Aegeates, fearing the people, sent servants to take the apostle down from the cross, but they were unable to approach and could not see the saint for the brilliant light which surrounded him as he prayed. When the light dissipated, he surrendered his spirit to the Lord. After Andrew\'s death, Aegeates was possessed by a demon and died in torment in the midst of the city.  <P> <STRONG><i>"Most gloriously let us praise the apostle Andrew, the brother of Peter, the first of all the disciples, the beholder and servant of Him Who is the Word, for he enlighteneth the nations and, crucified, met his end as a disciple of the Master."</STRONG></i> <SPAN class=n>\(second Exapostilarion from the service for St. Andrew\)</SPAN><BR>';

<!-- Answer   7 -->
a[7]='  St Andrew is shown in icons as an older man, with long grey hair and beard.<BR>';

<!-- Answer   8 -->
a[8]=' <OL> <LI>The service for St Andrew is of polyeleos rank, the second highest rank.  <LI>In Vespers are read three readings from the epistles of the Apostle Peter. <LI>All apostles are given readings from the epistles </OL><BR>';

<!-- Answer   9 -->
a[9]=' We begin to hasten preparations for the Nativity of our Lord. The theotokia for "Lord I have cried" and the Aposticha are taken from the service for the Forefeast of the Nativity. <BR>';


	var module='apostle-andrew.html';
