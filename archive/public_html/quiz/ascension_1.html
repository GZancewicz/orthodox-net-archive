	<HTML>
	<HEAD>
	Questions about the Ascension of Christ
	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR>What significance does the event of the Ascension of Jesus Christ have for the Christian? The Orthodox should understand why they celebrate a feast, and it\'s inner meaning.<BR>';

<!-- Question 1 -->
q[1]='<BR>There is an important account of the ascension in the scriptures that is not in the gospels. Where is it? The story involves angels. How? Describe how a cloud was involved.<BR>';

<!-- Question 2 -->
q[2]='<BR>In the gospel reading for liturgy on the Ascension, two gifts are mentioned by Christ. One is given and one is promised. What are they? Comment on their importance and meaning for a Christian.<BR>';

<!-- Question 3 -->
q[3]='<BR>What mountain did Christ ascend from? How will this mountain be involved in another, cataclysmic event?<BR><BR>';

<!-- Question 4 -->
q[4]='<BR>There is a significant occurrence in the Ascension story that can only be understood in the context of the church, and the absolute need for apostolic succession of bishops and priests. This occurrence, properly  understood, should cause everyone who trusts his own interpretation of the bible outside of the context of a  visible, authoritative and dogmatic church to flee from his false, individual  understanding and seek out the church. <BR><P><BR>What is this  occurrence? Comment on it, and try to specify other scriptures which point out or support this critical Christian teaching.<BR>';

<!-- Question 5 -->
q[5]='<BR>What commemoration is the day before Ascension? Explain.<BR><BR>';

<!-- Question 6 -->
q[6]='<BR>How long is the feast of the Ascension?<BR><BR>';

<!-- Question 7 -->
q[7]='<BR><BR>What, in general terms, is the Typicon for the services of the  Ascension? List all the books needed to serve the services completely. Where may one obtain the main texts for the Ascension in English?<BR><BR>';

<!-- Question 8 -->
q[8]='<BR>Detail the differences between the services of the  Ascension and those of a "regular"  Sunday.<BR>';

<!-- Question 9 -->
q[9]='<BR>Detail the differences between the services of the  Ascension and those of a "regular"  weekday..<BR><BR>';


	<!-- Answer   0 -->
a[0]=' Christ ascended to Heaven as man and as God. Once he became a man, being at the same time, as always, perfect God, he never put off His manhood, but deified it, and made it, and us capable of apprehending heavenly things. The Ascension is a prophecy of things to come for those who love God and believe in Him in an Orthodox manner.  Those who believe and live according to this belief will be in the heavens, in the flesh, with Him, just as He now abides in the Heavens in the flesh. Our flesh and souls will be saved, because Christ made human flesh capable of deification.  <P> We also call to mind the promise of the Holy Spirit, since Christ mentions this promise He had made before to them, and it\'s advent is tied to His ascension thusly:  <P> <i>"Nevertheless I tell you the truth; It is expedient for you that I go away: for if I go not away, the Comforter will not come unto you; but if I depart, I will send him unto you. <span class=n>{8}</span> And when he is come, he will reprove the world of sin, and of righteousness, and of judgment: <span class=n>{9}</span> Of sin, because they believe not on me; <span class=n>{10}</span> Of righteousness, because I go to my Father, and ye see me no more; <span class=n>{11}</span> Of judgment, because the prince of this world is judged."</i> <SPAN class=n>\(John 16:7-11\)</SPAN> <P>  What Christ has done for human flesh and our souls is impossible to understand, but the church, with sweet melody, meditates with fervor and thanksgiving and precise theology in her services.  <P> <i>"O Christ, having taken upon thy shoulders our nature, which had gone astray, thou didst ascend and bring it unto God the Father"</i> <SPAN class=n>\(Matins canon for the Ascension, Ode 7\)</SPAN> <P> <i>"Having raised our nature, which was deadened by sin, Thou didst bring it unto Thine own Father, O Savior"</i> <SPAN class=n>\(ibid.\)</SPAN> <P> <i>"Unto Him Who by His descent destroyed the adversary, and Who by His ascent raised up man, give praise O ye priests, and supremely exalt Him, O ye people, unto all the ages."</i> <SPAN class=n>\(Matins canon for the Ascension, Ode 8\)</SPAN> <P> Since the disciples were "filled with great joy", we who are Orthodox in belief and way of life should naturally be this way also, and should hasten to the temple to meditate upon the magnificent truths and promises in the ascension by listening carefully to the divinely inspired theology, sung in sweet melody. If we pray with care, and expectation, having valued divine worship above our worldly cares, surely God will enlighten us and noetically teach us the true meaning of Christ\'s Ascension.<BR>';

<!-- Answer   1 -->
a[1]=' St. Luke, who wrote an account of the Ascension in his Gospel, also wrote a slightly different account in His Acts of the Apostles. In this account, he describes two angels who speak to the Apostles as they are gazing at Christ going up into the sky:  <P> <i>"And while they looked steadfastly toward heaven as he went up, behold, two men stood by them in white apparel; Which also said, Ye men of Galilee, why stand ye gazing up into heaven? this same Jesus, which is taken up from you into heaven, shall so come in like manner as ye have seen him go into heaven."</i> <SPAN class=n>\(Acts 1:10-11\)</SPAN> <P> St Luke also mentions a cloud in his account in the Acts: <i>"And when he had spoken these things, while they beheld, he was taken up; and a cloud received him out of their sight." </i> <SPAN class=n>\(Acts 1:9\)</SPAN> <P> <i>"Thou Who art immortal by nature didst arise on the third day, and didst appear unto the eleven and all the disciples, and riding upon a cloud, didst hasten back unto the Father, O Thou creator of all."</i> <SPAN class=n>\(Matins canon for the Ascension, 1st Ode, Irmos\)</SPAN><BR>';

<!-- Answer   2 -->
a[2]=' When Christ saw his disciples in the upper room, he told them: <i>"Peace be unto you."</i> <SPAN class=n>\(Luke 24:36\)</SPAN>. This peace is not a worldly peace, but is the gift of God, and the attainment of it is the purpose of our life.  The only way to understand this peace is to live the Christian life and be changed. It is freely given, but not freely received - not until a man is purified by intense effort, war against his passions, and desire to fulfill the will of God.  <P> Shortly after this, Christ promised: <i>"And, behold, I send the promise of my Father upon you: but tarry ye in the city of Jerusalem, until ye be endued with power from on high."</i> <SPAN class=n>\(Luke 24:49\)</SPAN>. This, of course, is the promise of the gift of the Holy Spirit, to be given only ten days later, on Pentecost.  The ministry of the Holy Spirit is so profound, it cannot be described adequately. He convicts concerning sin and righteousness, He gives strength, He gives wisdom, and the words to say when being persecuted. Ignorant and weak fisherman  and all those who make an abode for Him wax bold in their witness of the gospel.  He guides the church, and enlightens every man concerning the truth. Without Him, the Christian life cannot be lived. <BR>';

<!-- Answer   3 -->
a[3]=' Christ ascended by the Mount of Olives. "Then returned they unto Jerusalem from the mount called Olivet, which is from Jerusalem a Sabbath day\'s journey." <SPAN class=n>\(Luke 1:12\)</SPAN>. Holy tradition understands that Christ will come to judge the world at the culmination of all things "from the East" over this very same mountain.  <P> <i>"And while they looked steadfastly toward heaven as he went up, behold, two men stood by them in white apparel; <span class=n>{11}</span> Which also said, Ye men of Galilee, why stand ye gazing up into heaven? this same Jesus, which is taken up from you into heaven, shall so come in like manner as ye have seen him go into heaven."</i> <SPAN class=n>\(Acts 1:10-11\)</SPAN><BR>';

<!-- Answer   4 -->
a[4]=' It is clear that the scriptures are a dark book, unless God gives illumination. The Jews did not understand the book they gave appearances to love, and Jesus corrected their misunderstandings numerous times. The Holy apostles themselves had to be taught in numerous private sessions with their Lord, an important one which is described in the Ascension story:  <P> <i>"Then opened he their understanding, that they might understand the scriptures, <span class=n>{46}</span> And said unto them, Thus it is written, and thus it behooved Christ to suffer, and to rise from the dead the third day: <span class=n>{47}</span> And that repentance and remission of sins should be preached in his name among all nations, beginning at Jerusalem. <span class=n>{48}</span> And ye are witnesses of these things. <span class=n>{49}</span> And, behold, I send the promise of my Father upon you: but tarry ye in the city of Jerusalem, until ye be endued with power from on high."</i> <SPAN class=n>\(Luke 24:45-49\)</SPAN> <P> There much that the apostles were taught that was not written in the scriptures, and which has become part of the mind of the church, through the teaching of the apostles, and all their successors, who remained true to their teachers as the apostles had to one great teacher. St. John alludes to this hidden wisdom, held so closely to the bosom of the church, when he says:  <P> <i>"And there are also many other things which Jesus did, the which, if they should be written every one, I suppose that even the world itself could not contain the books that should be written. Amen."</i> <SPAN class=n>\(John 21:25\)</SPAN> <P> St. Peter admonishes us and reminds us of our own frailty and the sure reliability of the church when he tells us: <i>"Knowing this first, that no prophecy of the scripture is of any private interpretation."</i> <SPAN class=n>\(2 Peter 1:20\)</SPAN><BR>';

<!-- Answer   5 -->
a[5]=' The Apodosis of Pascha is celebrated on the Wednesday before Ascension Thursday \(according to the Russian Typicon\). All Great Orthodox feasts, according to the Jewish model, have three phases. There is a preparation phase, which may be very long, such as in the Great Lent that  is before Pascha, or shorter, and may consist of whole services, such as the pre-festal Vespral divine liturgies served the day before Theophany or Nativity, or just certain hymns, such as the katavasia of the matins canon, sung for a period before a feast. The feast itself is the ultimate celebration, then there is a post-festal period, where the truths of the celebration are meditated upon at length in the services. For Pascha, this period is forty days, and ends on the "Apodosis", or "leave-taking" of the feast, on the Wednesday before  Ascension. <BR>';

<!-- Answer   6 -->
a[6]=' The feast of the Ascension lasts until the Friday before Pentecost, when it\'s Apodosis occurs. <BR>';

<!-- Answer   7 -->
a[7]=' One the eve of the ascension, Wednesday evening, an all night vigil is served.. This is a service which combines Great vespers, litya, matins and the first hour, with slight changes to the beginning and end of Great Vespers and Matins from their form when they are served alone. The "rank" of commemoration is  "Vigil" The rank indicates somewhat the importance of the feast, and how much the regular formats for vespers and matins will be modified. Two other "ranks" are "single commemoration" and  "double commemoration".<BR>On Thursday morning, the third and sixth hours and Divine Liturgy are served.<BR>To serve the Great vespers, Litya, matins, the hours, and Divine liturgy the following service books are needed.  <UL> <LI>The Horologion - the fixed parts of vespers, matins, the hours and the Divine liturgy <LI>The Psalter - needed for the kathisma readings at vespers and matins. Usually any other psalms that are read are in  the Horologion <LI>The Apostolos - for the epistle reading at liturgy. <LI>The Old Testament - Great vespers has 3 OT readings. They are usually contained in the service texts in the  <LI>Gospel - read in matins and the liturgy. <LI>The Pentecostarion - texts for the feast, such as the stichera at Lord I have cried, the Aposticha, the matins canon, etc. <LI>The priest\'s liturgikon - used by the priest for services like vespers, matins, Compline, the midnight office, the hours and divine liturgy. </UL><BR>';

<!-- Answer   8 -->
a[8]=' On a "regular" Sunday, vigil is appointed, just as for Ascension. The services are very similar, with these differences \(and some, similarities, listed for comparison purposes\):  <P> Vespers:  <BR> Both have ten stichera at Lord I have cried. All of the stichera for the Ascension are about the feast, as is the case for all "great feasts of the Lord".  For "regular" Saturday night vespers, there are at most 7 stichera about the Resurrection \(sometimes 6, sometimes 4\), with the rest being concerned with a Saint\(s\) or another event  <BE> At the end of the Lord I have cried stichera, for the Ascension, "Glory ... Both Now ..." is sung all at once, and one Sticheron, about the feast, is sung. In a regular Sunday vigil, there are usually two stichera here, the first one preceded by "Glory to the Father and the son and the Holy Spirit", the second being preceded by "Both now and ever, and to the ages of ages, amen". The second Sticheron is a "Theotokion", which is about the Theotokos and the incarnation. <BR> Three OT readings are read for the Ascension. OT readings are not read in most Sunday vigil services.  <BR> Litya is appointed in the Ascension services. This service is usually omitted in a regular Sunday service. <BR> At the end of vespers for the Ascension, the troparion of the feast is sung three times \(this is just before the blessing of the loaves, wheat, wine and oil\). In regular vespers, "O Theotokos and virgin rejoice" is sung three times.  <P> Matins <P> The Ascension matins has the "Polyeleos", followed by the "magnification" \(the latter is in Russian usage only\), whereas a regular Sunday matins usually has in stead of the Polyeleos, the 118th kathisma \(known as "the blameless"\), and there is no magnification.  <P> Just before the praises, on Sunday, an expostilarion, "Holy is the Lord our God", is sung. This hymn is omitted on the Ascension.  <P> Liturgy <P> The Ascension liturgy replaces the regular antiphons with festal ones. <BR>';

<!-- Answer   9 -->
a[9]=' On a "regular" weekday", vespers is served on the eve, and matins in the morning, and no vigil service is sung, as there is for Ascension, Sundays, and most great feasts of the Lord \(Pascha being a special exception\).  <P> Daily vespers, which is usually served on a weekday is a far simpler service than Great Vespers, with no small entrance, "O Gladsome light" being chanted instead of being sung, and less "Lord I have cried" stichera \(there are usually 6\). In addition, the last two litanies of both vespers and matins are reverses \(read in a different order\), and the first two petitions of the second litany in regular \(daily\) vespers and matins are omitted.  <P> There are numerous other differences, because daily services are much simpler and shorter. Here are a few, off the top of my head.  <P> Vespers <BR> The kathisma for Great Vespers on a feast is "Blessed is the man".  A different kathisma is read at a daily vespers for every day of the week <P> No Small entrance, OT readings,  at a daily vespers <P> No litya at the end of a daily vespers.  <P> Less "Lord I have cried stichera" at a daily vespers <P> Matins <P> No gospel, "Save O God" intercession at a daily matins. <P> That is enough for now. The best place to understand these services and their differences is the yearly typicon/calendar and order of services books available from St. John of Kronstadt Press \<A HREF="(http://www.roca.org/kronstadt">(http://www.roca.org/kronstadt</A>\)   ';
