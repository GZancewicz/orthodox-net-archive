	var q = new Object();

	<!-- Question 0 -->
q[0]=' <BR>1. And seeing the multitudes, He went up into a mountain: and when he was set, His disciples came to Him.<BR><BR>We can deduce many things about the Christina life by Jesus choice of venue for His extraordingary sermon. Explain<BR><BR>';

<!-- Question 1 -->
q[1]=' <BR>What is poor in spirit? <BR><BR>';

<!-- Question 2 -->
q[2]=' <BR>Why did our Lord begine his sermon like this? If we may assume that he mentions the most important thing first, what vice or passion whoudl we consider to be the most dangerous? <BR><BR>';

<!-- Question 3 -->
q[3]=' <BR>4. Blessed are they that mourn; for they shall be comforted.<BR><BR>Explain. Mourn what?<BR>';

<!-- Question 4 -->
q[4]=' <BR>5. Blessed are the meek: for they shall inherit the earth.<BR><BR>What is true meekness? <BR><BR>';


	<!-- Answer   0 -->
a[0]=' CHRYS. By not choosing his seat in the city, and the market place, but on a mountain in a desert, he has taught us to do nothing with ostentation, and to depart from crowds, above all when we are to be employed in philosophy, or in speaking of serious things.<BR>CHRYS. He ascended a mountain, first, that He might fulfill the prophecy of Esaias, Get you up into a mountain; Secondly, to show that as well he who teaches, as he who hears the righteousness of God should stand on an high ground of spiritual virtues; for none can abide in the valley and speak from a mountain. If you stand on the earth, speak of the earth; if you speak of heaven, stand in heaven. Or, He ascended into the mountain to show that all who would learn the mysteries of the truth should go up into the Mount of the Church of which the Prophet speaks, The hill of God is a hill of fatness. <BR>';

<!-- Answer   1 -->
a[1]=' AUG. The chief good is the only motive of philosophical inquiry; but whatever confers blessedness, that is the chief good; therefore He begins, Blessed are the poor in spirit. ID. Augmentation of \'spirit\' generally implies insolence and pride. For in common speech the proud are said to have a great spirit, and rightly - for wind is a spirit, and who does not know that we say of proud men that they are \'swollen,\' \'puffed up.\' Here therefore by poor in spirit are rightly understood \'lowly,\' \'fearing God,\' not having a puffed up spirit. -<BR>CHRYS. Or, He here calls all loftiness of soul and temper spirit; for as there are many humble against their will, constrained by their outward condition, they have no praise; the blessing is on those who humble themselves by their own choice.<BR>AMBROSE; In the eye of Heaven blessedness begins there where misery begins in human estimation. <BR>';

<!-- Answer   2 -->
a[2]=' Pride. <BR>Thus He begins at once at the root, pulling up pride which is the root and source of all evil, setting up as its opposite humility as a firm foundation. If this be well laid, other virtues may be firmly built thereon; if that be sapped, whatever good you gather upon it perishes. Chrysostom<BR>';

<!-- Answer   3 -->
a[3]=' Our sins<BR>AMBROSE; When you have done thus much, attained both poverty and meekness remember that you are a sinner, mourn your sins, as he proceeds, Blessed are they that mourn. And it is suitable that the third blessing should be of those that mourn for sin, for it is the Trinity that forgives sin. HILARY; Those that mourn, that is not loss of kindred, affronts, or losses, but who weep for past sins.<BR>JEROME; For the mourning here meant is not for the dead by common course of nature, but for the dead in sins, and vices. Thus Samuel mourned for Saul, thus the Apostle Paul mourned for those who had not performed penance after uncleanness.<BR>';

<!-- Answer   4 -->
a[4]=' AUG. The meek are they who resist not wrongs, and give way to evil; but overcome evil of good.<BR>';
