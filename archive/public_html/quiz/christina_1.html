	<HTML>
	<HEAD>
	Questions about St Christina
	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR>What does the name Christina mean? <BR>';

<!-- Question 1 -->
q[1]='<BR>When is St Christina commemorated? What "rank" is her feast? <BR>';

<!-- Question 2 -->
q[2]='<BR>Approximately when did St Christina live, and where?  What was her upbringing? <BR>';

<!-- Question 3 -->
q[3]='<BR>Because St Christina is a _______, icons of her show her holding a ______.  Explain<BR>';

<!-- Question 4 -->
q[4]='<BR>What is the Gospel reading that commemorated St Christina?  Why? <BR>';

<!-- Question 5 -->
q[5]='<BR>How did St Christina learn the Christian faith?  Did she have obstacles? <BR>';

<!-- Question 6 -->
q[6]='<BR>When was St Christina baptized?  Be careful answering this one! <BR>';

<!-- Question 7 -->
q[7]='<BR>Describe St Christina\'s passion. <BR><BR>';

<!-- Question 8 -->
q[8]='<BR>Approximately how old was St Christina when died? <BR>';

<!-- Question 9 -->
q[9]='<BR>St Christina\'s relation and conflict with her parents deserves careful scrutiny, and has much to teach us. <BR><P><BR>What should we learn about faith and priorities by observing St Christina as our example? What words of Christ should come to mind when we contemplate Christina\'s struggles with her parents \(if you cannot quote them directly, just give the gist of them in a paraphrasement\). <BR><P><BR>This is a very important concept, which too many fail to understand, and many even fail to convert to the Orthodox faith because of problems similar to, but much less extreme than Christina\'s. <BR><BR>';


	<!-- Answer   0 -->
a[0]=' The name Christina means "Little Christ".  <P> <i>"He Who ordereth all things according to His providence / granted thee the name of Christ / as thou didst deserve; / for thou didst have a better end / in both thy name and thy works, / having betrothed thyself to Christ / piously and with faith. / And as the daughter of the King of heaven // thou dost rejoice with Him, praying for us, O martyr."</i> <SPAN class=n>\(Vespers for St Christina, Sticheron at "Lord I have cried", Tone 4\)</SPAN> <P> <i>"Thou didst truly demonstrate the twofold working of thy Christian name: / in betrothing thyself to Christ in the purity of thy virginity, / with the blessing of the Father and by the activity of the Spirit / thou didst shine forth more brightly than the rays of the sun / in thy steadfast endurance of torture. / Wherefore, thou didst offer thyself / as a pure and unblemished sacrifice on the altar of heaven, / and dost rejoice forever with the choirs of virgins and martyrs. / With them, O Christina, namesake of Christ, // beg thou that peace and great mercy be given to those who honor thee."</i> <SPAN class=n>\(Glory at Lord I have cried\)</SPAN><BR>';

<!-- Answer   1 -->
a[1]=' St Christina is remembered July 24.  This is Aug 6 on the civil calendar. Her feast is a "six stichera" service.  This means that 6 stichera are sung for her during vespers. <BR>';

<!-- Answer   2 -->
a[2]=' St Christina lived in the third century, when paganism was still very prevalent.  She grew up in the city of Tyre.  Her parents were pagan, and her father Urban was the governor.  She was brought up in idolatry until Christ revealed Himself to her at the age of about 11.  Her father made her live in a tower in order to hide her great beauty until she was full grown.  In her tower, Christina saw the beauty of God\'s creations and yearned to know the True God.  God saw this, and revealed Himself to her through His angel. <BR>';

<!-- Answer   3 -->
a[3]=' Because St Christina is a martyr, icons of her show her holding a cross in her right hand. By Holy Tradition, martyrs are depicted holding a cross, which indicated their willingness to give up their temporal lives for Christ, just as Christ gave up His human life on the cross.    ';

<!-- Answer   4 -->
a[4]=' The Gospel reading for St Christina, and most women martyrs is about the "sinful woman" who anointed Christ\'s feet shortly before His passion <SPAN class=n>\(Luke 7:36-50\)</SPAN>.  The woman "loved much" because she had been "forgiven much". The martyrs love much because they are also illuminated with the knowledge of the forgiveness of God.   <P> <i>"Wherefore I say unto thee, Her sins, which are many, are forgiven; for she loved much: but to whom little is forgiven, the same loveth little." </i> <SPAN class=n>\(Luke 7:47\)</SPAN> <P> All of us has much that is forgiven.  Those who truly love God are those who feel this forgiveness in the depths of their being.  Such ones perform outstanding acts of love and devotion, like the woman who anointed the Lord, and all the martyrs who laid down their life for the one Who calls them "friend". <BR>';

<!-- Answer   5 -->
a[5]=' St. Christina\'s parents were pagans, and did not teach her about the True Faith. She didn\'t learn of it until Christ revealed it to her through His angel when she showed a great desire to learn of God. She then smashed all the idols in her tower, thus incurring the wrath of her father, who had her tortured.<BR>';

<!-- Answer   6 -->
a[6]=' St Christina was baptized by her blood at her martyrdom for Christ.  <P> <i>" Thy ewe-lamb Christina, O Jesus, crieth out with a loud voice: / "I love Thee, O my Bridegroom, and, seeking Thee, I suffer. / <FONT COLOR=Red> I am crucified and buried in Thy baptism.</FONT> / I suffer for Thy sake, that I may reign with Thee; / I die for Thee, that I may live with Thee. / Accept me, who sacrifice myself for Thee with love, like an unblemished offering!" // By her supplications save Thou our souls, in that Thou art merciful."</i> <SPAN class=n>\(Troparion for St Christina, Tone 4\)</SPAN><BR>';

<!-- Answer   7 -->
a[7]=' When St Christina was illuminated with the truths of the Christian faith from the angel, her pure soul loathed all the idols surrounding her, and she smashed them to pieces.  This action enraged her father Urban, who, forgetting his natural love for his daughter, tortured her.  The evening before he planned to have her executed, Urban, in full health, was taken from this life.  She was then tortured by Urban\'s two successors, the first being Dion, who also died unexpectedly. Her last persecutor, Julian, cut off the holy one\'s breasts and also her tongue, which the holy one threw back in his face, blinding him.  After many other tortures, which inspired many of the inhabitants of Tyre to follow the Christian faith, she was finally beheaded.  <P> <i>"Neither the passionate attachment of thy parents, / nor the pleasure of food, /nor possession of riches, O glorious one, nor threats of torments, / neither fire, the sword, the abyss or the wheel, / nor yet the attack of wild beasts / were able to separate thee from the love of the Creator, O virgin martyr Christina, // thou glory and boast of the martyrs."</i> <SPAN class=n>\(Vespers, "Lord I have cried", Tone 4\)</SPAN><BR>';

<!-- Answer   8 -->
a[8]=' St Christina was just a girl when she was martyred, eleven years old.<BR>';

<!-- Answer   9 -->
a[9]=' We must love the Church and Christ above all, including family, and follow Him even unto death. Christ said, "He who loves husband, or wife, or mother or father or son or lands more than  Me is not worthy of Me." This means that we need to give up these temporary things, such as family, if the prohibit us from following Christ.  <P> <i>"Think not that I am come to send peace on earth: I came not to send peace, but a sword. <span class=n>{35}</span> For I am come to set a man at variance against his father, and the daughter against her mother, and the daughter in law against her mother in law. <span class=n>{36}</span> And a man\'s foes shall be they of his own household. <span class=n>{37}</span> He that loveth father or mother more than me is not worthy of me: and he that loveth son or daughter more than me is not worthy of me. <span class=n>{38}</span> And he that taketh not his cross, and followeth after me, is not worthy of me. <span class=n>{39}</span> He that findeth his life shall lose it: and he that loseth his life for my sake shall find it." </i> <SPAN class=n>\(Mat 10:34-39\)</SPAN> <P> <i>"Desiring the heavenly Father, / O glorious one, / thou didst spurn thine impious father; / and loving the Jerusalem on high / as thy mother, / thou didst reject thy mother\'s overweening love, / and, deified by Christ with all, / thou didst afterward lay down thy life, O martyr, // undaunted by tortures."</i> <SPAN class=n>\(Vespers, "Lord I have cried", Tone 4\)</SPAN><BR>';
