	<HTML>
	<HEAD>
	<TITLE>Questions about the Sunday of the Holy Fathers of the First ecumenical council l
 
</TITLE>

	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR>When is the Sunday of the Holy Fathers of the First Ecumenical Council celebrated? Speculate why.<BR>';

<!-- Question 1 -->
q[1]='<BR>What is an ecumenical council? How many have there been? Why in general were they called? How do the Orthodox view the pronouncements of the Ecumenical councils? What was the primary reason for the 1st Ecumenical Council? When and where was it called?<BR><BR>';

<!-- Question 2 -->
q[2]='<BR>What major church document was produced in part by the 1st Ecumenical Council? Why? Comment on the importance of this document vis-ŕ-vis a person\'s Orthodoxy.<BR>';

<!-- Question 3 -->
q[3]='<BR>Describe the pernicious heresy combated by the council. Are there any recognizable groups outside the church that still hold to this heresy? <BR><BR>';

<!-- Question 4 -->
q[4]='<BR>What Gospel is read for the Sunday of the Holy Fathers of the First ecumenical council? Why?<BR>';

<!-- Question 5 -->
q[5]='<BR>What is the definition of eternal life that Jesus gives in the Gospel for the Sunday of the Holy Fathers of the First ecumenical council?<BR>';

<!-- Question 6 -->
q[6]='<BR>Who were some of the Holy Fathers at the First ecumenical council? Which one struck an arch heretic? What happened? How many holy fathers were at the council? Where else does this number appear in the Holy Scriptures?<BR>Describe the holy fathers\' treatment of Arius and compare and contrast this to the current activities and pronouncements of Influential Orthodox bishops today.<BR>';

<!-- Question 7 -->
q[7]='<BR>What decision was made about Pascha at the First ecumenical council? Is this decision observed to this day by all the Orthodox?<BR>';

<!-- Question 8 -->
q[8]='<BR>What 3 commemorations are observed in the services for the Sunday of the Holy Fathers of the First ecumenical council? Explain.<BR>';

<!-- Question 9 -->
q[9]='<BR>Explain what being "guided by the Holy Spirit" means for an Orthodox Christian and contrast this with others who express belief in Christ who are not Orthodox.<BR>';


	<!-- Answer   0 -->
a[0]=' The Sunday of the Holy Fathers of the First ecumenical council is celebrated the Sunday before Pentecost, following Ascension Thursday. When Christ ascended, He reiterated His promise of the Holy Spirit to the apostles. The Holy Spirit guided the church, and this guidance is magnificently made manifest in the ecumenical councils, when dogmas were confirmed and heretics were put to shame. As we await the celebration of the giving of the Holy Spirit, it is appropriate to think of the ways in which He guides the church. Through the Holy Spirit, who guided the Holy Fathers in the councils and confirmed their pronouncements in the mind of the Church, the Orthodox Faith, which is nothing less than the only correct and saving faith in the true God, was preserved.  <BR>';

<!-- Answer   1 -->
a[1]=' The principle that hierarchs can meet and formulate doctrinal and disciplinary statements and resolutions that are the will of God and accepted by the entire church was established in the apostolic period, with the first RECORDED council, which was reported by St. Luke in His acts, with the famous statement which has become an anthem of sorts for the Orthodox: "For it seemed good to the Holy Ghost, and to us" <FONT SIZE="-2" FACE="Arial">\(Acts 15:28\)</FONT>.   <P> There have been seven ecumenical councils, which were always convened when there was some heresy that was endangering the purity of the Orthodox faith. The First Ecumenical council was held in 325 AD in Nicea. It was called primarily to combat the heresy of Arianism.  <P> Ye have become exact keepers of the apostolic traditions, / O Holy Fathers; / for in setting forth in council the dogma / of the consubstantiality of the Holy Trinity in Orthodox fashion, / ye cast down the blasphemy of Arius. / Then, after censuring Macedonius, the enemy of the Holy Spirit, / ye condemned Nestorius, Eutyches, Dioscorus, / Sabellius, and Severus the headless. / Wherefore, make ye entreaty / that we be delivered from their error, // and that our life be preserved blameless in the Faith, we pray. <FONT SIZE="-2" FACE="Arial"> \(Vespers for the Sunday of the Holy Fathers of the First ecumenical council, The Litya Glory\)</FONT> <P> Today the brilliant city of the Niceans / hath called together to herself from the whole world / three hundred eighteen hierarchs against Arius, / him that uttered blasphemy and made little account of the One of the Trinity, / the true Son and Divine Rod; / and having thus deposed this man from pow\'r, // the Fathers mightily strengthened the Holy Faith. <FONT SIZE="-2" FACE="Arial">\(Matins for the Sunday of the Holy Fathers of the First ecumenical council, Sessional hymn after the 3rd Ode of the canon, Glory\)</FONT><BR>';

<!-- Answer   2 -->
a[2]=' The Symbol of Faith, the Nicean Creed, was authored in part in Nicea \(the first seven articles were written\). This was the first written expression of the unwritten Orthodox belief regarding the nature of God, and the internal relationship of the Father to the Son.  It was the first document accepted universally defining what Christianity was.  It was the first universal mean: it was the measure by which one could delineate Orthodoxy from Heresy. To vary from it meant that was had ceased to be  Christian. Therefore, to this day, it is impossible for one to be a Christian if this symbol, which dogmatizes Divine Truth about God and His economy, is not believed.  <P> "O ye assemblies of the Orthodox, / let us celebrate today with faith and piety / the annual memorial of the God-bearing Fathers / who, in the illustrious city of Nicaea, / came together from the whole inhabited world. / For with pious mind / they refuted the godless dogma of the grievous Arius, / and by synodal decree banished him from the Catholic Church. / And they instructed all to openly confess / the consubstantial and co-eternal Son of God, / Who existed before the ages. / This, in exactness and piety, / did they set forth in the Symbol of Faith. / Wherefore, following their divine doctrines / and believing with assurance, / we worship, in One Godhead, / the Father, Son, and All-holy Spirit, // the Trinity one in essence." <FONT SIZE="-2" FACE="Arial">\(Vespers for the Sunday of the Holy Fathers of the First ecumenical council, the Aposticha, Glory\)</FONT> <P> "The first gathering of Thy priests, O Savior, piously proclaimed Thee to be begotten and consubstantial with the beginningless Father and Creator of all. <FONT SIZE="-2" FACE="Arial">\(Matins for the Sunday of the Holy Fathers of the First ecumenical council, The Canon of the Fathers, Ode 3\)</FONT> <P> Having brought together all knowledge of things of the spirit / and made careful inquiry by the divine Spirit\'s grace, / lo, like godly scribes / the august Fathers wrote the celestial Symbol, / the august Creed of our holy Faith, / wherein they clearly teach that, like God the Father, / the Word of God is also unoriginate / and is consubstantial with Him in truth. / Thus did these all-blest and renowned and godly-minded ones / indeed follow in manifest manner // in that which the Apostles taught. <FONT SIZE="-2" FACE="Arial">\(Praises for the Sunday of the Holy Fathers\)</FONT><BR>';

<!-- Answer   3 -->
a[3]=' In essence, the heresy of Arianism, named after it\'s chief architect the former Protopresbyter Arius of Carthage, held that Christ was created, and not perfectly God. It set the model of a number of future heresies, all of which would in some way seek to either elevate the manhood of Christ to the expense of his Divinity, or elevate the Divinity of Christ at the expense of his manhood.  The opposite extreme of this heresy was the Monophysite heresy, which states that Jesus Christ had only one nature, since His human nature was "swallowed up" into His divine nature.  <P> The Orthodox confess that Jesus Christ is of one essence "homoousios" with God the Father, and that was never a time when He was not God, and there was a time when He became incarnate, and assumed human nature as well, and His divinity and humanity \(two natures\) coexist in one person, without confusion or intermingling. This dogma is not just a war of words, or semantics. If Jesus Christ did not assume  our full human nature, unmingled with the divinity \(as our nature is, since we are mortal creatures\), His resurrection would not be effectual for humanity, because He would not have resurrected the human nature we possess.  <P> "Ere the morning star from the womb wast Thou born / from the Father motherless ere the ages, / though Arius held Thou wast created and thus not God, / boldly and mindlessly identifying Thee, the Creator, / with things created, / thus storing up fuel for the eternal fire. / But the Council gathered in Nicaea / proclaimed that Thou, O Lord, art truly the Son of God, // one with the Father and the Spirit in rank." <P> "O My Savior, who hath thus rent Thy raiment? / Thou didst say: It was Arius / who sundered the Trinity\'s headship, / which is one in rank and honor. / That Thou art One of the Most Holy Trinity he disputed: / and he taught Nestorius the godless not to say Theotokos. / But the Council gathered in Nicaea / proclaimed that Thou, O Lord, art truly the Son of God, // one with the Father and the Spirit in rank." <FONT SIZE="-2" FACE="Arial">\(Vespers for the Sunday of the Holy Fathers of the First ecumenical council, Lord I have cried, Stichera 7 and 8\)</FONT> <P> Continued holders of the Arian heresy are the Mormons, Unitarian Pentecostals, Jehovahs Witnesses, and the Seventh Day Adventists.<BR>';

<!-- Answer   4 -->
a[4]=' The gospel read on for the Sunday of the Holy Fathers of the First ecumenical council is from St. John <FONT SIZE="-2" FACE="Arial">\(Jn 17:1-13\)</FONT>, and consists of the words the Lord told His disciples just before His arrest on Holy Thursday. <BR><P>His words shown below powerfully refute the heresy of Arius, as they show Him to be equal to the Father.  <P> <I>"These words spake Jesus, and lifted up his eyes to heaven, and said, Father, the hour is come; glorify thy Son, that thy Son also may glorify thee:"</I> <FONT SIZE="-2" FACE="Arial">\(John 17:1\)</FONT> <P> A reciprocal relationship is seen where each person has the capacity to equally glorify the other. <P>Christ\'s own words here: <I>"And now, O Father, glorify thou me with Thine own self with the glory which I had with thee before the world was."</I> <FONT SIZE="-2" FACE="Arial">\(John 17:5\)</FONT> directly refute the blasphemous idea, first proposed by Arius, that Jesus Christ was created.  <P> The words of the prayer of Christ are also magnificently realized in the Holy Fathers, the successors to the apostles. Blessed Bishop Nicolai explains:  <P> <I>"Christ\'s prayer [`Holy Father, keep through Thine own name those whom Thou hast given Me, that they may be one, as We are.\'] is not only for the apostles - although it is firstly for them - but is also for all those who have and will come to faith in Christ through their word. This prayer, then, was also for the hoily Fathers of the First Ecumenical Council, that we commemorate today. `Keep them!\' - the Lord prayed to His Father. And the Father kept them from the errors of Arius , and inspired, illumined and strengthened them by the Holy Spirit to defend and confirm the Orthodox Faith. This prayer is for all of us who are baptised in the apostolic Church and who have from the apostles and their successors, come to know the saving name of Christ the Saviour."</I> <FONT SIZE="-2" FACE="Arial">Bishop Nikolai Velimirovic, Homilies, V. 1, on the 6th Sunday after Pascha.</FONT><BR>';

<!-- Answer   5 -->
a[5]=' Our Lord defined eternal life in His High-Priestly prayer to the Father:  <I>"And this is life eternal, that they might know Thee the only true God, and Jesus Christ, whom Thou hast sent."</I> <FONT SIZE="-2" FACE="Arial">\(John 17:3\)</FONT><BR>';

<!-- Answer   6 -->
a[6]=' There were 318 Holy Fathers at the First Ecumenical council in Nicea, a number which also prophetically appeared in the Old Testament:  <P> <I>"And when Abram heard that his brother was taken captive, he armed his trained servants, born in his own house, three hundred and eighteen, and pursued them unto Dan."</I> <FONT SIZE="-2" FACE="Arial">\(Gen 14:14\)</FONT>This refers to the incident where Abram \(later, renamed by God "Abraham"\) rescued Lot.  <P> The First Council was particularly rich with Holy and God-bearing Fathers, among them being:  <UL> <LI>St. Nicholas the Wonderworker <LI>St. Basil the Great   <LI>St. Spyridon <LI>St. Athanasius the Great \(at that time, an Archdeacon\) <LI>St.Paphnutius </UL> <P> <I>"Today the brilliant city of the Niceans / hath called together to herself from the whole world / three hundred eighteen hierarchs against Arius, / him that uttered blasphemy and made little account of the One of the Trinity, / the true Son and Divine Rod; / and having thus deposed this man from pow\'r, // the Fathers mightily strengthened the Holy Faith."</I> <FONT SIZE="-2" FACE="Arial">Sessional Hymn, Matins for the Sunday of the Holy Fathers of the 1st Ecumenical Council\)</FONT> <P> The Holy Fathers descended with ferocity against the horrible heresy of Arius, because they understood it\'s implications, and the services faithfully capture the essence of this holy and violent battle: <I>"Mindless, foolish Arius / once divided the All-holy Trinity\'s one dominion / and made thus three essences dissimilar and foreign. / Hence, the God-bearing Fathers gathered together in their fervor, / burning with zeal like to Elias the Thesbite, / and they cut down with the sharp sword of the Holy Spirit / the vile blasphemer, / who taught doctrines of shamefulness. // Thus did the Spirit reveal to them."</I> <FONT SIZE="-2" FACE="Arial">Vespers, Lord I have Cried\)</FONT> <P> The battle with Arius became so intense that Nicholas the Wonderworker, filled with divine zeal, struck the blasphemer on the cheek in order to silence his torrent of filthy doctrines <FONT SIZE="-2" FACE="Arial">\(The story of this event is in another of our <I>Questions</I> series,<A HREF=" https://www.orthodox.net//questions/nicholas_1.htm"> https://www.orthodox.net//questions/nicholas_1.htm</A>\)</FONT> <P> In our ecumenical and compromising age, bishops often do not live as monastics, but act like politicians and heresies even worse than Arianism are winked at.  Documents are signed which are wholly unorthodox, such as the infamous "Balamand Agreement", and foolish shepherds hold services and worship with wolves, and encourage their sheep to be commingled with these wolves, in blasphemous "inter-faith" services. Much of this false shepherding is done in the name of "love", actually the love of this world. Too many hierarchs no longer resemble the God-bearing Holy Fathers of the Holy Councils.<BR>';

<!-- Answer   7 -->
a[7]=' The formula for the celebration of Pascha was decided in the First council. This formula is somewhat complex, but in general, it assures these things:  <UL> <LI>Pascha is never celebrated before or at the same time as the Jewish feast of Passover. <LI>Pascha is never celebrated in May. </UL> <P> The Church in Finland has wholly ignored the consensus of the church, and celebrated Pascha with the heretics. They follow the Western Paschalian. Those who follow the New Calendar innovation still celebrate Pascha with the Orthodox who have resisted this innovation; however, on their calendar Pascha sometimes falls in May.<BR>';

<!-- Answer   8 -->
a[8]=' The Sunday of the Holy Fathers of the First Ecumenical falls within the festal period of the Ascension. Therefore, three things are spoken of in the services: <OL> <LI>The Resurrection \(as always on a Sunday\) <LI>The Ascension <LI>The Holy Fathers of the First Ecumenical Council </OL><BR>';

<!-- Answer   9 -->
a[9]=' The church is guided by the Holy Spirit, and the members of her are also guided by this same spirit. Since the Holy Spirit never contradicts Himself, the individual must agree with the corporate consensus of the One Holy and Catholic Church. The mistake that sectarians make is that they have lost the consciousness of this consensus, and depend unwisely on their own private interpretations.  <P> <I>"The Holy Spirit provideth all things; He gusheth forth prophecy; He perfecteth the priesthood; He hath taught wisdom to the illiterate. He hath shown forth the fishermen as theologians. He holdeth together the whole institution of the Church. Wherefore, O Comforter, one in essence and throne with the Father and the Son, glory be to Thee."</I><FONT SIZE="-2" FACE="Arial">\(Lord I have Cried, Vespers of Pentecost\)</FONT><BR>';


	var module='first_ecumenical_council_1.htm';
