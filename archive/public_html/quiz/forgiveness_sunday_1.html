	<HTML>
	<HEAD>
	Questions on Forgiveness Sunday
	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR>Why Is Forgiveness Sunday so-called? <BR>';

<!-- Question 1 -->
q[1]='<BR>What event is commemorated on Forgiveness Sunday?<BR><BR>';

<!-- Question 2 -->
q[2]='<BR>The last weekend before Great Lent is the last time we do several things.  Can you think of three things that are not done again until after Great Lent \(or even well after Pascha\)? <BR>';

<!-- Question 3 -->
q[3]='<BR>Fasting is discussed in the services on Forgiveness Sunday, and all the days of Great Lent.  What *most important* kind of fasting is stressed over and over? <BR>';

<!-- Question 4 -->
q[4]='<BR>What is commemorated next Sunday \(the first Sunday of Great Lent\)?<BR>';

<!-- Question 5 -->
q[5]='<BR>What is the fasting typicon for next week, and all the days in the Lenten season?<BR><BR>';

<!-- Question 6 -->
q[6]='<BR>During Great Lent, we sing the long and rich canon of St Andrew of Crete.  When and in which services? <BR>';

<!-- Question 7 -->
q[7]='<BR>Describe the dialogue in the Great canon.  Who is speaking?  Who is being spoken to? <BR>';

<!-- Question 8 -->
q[8]='<BR>Describe in general terms the content of the Great Canon. <BR>';

<!-- Question 9 -->
q[9]='<BR>What are the essential virtues that are a necessity for salvation that shine forth brightly in the words of the Great Canon? <BR>';


	<!-- Answer   0 -->
a[0]=' St Tikhon answers this question quite well:  <P> "Today is called "Forgiveness Sunday".  It received this name from the pious Orthodox Christian custom at Vespers of asking each other\'s forgiveness for discourtesy and disrespect.  We do so, since in the forthcoming fast we will approach the sacrament of Penance and ask the Lord to forgive our sins, which forgiveness will be granted us only if we ourselves forgive each other.  "If ye forgive men their trespasses, your heavenly Father will also forgive you.  But if ye forgive not men their trespasses, neither will your Father forgive your trespasses."  \(Matt. 6.14, 15\)" \(From a sermon by St Patriarch Tikhon, when he was Bishop of Alaska and the Aleutian Islands. 1901.  Text taken from email posted to an Orthodox mailing list\)    ';

<!-- Answer   1 -->
a[1]=' On the last Sunday before Great Lent begins, we remember the expulsion of Adam and Eve from paradise.  <P> Adam was banished from Paradise through disobedience / and cast out from delight, / beguiled by the words of a woman.  / Naked he sat outside the garden, lamenting \'Woe is me!\' / Therefore let us all make haste to accept the season of the Fast / and hearken to the teaching of the Gospel, / that we may gain Christ\'s mercy // and receive once more a dwelling-place in Paradise.  \(Sticheron from Lord I have cried, 6th tone, Forgiveness Sunday\)<BR>';

<!-- Answer   2 -->
a[2]=' Forgiveness Sunday is the last day in which we eat milk, cheese, eggs and other dairy products until Pascha. <BR>It is also the last Sunday we will serve St. John Chrysostom\'s liturgy until Palm Sunday \(which, by the way, is not considered to be in Great Lent\).  During the holy fast, St Basil\'s liturgy is served on Sundays. <BR>The matins service for this weekend is the last time the theologically rich and compunctionate singing of "By the Waters of Babylon" psalm until next year.  It is only sung in church the three Sundays that precede Great Lent.  <BR>';

<!-- Answer   3 -->
a[3]=' The services of the church and the fathers stress over and over that our physical fast from food is useless if we do not also strive to "fast" from our iniquities.  Fasting from food is an important aid to the help purify the soul, and to gain in virtue. <P> The season of the virtues now has come / and the Judge is at the door.  / Let us not hold back with darkened face, / but let us keep the Fast, / offering tears, contrition and almsgiving; / and let us cry: / \'Our sins are more in number than the sand of the sea; / but, Deliverer of all, forgive each one of us, // that we may receive an incorruptible crown.\'  \(Sessional Hymns after the 1st Psalter Reading\) <P> The arena of the virtues has been opened.  / Let all who wish to struggle for the prize now enter, / girding themselves for the noble contest of the Fast; / for those that strive lawfully are justly crowned.  / Taking up the armor of the Cross, / let us make war against the enemy.  / Let us have as our invincible rampart the Faith, / prayer as our breastplate, and as our helmet almsgiving; / and as our sword / let us use fasting that cuts away all evil from our heart.  / If we do this, we shall receive the true crown // from Christ the King of all at the Day of Judgment.  \(Praises\) <P> Adam was driven out of Paradise, / because in disobedience he had eaten food; / but Moses was granted the vision of God, / because he had cleansed the eyes of his soul by fasting.  / If then we long to dwell in Paradise, / let us abstain from all needless food; / and if we desire to see God, / let us like Moses fast for forty days.  / With sincerity let us persevere in prayer and intercession; / let us still the passions of our soul; / let us subdue the rebellious instincts of the flesh.  / With light step let us set out upon the path to heaven, / where the choirs of angels with never-silent voice / sing the praises of the undivided Trinity; / and there we shall behold the surpassing beauty of the Master.  / O Son of God, Giver of Life, / in Thee we set our hope: / count us worthy of a place there with the angelic hosts, / at the intercessions of the Mother who bore Thee, O Christ, / of the apostles and the martyrs // and of all the saints.\'  \(Praises\)<BR> ';

<!-- Answer   4 -->
a[4]=' On the first Sunday of Great Lent we celebrate the "Triumph of Orthodoxy". <BR>';

<!-- Answer   5 -->
a[5]=' During all of Great Lent, we eat no animal products \(with one exception\).  We abstain from all flesh meat, fish, milk, cheese and other milk products, eggs, olive oil, wine and hard liquor on all weekdays \(Monday through and including Friday\).  On the weekend \(Saturday and Sunday\), the fast is relaxed a little.  We can have olive oil or wine if we wish.  On Annunciation, fish is allowed, since this is such a joyful feast of the Mother of God. <BR>';

<!-- Answer   6 -->
a[6]=' The first 4 evening of Great Lent \(Clean Monday through Clean Thursday\), we serve Great Compline, and a portion of the Great Canon of St Andrew of Crete.  During Matins for the 5th Thursday of Great Lent, \(usually served Wednesday evening\), we read the life of St. Mary of Egypt, and chant the Great Canon in its entirety.  ';

<!-- Answer   7 -->
a[7]=' The Great Canon is a one way dialogue of St Andrew speaking to his soul.  We would do well to put ourselves in his place when the canon is being chanted.  ';

<!-- Answer   8 -->
a[8]=' The Great canon is a dialogue between St Andrew of Crete and his soul.  He brings to bear many examples of the righteous and the unrighteous from the Old and New Testaments in order to show himself good and bad examples, make himself ashamed of his sins, and spur himself to repentance.  There is also significant mystical theology and typology that the saint elucidates in the midst of his lamentations.  ';

<!-- Answer   9 -->
a[9]=' Humility, and with it, self-knowledge.  Hope in God, because of knowledge of WHO HE IS. <BR>';
