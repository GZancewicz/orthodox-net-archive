	<!-- Answer   0 -->
a[0]=' Moses wrote Genesis. We know this by Holy Tradition.<BR><blockquote>Now it is Moses who has composed this history; Moses, who, when still at the breast, is described as exceeding fair;1  Moses, whom the daughter of Pharaoh adopted; who received from her a royal education, and who had for his teachers the wise men of Egypt; Moses, who disdained the pomp of royalty, and, to share the humble condition of his compatriots, preferred to be persecuted with the people of God rather than to enjoy the fleeting delights of sin; Moses, who received from nature such a love of justice that, even before the leadership of the people of God was committed to him, be was impelled, by a natural horror of evil, to pursue malefactors even to the point of punishing them by death; Moses, who, banished by those whose benefactor he had been, hastened to escape from the tumults of Egypt and took refuge in Ethiopia, living there far from former pursuits, and passing forty years in the contemplation of nature; Moses, finally, who, at the age of eighty, saw God, as far as it is possible for man to see Him; or rather as it had not previously been granted to man to see Him, according to the testimony of God Himself, "If there be a prophet among you, I the Lord will make myself known unto him in a vision, and will speak unto him in a dream. My servant Moses is not so, who is faithful in all mine house, with him will I speak mouth to mouth, even apparently and not in dark speeches."  It is this man, whom God judged worthy to behold Him, face to face, like the angels, who imparts to us what he has learnt from God. Let us listen then to these words of truth written without the help of the "enticing words of man\'s wisdom"  by the dictation of the Holy Spirit; words destined to produce not the applause of those who hear them, but the salvation of those who are instructed by them. <SPAN CLASS=n>[St Basil the Great, "Homily I.-In the Beginning God Made the Heaven and the Earth",<A HREF=" http://www.ccel.org/fathers2/NPNF2"> http://www.ccel.org/fathers2/NPNF2</A>-08/Npnf2-08-09.htm]</SPAN></blockquote><BR>';

<!-- Answer   1 -->
a[1]=' Genesis means "creation" or "generation".<BR>The Jews knew this book as "Bereshith", i.e., "in the beginning", because this is the first word of the book. <SPAN CLASS=n>[Eastons Bible Dictionary]</SPAN><BR>';

<!-- Answer   2 -->
a[2]=' The angelic host, in the invisible world.<BR><b><SPAN CLASS=n>[Gen 1:1]</SPAN>  In the beginning God created the heaven and the earth.</b><BR><blockquote>5. It appears, indeed, that even before this world an order of things existed of which our mind can form an idea, but of which we can say nothing, because it is too lofty a subject for men who are but beginners and are still babes in knowledge. The birth of the world was preceded by a condition of things suitable for the exercise of supernatural powers, outstripping the limits of time, eternal and infinite. The Creator and Demiurge of the universe perfected His works in it, spiritual light for the happiness of all who love the Lord, intellectual and invisible natures, all the orderly arrangement  of pure intelligences who are beyond the reach of our mind and of whom we cannot even discover the names. They fill the essence of this invisible world, as Paul teaches us. "For by him were all things created that are in heaven, and that are in earth, visible and invisible whether they be thrones or dominions or principalities or powers" or virtues or hosts of angels or the dignities of archangels. <P>To this world at last it was necessary to add a new world, both a school and training place where the souls of men should be taught and a home for beings destined to be born and to die. Thus was created, of a nature analogous to that of this world and the animals and plants which live thereon, the succession of time, for ever pressing on and passing away and never stopping in its course. Is not this the nature of time, where the past is no more, the future does not exist, and the present escapes before being recognized? And such also is the nature of the creature which lives in time,-condemned to grow or to perish without rest and without certain stability. It is therefore fit that the bodies of animals and plants, obliged to follow a sort of current, and carried away by the motion which leads them to birth or to death, should live in the midst of surroundings whose nature is in accord with beings subject to change.  Thus the writer who wisely tells us of the birth of the Universe does not fail to put these words at the head of the narrative. "In the beginning God created;" that is to say, in the beginning of time. Therefore, if he makes the world appear in the beginning, it is not a proof that its birth has preceded that of all other things that were made. He only wishes to tell us that, after the invisible and intellectual world, the visible world, the world of the senses, began to exist. <SPAN CLASS=n>[St Basil the Great, "Homily I.-In the Beginning God Made the Heaven and the Earth",<A HREF=" http://www.ccel.org/fathers2/NPNF2"> http://www.ccel.org/fathers2/NPNF2</A>-08/Npnf2-08-09.htm]</SPAN></blockquote><BR>';

<!-- Answer   3 -->
a[3]=' God created the entire visible and invisible world out of nothing.<BR><blockquote>"Since, then, God, Who is good and more than good, did not find satisfaction in self-contemplation, but in fits exceeding goodness wished certain things to come into existence which would enjoy His benefits and share in His goodness, He brought all things out of nothing into being and created them, both what is invisible and what is visible. Yea, even man, who is a compound of the visible and the invisible. And it is by thought that He creates, and thought is the basis of the work, the Word filling it and the Spirit perfecting it". <SPAN CLASS=n>[ An Exact Exposition of the Orthodox Faith, by St John Damascene BOOK II CHAPTER II ]</SPAN></blockquote><BR><blockquote>By the word of the LORD were the heavens made; and all the host of them by the breath of his mouth.<SPAN CLASS=n> <SPAN CLASS=n>[Psa 33:6]</SPAN></SPAN></blockquote><BR>';

<!-- Answer   4 -->
a[4]=' Out of nothing. It is a famous Latin phrase.<BR>';

<!-- Answer   5 -->
a[5]=' <blockquote>The sacred writer wishes to enumerate to you the elements of the world, to tell you that God created the heavens, the earth, water, and air and that the last was now diffused and in motion; or rather, that which is truer and confirmed by the authority of the ancients, by the Spirit of God, he means the Holy Spirit. It is, as has been remarked, the special name, the name above all others that Scripture delights to give to the Holy Spirit. and always by the spirit of God the Holy Spirit is meant, the Spirit which completes the divine and blessed Trinity. You will find it better therefore to take it in this sense. <SPAN CLASS=n>[St Basil the Great, Homily II, "The Earth Was Invisible and Unfinished." <A HREF=" http://www.ccel.org/fathers2/NPNF2"> http://www.ccel.org/fathers2/NPNF2</A>-08/Npnf2-08-10.htm#P2053_583374]</SPAN></blockquote><BR>';

a[8]=' Genetical inheritance.<BR><blockquote>Nature always makes a horse succeed to a horse, a lion to a lion, an eagle to an eagle, and preserving each animal by these uninterrupted successions she transmits it to the end of all things. Animals do not see their peculiarities destroyed or effaced by any length of time; their nature, as though it had been just constituted, follows the course of ages, for ever young. <SPAN CLASS=n>[St Basil the Great, Homily IX.-The Creation of Terrestrial Animals]</SPAN></blockquote><BR>';

<!-- Answer   10 -->
a[10]=' The moon, because the light that comes from us is "reflected" - it is not our own light, but the light of God. Also because of our constnaly changing nature. <BR>BQ<SPAN CLASS=n>:<SPAN CLASS=n>[James 1:17]</SPAN></SPAN>  Every good gift and every perfect gift is from above, and cometh down from the Father of lights, with whom is no variableness, neither shadow of turning.<BR><blockquote>To all this the properties of the moon are near akin; she, too, has an immense body, whose splendour only yields to that of the sun. Our eyes, however, do not always see her in her full size. Now she presents a perfectly rounded disc, now when diminished and lessened she shows a deficiency on one side. When waxing she is shadowed on one side, and when she is waning another side is hidden. Now it is not without a secret reason of the divine Maker of the universe, that the moon appears from time to time under such different forms. It presents a striking example of our nature. Nothing is stable in man; here from nothingness he raises himself to perfection; there after having hasted to put forth his strength to attain his full greatness he suddenly is subject to gradual deterioration, and is destroyed by diminution. Thus, the sight of the moon, making us think of the rapid vicissitudes of human things, ought to teach us not to pride ourselves on the good things of this life, and not to glory in our power, not to be carried away by uncertain riches, to despise our flesh which is subject to change, and to take care of the soul, for its good is unmoved. If you cannot behold without sadness the moon losing its splendour by gradual and imperceptible decrease, how much more distressed should you be at the sight of a soul, who, after having possessed virtue, loses its beauty by neglect, and does not remain constant to its affections, but is agitated and constantly changes because its purposes are unstable. What Scripture says is very true,"As for a fool he changeth as the moon <SPAN CLASS=n>[Ecclus. 27.11]</SPAN> <SPAN CLASS=n>[St Basil the Great, Homily VI -The Creation of Luminous Bodies]</SPAN></blockquote><BR> ';

<!-- Answer   11 -->
a[11]=' Free-will, the ability to freely choose between good and evil.<BR><blockquote>Cattle are terrestrial and bent towards the earth. Man, a celestial growth, rises superior to them as much by the mould of his bodily conformation as by the dignity of his soul. What is the form of quadrupeds? Their head is bent towards the earth and looks towards their belly, and only pursues their belly\'s good. Thy head, O man! is turned towards heaven; thy eyes look up.10  When therefore thou degradest thyself by the passions of the flesh, slave of thy belly, and thy lowest parts, thou approachest animals without reason and becomest like one of them.<P>Thou art called\' to more noble cares; "seek those things which are above where Christ sitteth."12  Raise thy soul above the earth; draw from its natural conformation the rule of thy conduct; fix thy conversation in heaven. Thy true country is the heavenly Jerusalem;13 thy fellow-citizens and thy compatriots are "the first-born which are written in heaven."  <SPAN CLASS=n>[St Basil the Great, Homily IX.-The Creation of Terrestrial Animals]</SPAN></blockquote><BR> ';

a[12]=' Yes, but it is inferior to man\'s soul, since it is not made in the image of God.<BR><blockquote>Thus when the soul of brutes appeared it was not concealed in the earth, but it was born by the command of God. Brutes have one and the same soul of which the common characteristic is absence of reason. <SPAN CLASS=n>[St Basil the Great, Homily IX.-The Creation of Terrestrial Animals]</SPAN></blockquote><BR>';

a[14]=' Plants<BR><b><SPAN CLASS=n>[Gen 1:30]</SPAN>  And to every beast of the earth, and to every fowl of the air, and to every thing that creepeth upon the earth, wherein there is life, I have given every green herb for meat: and it was so.</b><BR>';

<!-- Answer   15 -->
a[15]=' <b>[<SPAN CLASS=n> Genesis 1:26]</SPAN> And God said, Let us make man in our image, after our likeness: and let them have dominion over the fish of the sea, and over the fowl of the air, and over the cattle, and over all the earth, and over every creeping thing that creepeth upon the earth.</b><BR><blockquote>And God said "Let us make man."  Does not the light of theology shine, in these words, as through windows; and does not the second Person show Himself in a mystical way, without yet manifesting Himself until the great day? <P>Where is the Jew who resisted the truth and pretended that God was speaking to Himself? It is He who spoke, it is said, and it is He who made. "Let there be light and there was light." But then their words contain a manifest absurdity. Where is the smith, the carpenter, the shoemaker, who, without help and alone before the instruments of his trade, would say to himself; let us make the sword, let us put together the plough, let us make the boot? Does he not perform the work of his craft in silence? Strange folly, to say that any one has seated himself to command himself, to watch over himself, to constrain himself, to hurry himself, with the tones of a master! But the unhappy creatures are not afraid to calumniate the Lord Himself. ...<P>"And God said let us make man." Tell me; is there then only one Person? It is not written "Let man be made," but, "Let us make man."... The perfect man attains the dignity of an angel; but what creature can be like the Creator?<P>Listen to the continuation. "In our image." What have you to reply? Is there one image of God and the angels? Father and Son have by absolute necessity the same form, but the form is here understood as becomes the divine, not in bodily shape, but in the proper qualities of Godhead. ... To Whom does He say, "in our image," to whom if it is not to Him who is "the brightness of His glory and the express image of His person," "the image of the invisible God"? It is then to His living image, to Him Who has said "I and my Father are one," "He that hath seen me hath seen the Father," that God says "Let us make man in our image." Where is the unlikeness in these Beings who have only one image?<P>"So God created man,"  It is not "They made." Here Scripture avoids the plurality of the Persons. After having enlightened the Jew, it dissipates the error of the Gentiles in putting itself under the shelter of unity, to make you understand that the Son is with the Father, and guarding you from the danger of polytheism. He created him in the image of God. God still shows us His co-operator, because He does not say, in His image, but in the image of God. <SPAN CLASS=n>[St Basil the Great, Homily IX.-The Creation of Terrestrial Animals]</SPAN></blockquote>';
