	Questions about holy week
	<SCRIPT>
	var q = new Object();

	<!-- Question 0 -->
q[0]='<BR>Holy week has several beautiful services that have a name that reminds one of marriage. What is the <BR>name? When are they served? There  is a distinctive "signature" hymn that is sung. What is its text? What <BR>is the scriptural basis for the hymn?<BR>';

<!-- Question 1 -->
q[1]='<BR>How many Presanctified liturgies are served during Holy week? When is the last one? How is the service <BR>different than most of the ones served during Great lent?<BR><BR>';

<!-- Question 2 -->
q[2]='<BR>On Holy Wednesday, in many parishes, a Trebnic service is sometimes served. What is it? What service <BR>does it unfortunately often replace?<BR><BR>';

<!-- Question 3 -->
q[3]='<BR>When did Judas contact the Jewish officials to betray the Lord? The services make this clear. Was he <BR>present at the last supper? If so, what was he present for and what did he miss \(if anything\)?<BR><BR>';

<!-- Question 4 -->
q[4]='<BR>What beautiful hymn about the "sinful woman" is sung while all the  people prostrate?<BR><BR>';

<!-- Question 5 -->
q[5]='<BR>Who was the only one of the apostles to not abandon the Lord when he was arrested? what important task <BR>did the Lord give him while he was on the cross? <BR><BR>';

<!-- Question 6 -->
q[6]='<BR>What service is celebrated Holy Thursday morning? Why is it served on this day? <BR><BR>';

<!-- Question 7 -->
q[7]='<BR>It is a pious and important tradition to not eat anything on Holy Friday until when? <BR>';

<!-- Question 8 -->
q[8]='<BR>When is the resurrection first proclaimed in  a gospel reading? <BR>';

<!-- Question 9 -->
q[9]='<BR>What is the last service in the Lenten Triodion? What is the first service in the book used after Great Lent <BR>and Holy week? Name this book<BR>';


	<!-- Answer   0 -->
a[0]=' Bridegroom matins is celebrated the first 3 days of Holy week. Although matins is usually a morning  service, it is often  celebrated in the evening "by anticipation". It is basically a "daily" lenten matins, with  the exceptional inclusion of a Gospel reading. It is so named because the troparion that is sung after the  Great litany and Alleluia verses is "Behold the Bridegroom":<BR> Behold, the Bridegroom cometh at midnight, /<BR>and blessed is that servant whom He shall find watching, <BR>but unworthy is he whom He shall find heedless. <BR>Beware, therefore, O my soul, <BR>lest thou be weighed down with sleep; <BR>lest thou be given up to death,                                           <BR>and be shut out from the kingdom. <BR>But rouse thyself and cry: <BR>Holy, Holy, Holy art Thou, O God; <BR>through the Theotokos have mercy on us.<BR>The theme of watchfulness, which is so fundamental to true Orthodox belief, is forcefully presented in the  scriptures:  <BR>Then shall the kingdom of heaven be likened unto ten virgins, which took their lamps, and went forth to  meet the bridegroom. <span class=n>{2}</span> And five of them were wise, and five were foolish. <span class=n>{3}</span> They that were foolish  took their lamps, and took no oil with them: <span class=n>{4}</span> But the wise took oil in their vessels with their lamps.  <span class=n>{5}</span> While the bridegroom tarried, they all slumbered and slept. <span class=n>{6}</span> And at midnight there was a cry  made, Behold, the bridegroom cometh; go ye out to meet him. <span class=n>{7}</span> Then all those virgins arose, and  trimmed their lamps. <span class=n>{8}</span> And the foolish said unto the wise, Give us of your oil; for our lamps are gone  out. <span class=n>{9}</span> But the wise answered, saying, Not so; lest there be not enough for us and you: but go ye rather to  them that sell, and buy for yourselves. <span class=n>{10}</span> And while they went to buy, the bridegroom came; and they  that were ready went in with him to the marriage: and the door was shut. <span class=n>{11}</span> Afterward came also the  other virgins, saying, Lord, Lord, open to us. <span class=n>{12}</span> But he answered and said, Verily I say unto you, I  know you not. <span class=n>{13}</span> Watch therefore, for ye know neither the day nor the hour wherein the Son of man  cometh. \(Mat 25:1-13\) . The present hymn basically summarizes and emphasizes the above parable. This hymn, and it\'s theme, is  so important for Christians that the church also sings it every day in it\'s daily Midnight Office.<BR>';

<!-- Answer   1 -->
a[1]=' One Holy Monday, Tuesday and Wednesday, the Presanctified liturgy is served, and includes a gospel  reading. During Great Lent, this service rarely includes a Gospel reading, but rather, just two readings  from the Old Testament.<BR>';

<!-- Answer   2 -->
a[2]=' Many serve Holy Unction service on Wednesday night, and sometimes omit the canonically appointed,  and very beautiful and instructive matins for the institution of the Eucharist. The "Trebnic" is a prayer  book used by the priest which has many prayers for "special needs" in it, such as unction, marriage,  confession, funerals, blessings of all kinds, etc. Holy unction is usually served for the sick \(not as "last  rites", but for healing\), but many serve it for an entire parish, since we are all at least spiritually sick to  some degree. Not everyone agrees with this opinion, and some only serve this service for those who are  physically sick. This service may be served any time there is a need, and is not prescribed in the typicon  for Holy week.<BR>';

<!-- Answer   3 -->
a[3]=' The tradition is that Judas betrayed the Lord on Wednesday, and this is one of the reasons the Apostles  instituted fasting on this day \(they chose days other than when the Jews fasted\). The Holy Wednesday   matins meditates on Judas\' incredible folly, and the contrasting love of the sinful woman who anointed the  Lord with great forcefulness. The Holy Thursday matins also mentions Judas frequently, and condemns  his avarice. <BR>In St. Luke\'s account, it is apparent that Judas sold the Lord well before the  last supper, on Holy  Thursday: <BR>Now the feast of unleavened bread drew nigh, which is called the Passover. <span class=n>{2}</span> And the chief priests and  scribes sought how they might kill him; for they feared the people. <span class=n>{3}</span> Then entered Satan into Judas  surnamed Iscariot, being of the number of the twelve. <span class=n>{4}</span> And he went his way, and communed with the  chief priests and captains, how he might betray him unto them. <span class=n>{5}</span> And they were glad, and covenanted  to give him money. <span class=n>{6}</span> And he promised, and sought opportunity to betray him unto them in the absence  of the multitude. <span class=n>{7}</span> Then came the day of unleavened bread, when the passover must be killed. \(Luke  22:1-7\) <P>. It is clear from the scriptures and the church\'s forceful hymnology that Judas had his feet washed and  the  and partook of the Holy Mysteries, before going out into the night to betray the Lord, while Our Lord\'s  heavenly discourse with the Apostles was transpiring.  <P> And when the hour was come, he sat down, and the twelve apostles with him. .... <span class=n>{19}</span> And he took bread,  and gave thanks, and brake it, and gave unto them, saying, This is my body which is given for you: this do  in remembrance of me. <span class=n>{20}</span> Likewise also the cup after supper, saying, This cup is the new testament in  my blood, which is shed for you. <span class=n>{21}</span> But, behold, the hand of him that betrayeth me is with me on the  table. \(Luke 22:14, 19-21\) <P> St John\'s account also give a clear chronology.  The eight Ode of the matins canon for Holy Thursday makes the church\'s understanding very clear:  <P> "Iniquitous Iscariot, forgetful of the law of friendship, hastened to the betrayal on the feet that Thou hadst  washed. Eating Thy Bread, the divine body, he lifted up his heel against Thee; for he knew not how to cry:  \'O ye works of the Lord, praise ye the Lord and exalt Him above all forever".  <P> "Lacking all conscience, he received the Body that delivers men form sin, and the Divine blood that was  shed for the world. He was not ashamed to drink what he had sold for money; he felt no anger against sin;  for he knew not how to cry: \'O ye works of the Lord, praise ye the Lord and exalt Him above all forever\'".<BR>';

<!-- Answer   4 -->
a[4]=' The hymn by  Kassiani the Nun is sung at the Aposticha at matins on Holy Wednesday. This hymn, in the  eighth tone, is particularly moving when sung in a special Byzantine melody. <BR> The woman who had fallen into many sins, perceiving Thy divinity, O Lord, fulfilled the part of a myrrh- bearer; and with lamentations she brought sweet-smelling oil of myrrh to Thee before Thy burial. \'Woe is  me\', she said, \'for night surrounds me, dark and moonless, and stings my lustful passion with the love of  sin. Accept the fountain of my tears, O Thou who drawest down from the clouds the waters of the sea.  Incline to the groanings of my heart, O Thou who in Thine ineffable self-emptying hast bowed down the  heavens. I shall kiss Thy most pure feet and wipe them with the hairs of my head, those feet whose sound  Eve heard at dusk in Paradise, and hid herself for fear. Who can search out the multitude of my sins and  abyss of Thy judgments, O Savior of my soul? Despise me not, Thine handmaiden, for Thou hast mercy  without measure.<BR>';

<!-- Answer   5 -->
a[5]=' St. John the Theologion did not run away when the Lord was arrested, and stayed by the cross when He  was crucified. He was entrusted with the care of the Most Holy Theotokos and recounts in his gospel:   <BR>Now there stood by the cross of Jesus his mother, and his mother\'s sister, Mary the wife of Cleophas, and  Mary Magdalene. <span class=n>{26}</span> When Jesus therefore saw his mother, and the disciple standing by, whom he  loved, he saith unto his mother, Woman, behold thy son! <span class=n>{27}</span> Then saith he to the disciple, Behold thy  mother! And from that hour that disciple took her unto his own home. \(John 19:25-27\)<BR>';

<!-- Answer   6 -->
a[6]=' The Vespral divine liturgy of St. Basil the Great is served Thursday morning, following matins \(which is  usually served Wednesday night\). This service begins like vespers, and after the small entrance,  Prokeimenon and OT readings "switches" to divine liturgy as if the 3rd antiphon had just finished. The  small litany is sung, then the sequence for the reading of the epistle and Gospel, and the rest of the liturgy  of St. Basil continues. <BR>The Orthodox Tradition is that the Last Supper was held before the Passover and was thus celebrated with ordinary, leavened bread <SPAN CLASS=n>[Greek: artos]</SPAN> as opposed to unleavened \(bread\) <SPAN CLASS=n>[Greek: azumos]</SPAN>.  In addition, we place this day as Thursday. Matthew 26:26, Mark 14:22, Luke 22:19, 24:30 all state that our Lord Jesus Christ took <artos> and blessed it, etc.  Therefore, this could not have been the Passover meal.  Because *all* the evangelists testify to the use of <artos> at the Last Supper, we use ordinary, leavened bread for the Eucharist. <BR>';

<!-- Answer   7 -->
a[7]=' Many of the faithful eat nothing on Holy Friday until the vespers service Friday afternoon, the "taking  down from the cross". They attend the Royal hours in the morning fasting, and continue their fast until  the vespers finishes. Most parishes share a simple meal together at that time. The Greeks like to serve  lentil soup, with vinegar in it, to recall the vinegar the Lord was given when He was on the cross.<BR>';

<!-- Answer   8 -->
a[8]=' The Vespral Divine Liturgy of St. Basil the Great on Holy Saturday, the longest and latest Divine liturgy  of the year, proclaims the resurrection with a reading that include the first matinal gospel of the  resurrection, which is read in from of the tomb. It is short and very sweet: <BR>In the end of the sabbath, as it began to dawn toward the first day of the week, came Mary Magdalene and  the other Mary to see the sepulchre. <span class=n>{2}</span> And, behold, there was a great earthquake: for the angel of the  Lord descended from heaven, and came and rolled back the stone from the door, and sat upon it. <span class=n>{3}</span> His  countenance was like lightning, and his raiment white as snow: <span class=n>{4}</span> And for fear of him the keepers did  shake, and became as dead men. <span class=n>{5}</span> And the angel answered and said unto the women, Fear not ye: for I  know that ye seek Jesus, which was crucified. <span class=n>{6}</span> He is not here: for he is risen, as he said. Come, see the  place where the Lord lay. <span class=n>{7}</span> And go quickly, and tell his disciples that he is risen from the dead; and,  behold, he goeth before you into Galilee; there shall ye see him: lo, I have told you. <span class=n>{8}</span> And they departed  quickly from the sepulchre with fear and great joy; and did run to bring his disciples word. <span class=n>{9}</span> And as  they went to tell his disciples, behold, Jesus met them, saying, All hail. And they came and held him by  the feet, and worshipped him. <span class=n>{10}</span> Then said Jesus unto them, Be not afraid: go tell my brethren that they  go into Galilee, and there shall they see me. <span class=n>{11}</span> Now when they were going, behold, some of the watch  came into the city, and showed unto the chief priests all the things that were done. <span class=n>{12}</span> And when they  were assembled with the elders, and had taken counsel, they gave large money unto the soldiers, <span class=n>{13}</span>  Saying, Say ye, His disciples came by night, and stole him away while we slept. <span class=n>{14}</span> And if this come to  the governor\'s ears, we will persuade him, and secure you. <span class=n>{15}</span> So they took the money, and did as they  were taught: and this saying is commonly reported among the Jews until this day. <span class=n>{16}</span> Then the eleven  disciples went away into Galilee, into a mountain where Jesus had appointed them. <span class=n>{17}</span> And when they  saw him, they worshipped him: but some doubted. <span class=n>{18}</span> And Jesus came and spake unto them, saying, All  power is given unto me in heaven and in earth. <span class=n>{19}</span> Go ye therefore, and teach all nations, baptizing  them in the name of the Father, and of the Son, and of the Holy Ghost: <span class=n>{20}</span> Teaching them to observe all  things whatsoever I have commanded you: and, lo, I am with you alway, even unto the end of the world.  Amen. \(Matthew 28:1-20\)<BR>';

<!-- Answer   9 -->
a[9]=' At the end of the Midnight office for the Sunday of Pascha, which is appointed to be served so that it ends  just before Midnight, the Lenten Triodion is put away for the year. The canon appointed for this service is  quite beautiful, especially when sung in that peculiar sweet and sad Byzantine melody.<BR>';
