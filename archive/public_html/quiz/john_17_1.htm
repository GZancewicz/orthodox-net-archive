	<HTML>
	<HEAD>
	<TITLE>Questions about John 17: The High Priestly Prayer

</TITLE>

	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR><I>"These words spake Jesus, and lifted up his eyes to heaven, and said, Father, the hour is come; glorify thy Son, that thy Son also may glorify thee..."</I> <FONT SIZE="-2" FACE="Arial">John 17:1</FONT><BR><P><BR><OL><BR><LI>When did Jesus say this prayer?<BR><LI>What is Jesus teaching, by His *example* of praying to the Father? Take into account the circumstances of the prayer. <BR></OL><BR><BR>';

<!-- Question 1 -->
q[1]='<BR><I>"Father, the hour is come; glorify Thy Son, that Thy Son also may glorify Thee"</I> <FONT SIZE="-2" FACE="Arial">John 17:1, partial</FONT><BR><P><BR><OL><BR><LI>What is the "hour" that has come? <BR><LI>What is the "glory" Christ is talking about?<BR></OL><BR><BR>';

<!-- Question 2 -->
q[2]='<BR>"As thou hast given him power over all flesh, that he should give eternal life to as many as thou hast given him."</I> <FONT SIZE="-2" FACE="Arial">John 17:2</FONT><BR><P><BR>This is an oblique reference to what future revelation to which people?  <BR>';

<!-- Question 3 -->
q[3]='<BR>What definition for eternal life does Jesus give in His High Priestly prayer? Explain. <BR><BR>';

<!-- Question 4 -->
q[4]='<BR><I>"And now, O Father, glorify thou me with thine own self with the glory which I had with thee before the world was."</I> <FONT SIZE="-2" FACE="Arial">John 17:5</FONT><BR><P><BR>Our Lord is expressing in His words to the Father a dogma that later was officially and majestically proclaimed in the Symbol of Faith. What is it, and what are the words of the symbol of faith that apply?<BR>';

<!-- Question 5 -->
q[5]='<BR><I>"And now, O Father, glorify thou me with Thine own self with the glory which I had with thee before the world was."</I> <FONT SIZE="-2" FACE="Arial">John 17:5</FONT><BR><P><BR>There is more to say about these magnificent words.  Most heresies, up until the present day \(today the character of heresy has changed, in an especially pernicious way\), have directly touched upon the nature of God, the Holy Trinity, and especially the God-man, Jesus Christ.  These words of Christ directly refute which ancient heresy?  Explain. <BR>';

<!-- Question 6 -->
q[6]='<BR><I>"For I have given unto them the words which thou gavest me; and they have received them, and have known surely that I came out from thee, and they have believed that thou didst send me.  {9} I pray for them: I pray not for the world, but for them which thou hast given me; for they are thine. {10} And all mine are thine, and thine are mine; and I am glorified in them. {11} And now I am no more in the world, but these are in the world, and I come to thee. Holy Father, keep through thine own name those whom thou hast given me, that they may be one, as we are."</I> <FONT SIZE="-2" FACE="Arial">John 17:8-11</FONT><BR><P><BR><OL><BR><LI>Who is Christ directly referring to?<BR><LI>Who else?<BR></OL><BR><BR>';

<!-- Question 7 -->
q[7]='<BR><I>"And now I am no more in the world, but these are in the world, and I come to thee.  Holy Father, keep through thine own name those whom thou hast given me, that they may be one, as we are."</I> <FONT SIZE="-2" FACE="Arial">John 17:11</FONT><BR><P><BR>These words define an essential element of abiding in the truth, in the church, which ecumenism denies.  What is it?<BR>';

<!-- Question 8 -->
q[8]='<BR><I>"While I was with them in the world, I kept them in thy name: those that thou gavest me I have kept, and none of them is lost, but the son of perdition; that the scripture might be fulfilled.</I> <FONT SIZE="-2" FACE="Arial">\(John 17:12\)</FONT><BR><P><BR>Who is the "son of perdition"?<BR>';

<!-- Question 9 -->
q[9]='<BR>At which service\(s\) is this selection read?  Speculate why.<BR>';


	<!-- Answer   0 -->
a[0]=' The High Priestly prayer of Jesus was said on Holy Thursday, the evening of His arrest, after the supper in which He gave His holy body and blood to His disciples, and after Judas had gone out into the night to betray Him.  <P> Before His prayer, Jesus had only just finished a long discourse to His disciples, in which He explained to them about the tribulations they would face, ending His discourse with: <I>"These things I have spoken unto you, that in me ye might have peace.  In the world ye shall have tribulation: but be of good cheer; I have overcome the world."  </I> <FONT SIZE="-2" FACE="Arial">John16:33</FONT> St John Chrysostom comments that immediately after this: <I>"... Christ, speaking of the endurance of evil, putteth Himself forth, bidding us take example from Him."</I><FONT SIZE="-2" FACE="Arial">HOMILY LXXX, on St John\'s Gospel, 17:1</FONT> <P> The circumstances of that time were dangerous, and ominous.  All the disciples were afraid, and Jesus wished to show them the only true way to deal with their fears and desires. Therefore, according to St John: <I>"He betaketh Himself to prayer, teaching us in our temptations to leave all things, and flee to God"</I> <FONT SIZE="-2" FACE="Arial">Ibid.</FONT> <P> May it be that when we are faced with difficult or even overwhelming circumstances, we would follow the example of our Savior and prayer with fervor to God. <BR>';

<!-- Answer   1 -->
a[1]=' After beginning His discourse to the Father, which the Evangelist carefully refers to not as prayer, but as <I>"These words spake Jesus..."</I>, Jesus indicated His willingness to go to the cross by calling such an action "glory".  St John Chrysostom explains His expression with words that the world will not heed, but will warm the hearts of true Christians:  <P> <I>"Again He showeth us, that not unwilling He cometh to the Cross. For how could He be unwilling, who prayed that this might come to pass, and called the action "glory," not only for Himself the Crucified, but also for the Father? Since this was the case, for not the Son only, but the Father also was glorified. For before the Crucifixion, not even the Jews knew Him. "Israel," it saith, "hath not known Me" <FONT SIZE="-2" FACE="Arial">\(Isa. 1:3\)</FONT>; but after the Crucifixion, all the world ran to Him."</I> <FONT SIZE="-2" FACE="Arial">Ibid</FONT> <P> The time, or "hour" for our Lord\'s passion had come, and He was teaching by His discourse to His Father that this passion would glorify the Father and the Son. Because of Christ\'s crucifixion, His resurrection, His ascension and the subsequent giving of the Holy Spirit, the entire world would be exposed to the glory of God.  To know of the glory of God, and to have intimate knowledge of Him is salvation for a Christian.  Knowledge of this glory is only possible for those who understand the way of the cross and live in its light. To the uninitiated, or those who do not live according to the commandments, <I>"...the preaching of the cross is to them that perish foolishness; but unto us which are saved it is the power of God."</I> <FONT SIZE="-2" FACE="Arial">>"1 Cor 1:18</FONT><BR>';

<!-- Answer   2 -->
a[2]=' By speaking of "all flesh", according to St John Chrysostom, Jesus was teaching that <I>"... what belongs to the preaching is not confined to the Jews alone, but is extended to all the world, and \(He\) layeth down beforehand the first invitations to the Gentiles"</I> <FONT SIZE="-2" FACE="Arial">Ibid</FONT><BR>';

<!-- Answer   3 -->
a[3]=' <I>"And this is life eternal, that they might know Thee the only true God, and Jesus Christ whom Thou hast sent."</I> <FONT SIZE="-2" FACE="Arial">John 17:3</FONT> <P>  Jesus\' simple definition of eternal life contains an abyss of theology.  He said <I>"the only true God"</I>, so as to make firm in the apostles minds the true dogma, since He was about to send them to the Gentiles, who had false beliefs in many Gods.  From this we can see clearly that only the true teaching about the true God leads to salvation. This is the dogmatic aspect of salvation.  Only the Church can fulfill the words spoken by Christ to St Photini at the well: <I>"Ye worship ye know not what: we know what we worship: for salvation is of the Jews. {23} But the hour cometh, and now is, when the true worshippers shall worship the Father in spirit and in truth: for the Father seeketh such to worship him. {24} God is a Spirit: and they that worship him must worship him in spirit and in truth."</I> <FONT SIZE="-2" FACE="Arial">John 4:22-24 \(Concerning the Samaritan woman, see<A HREF=" https://www.orthodox.net//questions/samaritan_woman_1.htm"> https://www.orthodox.net//questions/samaritan_woman_1.htm</A>\)</FONT> <P> True Christians who worship the true God understand that knowledge of Him is only possible for those who become <I>like</I> Him. Our Lord told us: <I>"If ye love me, keep my commandments."  </I> <FONT SIZE="-2" FACE="Arial">John 14:15</FONT> The Holy Apostle and Theologian John also tells us:  <I>"And hereby we do know that we know him, if we keep his commandments."  </I> <FONT SIZE="-2" FACE="Arial">\(1 John 2:3\)</FONT> the <STRONG>knowledge</STRONG> of God only comes to those who live according to Who He is, and become like Him.  Knowledge and dogma are always joined to moral amendment and change.<BR>';

<!-- Answer   4 -->
a[4]=' The Symbol of Faith \(the Nicene Creed\) begins:  <P> <I>I believe in one God, the Father Almighty, Maker of heaven and the earth and of all things visible and invisible. And in one Lord Jesus Christ, the Son of God, the Only-begotten, begotten of the Father before all ages; Light of Light, true God of true God; begotten, not made; of one essence with the Father..."</I> <P> These words dogmatize the words of our Lord in His high priestly prayer. <I>"Jesus Christ the same yesterday, and to day, and for ever."</I> <FONT SIZE="-2" FACE="Arial">Heb 13:8</FONT> Jesus Christ was always true God of true God, and shared in all the glory of the Father, with the Holy Spirit.   Only the church can understand this dogma, expressed by the Lord Himself in a wondrous way, and later expounded in the Symbol of our faith.<BR>';

<!-- Answer   5 -->
a[5]=' The ancient heresy of Arianism held that Jesus Christ was a creature.  Arians held Him to be the highest and most perfect of all creatures, but believed Him to be a creation of God the Father, and therefore, not truly God.  Our Lords words directly refute this vile heresy.  He was always God, and will always be God, and with the Father and the Holy Spirit shares equally in the glory of the Godhead.<BR>';

<!-- Answer   6 -->
a[6]=' In His prayer for His holy apostles and disciples, our Lord mystically refers to the entire church. Later on He said: <I> Neither pray I for these alone, but for them also which shall believe on me through their word; {21} That they all may be one; as thou, Father, art in me, and I in thee, that they also may be one in us: that the world may believe that thou hast sent me.</I> <FONT SIZE="-2" FACE="Arial">John 17:20-21</FONT> <P> Blessed Bishop Nicolai explains:  <P> <I>"Christ\'s prayer [`Holy Father, keep through Thine own name those whom Thou hast given Me, that they may be one, as We are.\'] is not only for the apostles - although it is firstly for them - but is also for all those who have and will come to faith in Christ through their word. This prayer, then, was also for the holy Fathers of the First Ecumenical Council, that we commemorate today. `Keep them!\' - the Lord prayed to His Father. And the Father kept them from the errors of Arius , and inspired, illumined and strengthened them by the Holy Spirit to defend and confirm the Orthodox Faith. This prayer is for all of us who are baptized in the apostolic Church and who have from the apostles and their successors, come to know the saving name of Christ the Savior."</I> <FONT SIZE="-2" FACE="Arial"> Bishop Nikolai Velimirovic, Homilies, V. 1, on the 6th Sunday after Pascha</FONT><BR>';

<!-- Answer   7 -->
a[7]=' The Holy, Catholic and Apostolic Church has always understood that a defining criterion of Christianity is unity.  This unity must be "of spirit and truth", that is it must be in dogma, and in the way we live, worship and think.  Love for one another is not possible unless it abides in truth.  The ecumenists gloss over the absolute requirement of unity in truth, and strive for organizational unity, and even worship services \(such as those often performed with great pomp in the "World Council of Churches" gatherings\) which express for them this unity. These services, which bring together false believers and heretics, under the pretext of "unity", are an abomination before God. <BR>';

<!-- Answer   8 -->
a[8]=' Judas Iscariot, who betrayed Christ, is the "son of perdition" whom Jesus refers to.<BR>';

<!-- Answer   9 -->
a[9]=' The High priestly prayer of Jesus Christ to the Father is read for the commemorations of:  <UL> <LI>The Holy Fathers of the 1st Ecumenical Council.  <LI>The Holy Fathers of the First Six Ecumenical Councils <LI>Holy Thursday </UL> <P> The first Ecumenical Council refuted Arianism, which our Lord refutes Himself in His prayer, and all the councils solemnly dogmatized the truth concerning the God-man Jesus Christ.  On Holy Thursday, many texts are read which are from our Lord\'s passion, this prayer being preeminently one of them.<BR>';
