q[0]='<BR>The Parable of the Good Samaritan is only in the Evangelist Luke\'s Gospel \(Luke 10:25-37\), and is read on the 25th Sunday after Pentecost. This is always very close to the Nativity Fast. Why is the reading of this parable particularly apropos at this time of the year? There is a much deeper meaning to this parable than the external aspects of it. Think of the implications of the event that Nativity fast prepares us for. This parable displays those implications in a<BR>The wondrous and hidden way.<BR>';

<!-- Question 1 -->
q[1]='<BR>The parable is the second response to the question of a lawyer. Their encounter began as follows: <BR><P><BR><STRONG><i>And, behold, a certain lawyer stood up, and tempted him, saying, Master, what shall I do to inherit eternal life? <span class=n>{26}</span> He said unto him, What is written in the law? how readest thou? <span class=n>{27}</span> And he answering said, Thou shalt love the Lord thy God with all thy heart, and with all thy soul, and with all thy strength, and with all thy mind; and thy neighbor as thyself. <span class=n>{28}</span> And he said unto him, Thou hast answered right: this do, and thou shalt live.<BR></STRONG></i> <SPAN class=n>\(Luke 10:25-28\)</SPAN><BR><P><BR><OL><BR><LI>In this context, what is a "lawyer"? <BR><LI>Why did the lawyer ask his question? <BR><LI>The answer he gave quoted scripture. Which? <BR><LI>What is peculiar about the answer of the lawyer? Does his answer indicate that he knew anything about Jesus and His teachings? <BR></OL><BR><BR>';

<!-- Question 2 -->
q[2]='<BR>The Lawyer was not satisfied with this answer, and continued to interrogate Jesus, so Jesus began the parable: <BR><P><BR><STRONG><i>And he said unto him, Thou hast answered right: this do, and thou shalt live. <span class=n>{29}</span> But he, willing to justify himself, said unto Jesus, And who is my neighbor? <span class=n>{30}</span> And Jesus answering said, A certain man was going down from Jerusalem to Jericho, and fell among thieves, which stripped him of his raiment, and wounded him, and departed, leaving him half dead. </STRONG></i> <SPAN class=n>\(Luke 10:28-30\)</SPAN><BR><P><BR><OL><BR><LI>What is the external answer the parable gives? <BR><LI>Who does the "certain man" represent? <BR><LI>What does the road from Jerusalem to Jericho represent? Take special not of the tense of the verb in the expression, "going down" \(please note, the KJV and other mistranslate this text "went down". <BR></OL><BR>';

<!-- Question 3 -->
q[3]='<BR><STRONG><i>"... A certain man went down from Jerusalem to Jericho, and fell among thieves, which stripped him of his raiment, and wounded him, and departed, leaving him half dead. </STRONG></i> <SPAN class=n>\(Luke 10:30\)</SPAN><BR><P><BR><OL><BR><LI>What do the thieves represent? <BR><LI>Explain how the man is stripped of his raiment. What does this mean?<BR><LI>Why is the man left "half dead"? this has an important spiritual meaning. <BR></OL><BR><BR>';

<!-- Question 4 -->
q[4]='<BR><STRONG><i>"And by chance there came down a certain priest that way: and when he saw him, he passed by on the other side. <span class=n>{32}</span> And likewise a Levite, when he was at the place, came and looked on him, and passed by on the other side."</STRONG></i> <SPAN class=n>\(Luke 10:31-32\)</SPAN><BR><P><BR>There are two interpretations to the actions of the priest and the Levite. One is immediately obvious, and is unfortunately the only meaning people assimilate. The other meaning is much more profound. <BR><BR><OL><BR><LI>What is the immediately apparent teaching because of the inaction and apparent unwillingness to help of the priest and the Levite? <BR><LI>Let us explore the deeper meaning. What doe the priest and the Levite represent? <BR><LI>Why did the things the priest and Levite represent "pass by"? <BR><LI>there is yet more to know. The priest passed by on the other side, and the Levite at least came and looked upon the half dead man, although he also did nothing. Why is there a difference? <BR></OL><BR><BR>';

q[5]='<BR><STRONG><i>" But a certain Samaritan, as he journeyed, came where he was: and when he saw him, he had compassion on him ..."</BR>  <SPAN class=n>\(Luke 10:33\)</SPAN><BR><P><BR>Who is this "Samaritan"?  What kind of emotional resonance would this name have among the Jews?  What therefore is the meaning of  the term "Samaritan" in this context? <BR>';

	<!-- Answer   0 -->
a[0]='  external aspect of the parable of the Good Samaritan is a teaching concerning true charity. The inner meaning is a wonderful description of the ministry of Jesus Christ, and the effects of the incarnation on the state of man. At the time of year we read this parable, we are close to the Nativity Fast, which prepares us for the commemoration of the incarnation.  <BR>';

<!-- Answer   1 -->
a[1]=' A lawyer was a Jewish teacher, a so-called expert in the Law of Moses. The lawyer was one of many who asked questioned in order to trip up Jesus, in order to find some basis on which to judge him, and have Him done away with. The lawyer\'s answer to Jesus\' question is remarkable, because he quotes two passages of scripture from separate books of the law, and in so doing, binds them as one, cohesive thought. The passages he quotes are from Deuteronomy and Leviticus:  <P> "Hear, O Israel: The LORD our God is one LORD: <span class=n>{5}</span><i> And thou shalt love the LORD thy God with all thine heart, and with all thy soul, and with all thy might. </i><span class=n>{6}</span> And these words, which I command thee this day, shall be in thine heart: <span class=n>{7}</span> And thou shalt teach them diligently unto thy children, and shalt talk of them when thou sittest in thine house, and when thou walkest by the way, and when thou liest down, and when thou risest up. <span class=n>{8}</span> And thou shalt bind them for a sign upon thine hand, and they shall be as frontlets between thine eyes. <span class=n>{9}</span> And thou shalt write them upon the posts of thy house, and on thy gates. " <SPAN class=n>\(Deu 6:4-9\)</SPAN> <P> "Thou shalt not avenge, nor bear any grudge against the children of thy people, but <i> thou shalt love thy neighbor as thyself</i>: I am the LORD. " <SPAN class=n>\(Lev 19:18\)</SPAN> <P> The lawyer must have heard of Jesus teaching, and was repeating it. <BR>';

<!-- Answer   2 -->
a[2]=' The parable Jesus relates answers the question "Who is my neighbor", and provides and elegant description of true charity. The deeper meaning and hidden teaching is given by the symbolism of the events and characters in the parable.  <P> The "certain man" is Adam and al his descendants - all of mankind. This parable is describing man\'s condition and the means of his restoration. There is much to this tale, as our sickness is grave, and not healed easily or all at once.  <P> the word "Jerusalem" is interpreted "Vision of peace", and has always indicated the heavenly state. The man was headed to Jericho, which  is in the valley away from Jerusalem, and indicates, as Blessed Theophylact teaches, that he was traveling to: "a place sunk down low and suffocating with heat, that is, to life of passions". The tense of the verb is "going down", not "went" down". This trip, from Jerusalem to Jericho, then represents our fallen human nature, which is continuously going down towards a passionate life, if not for the mercy and help of God. <BR>';

<!-- Answer   3 -->
a[3]=' Demons<BR>';

a[4]='<BR>Lack of charity  Priest - the law  Levite - the prophets<BR>';
