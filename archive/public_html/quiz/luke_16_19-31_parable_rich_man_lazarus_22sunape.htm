	<HTML>
	<HEAD>
	<TITLE>Explanation of Scripture read by Orthodox Christians on the 22nd Sunday after Pentecost - The parable of the Rich man and Lazarus

</TITLE>

	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR><STRONG>There was a certain rich man, which was clothed in purple and fine linen, and fared sumptuously every day: {20} And there was a certain beggar named Lazarus, which was laid at his gate, full of sores"</STRONG> <FONT SIZE="-2" FACE="Arial">\(Luke 16:19-20\)</FONT><BR><P><BR>Why is the rich man unnamed, and only the poor beggar, Lazarus, given a name? <BR>';

<!-- Question 1 -->
q[1]='<BR>What is the goal of the parable? Jesus had at least two distinct reasons for telling it, one which was of a more immediate nature, and one which applies in any age. Explain both.<BR>';

<!-- Question 2 -->
q[2]='<BR>Are the rich man and Lazarus real persons? <BR><BR>';

<!-- Question 3 -->
q[3]='<BR>Why might Jesus have chosen to call the beggar Lazarus? This has to do with the time, Lazarus being a name that the Jews would recognize, and also because of the meaning of the name. What real person may the Lord have been alluding to? What does the name mean?<BR>';

<!-- Question 4 -->
q[4]='<BR>What were the sins of the rich man. There were much more than one! <BR>';

<!-- Question 5 -->
q[5]='<BR><STRONG>"And it came to pass, that the beggar died, and was carried by the angels into Abraham\'s bosom: the rich man also died, and was buried"</STRONG> <FONT SIZE="-2" FACE="Arial">\(Luke 16:22\)</FONT><BR><P><BR>Why into Abraham\'s bosom? <BR><P><BR>Comment on the different way in which the rich man and Lazarus ended their days. There is a great significance in these terse words! <BR><BR>';

<!-- Question 6 -->
q[6]='<BR><STRONG>"And in hell he lift up his eyes, being in torments, and seeth Abraham afar off, and Lazarus in his bosom. {24} And he cried and said, Father Abraham, have mercy on me, and send Lazarus, that he may dip the tip of his finger in water, and cool my tongue; for I am tormented in this flame.<BR>"</STRONG> <FONT SIZE="-2" FACE="Arial">\(Luke 16:23-24\)</FONT><BR><P> <BR>Jesus begins to reveal the reality of the next life to us as he describes the rich man. What can you glean from this statement. Mark it well! <BR>';

<!-- Question 7 -->
q[7]='<BR><STRONG>"And he cried and said, Father Abraham, have mercy on me, and send Lazarus, that he may dip the tip of his finger in water, and cool my tongue; for I am tormented in this flame.<BR>"</STRONG> <FONT SIZE="-2" FACE="Arial">\(Luke 16:24\)</FONT><BR><P><BR>Why is the tongue mentioned, and in general, what is the nature of the rich man\'s torments, which are metaphorically pointed to by his thirst? <BR>';

<!-- Question 8 -->
q[8]='<BR><STRONG>"But Abraham said, Son, remember that thou in thy lifetime receivedst thy good things, and likewise Lazarus evil things: but now he is comforted, and thou art tormented."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Luke 16:25\)</FONT><BR><P><BR>Jesus teaches, through Abraham, a critical truth about this life and the next here. What? <BR>';

<!-- Question 9 -->
q[9]='<BR>Allegorically, the parable has many meanings, especially for the Jews of the time. <BR><P><BR>Let us pick out two of the most important ones. <BR>Who does the rich man represent? Who does Lazarus represent? <BR><BR>';


	<!-- Answer   0 -->
a[0]=' The Parable  begins "There was a certain rich man".<FONT SIZE="-2" FACE="Arial">\(Luke 16:19\)</FONT> A certain rich man - he doesn\'t  even have a name. But wouldn\'t that be the way it would be? The scripture says about such a man, who is rich only in things in the temporal world, but poor in virtue, "Let his posterity be cut off; and in the generation following let their name be blotted out." <FONT SIZE="-2" FACE="Arial">\(Psalm 109:13\)</FONT> And the  Lord says also, "a froward heart shall depart from me: I will not know a wicked person." <FONT SIZE="-2" FACE="Arial">\(Psalm 101:4\)</FONT> And then our  Lord says, when He is speaking of the Judgment, "I tell you, I know you not whence ye are; depart from me, all ye workers of iniquity. There shall be weeping and gnashing of teeth, when ye shall see Abraham, and Isaac, and Jacob, and all the prophets, in the kingdom of God, and you yourselves thrust out." <FONT SIZE="-2" FACE="Arial">\(Luke 13:27-28\)</FONT> Isn\'t that what happened to the rich man? He saw Abraham and he knew he was thrust out, and he was a man with out a name anymore. He was a  man that God knew not. "His remembrance shall perish from the earth, and he shall have no name in the street." <FONT SIZE="-2" FACE="Arial">\(Job 18:17\)</FONT>, so  says the Prophet Job. God help  us, that we would not be like that, that we would have a name when eternity dawns.  This man had no name anymore.  <P> <I>"We must observe also, that among the heathen the names of poor men are more likely to be known than of rich. Now our Lord mentions the name of the poor, but not the name of the rich, because God knows and approves the humble, but not the proud."</I> <FONT SIZE="-2" FACE="Arial">\(St Gregory the Great, Pope of Rome\)</FONT> <P> <I>"The Lord gave no name to the rich man in this parable because such a man is not worthy to be remembered by God by name. As the Lord says, through the prophet, \'nor will I make remembrance of their names through My lips." <FONT SIZE="-2" FACE="Arial">\(Psalm 15:3\)</FONT> But the Lord mentions the poor man by name, for the names of the righteous are inscribed in the book of life"</I> <FONT SIZE="-2" FACE="Arial">\(Bl Theophylact, commentary on Luke\)</FONT><BR>';

<!-- Answer   1 -->
a[1]=' The enduring value of this story is to teach us about mercy, and the value of suffering. <P> <I>"The Lord, then, fashioned this story to teach those who show no mercy and give no alms what punishments await them, and to teach those who are suffering what good things they will enjoy on account of the sufferings they patiently endure in this life."</I> <FONT SIZE="-2" FACE="Arial">\(Bl Theophylact, commentary on Luke\)</FONT> <P> The Lord also wished to prophesy the Jews\' rejection of Him, even <STRONG>"though one rose from the dead"</STRONG> <FONT SIZE="-2" FACE="Arial">\(Luke 16:31, the end of the parable\)</FONT><BR>';

<!-- Answer   2 -->
a[2]=' No, they are characters in a parable, a fictional story, but the experiences depicted are true. <BR>';

<!-- Answer   3 -->
a[3]=' <I>"Lazarus is interpreted, "one who was  assisted." For he was poor, and the Lord helped him.</I> <FONT SIZE="-2" FACE="Arial">\(St John Chrysostom\)</FONT> <P> <I>"This discourse concerning the rich man and Lazarus was written after the manner of a comparison in a parable, to declare that they who abound in earthly riches, unless they will relieve the necessities of the poor, shall meet with a heavy condemnation. But the tradition of the Jews relates that there was at that time in Jerusalem a certain Lazarus who was afflicted with extreme poverty and sickness, whom our Lord remembering, introduces him into the example for the sake of adding greater point to His words."</I> <FONT SIZE="-2" FACE="Arial">\(St Cyril of Jerusalem\)</FONT><BR>';

<!-- Answer   4 -->
a[4]=' The rich man was guilty of wanton indulgence, vain words and gossip, vanity, and lack of mercy to the poor. <P> <I>"But the insolence and pride of the wealthy is manifested afterwards by the clearest tokens, for it follows, and no one gave to him. For so unmindful are they of the condition of mankind, that as if placed above nature they derive from the wretchedness of the poor an incitement to their own pleasure, they laugh at the destitute, they mock the needy, and rob those whom they ought to pity."</I> <FONT SIZE="-2" FACE="Arial">\(St Ambrose, Bishop of Milan\)</FONT>  <P> <I>"Now if the wearing of fine and precious robes were not a fault, word of God would never have so carefully expressed this. For no one seeks costly garments except for vainglory, that he may seem more honorable than others; for no one wishes to be clothed with such, where he cannot be seen by others."</I> <FONT SIZE="-2" FACE="Arial">\(  St. Gregory the Great, Pope of Rome\)</FONT>  <P> <I>"And here we must narrowly watch ourselves, seeing that banquets can scarcely be celebrated blamelessly, for almost always luxury accompanies feasting; and when the body is swallowed up in the delight of refreshing itself, the heart relaxes to empty joys."</I> <FONT SIZE="-2" FACE="Arial">\(  St. Gregory the Great, Pope of Rome\)</FONT>  <P> <I>"But what means it, that when in torments he desires his tongue to be cooled, except that at his feasts having sinned in talking, now by the justice of retribution, his tongue was in fierce flame; for talkativeness is generally rife at the banquet. "</I> <FONT SIZE="-2" FACE="Arial">\(  St. Gregory the Great, Pope of Rome\)</FONT> <BR>';

<!-- Answer   5 -->
a[5]=' Our Holy Father Abraham, among his numerous virtues, was distinguished in the minds of the Jews for his hospitality. This is also associated with salvation. <P> <I>"It may here be observed, that all who are offended by us are exposed to our view. But the rich man sees Lazarus not with any other righteous man, but in Abraham\'s bosom. For Abraham was full of love, but the man is convicted of cruelty. Abraham sitting before his door followed after those that passed by, and brought them into his house, the other turned away even them that abode within his gate."</I> <FONT SIZE="-2" FACE="Arial">\(St John Chrysostom\)</FONT> <P> To the  world, the death of Lazarus, was a non-event. Someone had to grab  him, because after all, he would start to smell, and throw him  somewhere, into some potter\'s field. No one came to pray for him. No one cared. No one knew him.  The rich  man might have noticed after two or three weeks, "Oh  the beggar is  not there anymore. I don\'t have to step over him anymore. That\'s good". His death  was of no consequence. It did not cause a ripple in the life of that time.  <P> But he  did NOT die alone, and his death was a matter of  great rejoicing in the heavens, because the angels  escorted him into Abraham\'s bosom. What does it say about those that die who  are righteous, and the appearances, both in this world , and the REAL appearances in the next? Solomon  says, "But the souls of the righteous are in the hand of God, and there shall no torment touch them. In the sight of the unwise they seemed to die: and their departure is taken for misery, And their going from us to be utter destruction: but they are in peace. For though they be punished in the sight of men, yet is their hope full of immortality. And having been a little chastised" ... Lazarus\' wounds were a little bit  of chastisement mind you. Don\'t look at the appearances, look at the truth! And "they shall be greatly rewarded: for God proved them, and found them worthy for himself. As gold in the furnace hath he tried them, and received them as a burnt offering. And in the time of their visitation they shall shine, and run to and fro like sparks among the stubble." <FONT SIZE="-2" FACE="Arial">\(Wisdom 3:1 - 7\)</FONT> So it is with the righteous when they die. The world sees a false picture, but we know the truth. <P> The rich man\'s death, although accompanied by great fanfare in the world, with paid mourners, and the playing of flutes, was an unimportant event in the heavens. He was merely  <B>buried</B>. This burial, in the bowels of the earth, is meant here to signify that he descending into the lowest depths of Hell.  <P> <I>"He \(the rich man, Ed.\) died then indeed in body, but his soul was dead before. For he did none of the works of the soul. All that warmth which issues from the love of our neighbor had fled, and he was more dead than his body. But no one is spoken of as having ministered to the rich man\'s burial as to that of Lazarus. Because when he lived pleasantly in the broad road, he had many busy flatterers; when he came to his end, all forsook him. For it simply follows, and was buried in hell. But his soul also when living was buried, enshrined in its body as it were in a tomb."</I> <FONT SIZE="-2" FACE="Arial">\(St John Chrysostom\)</FONT><BR>';

<!-- Answer   6 -->
a[6]=' We will have memory, and be able to recognize our great torment, and that others are blessed. We will see those we have wronged!  <P> <I>"And here we must remark what fearful sufferings are heaped upon the rich man in flames. For in addition to his punishment, his knowledge and memory are preserved. He knew Lazarus whom he despised, he remembered his brethren whom he left. For that sinners in punishment may be still more punished, they both see the glory of those whom they had despised, and are harassed about the punishment of those whom they have unprofitably loved."</I> <FONT SIZE="-2" FACE="Arial">St Gregory the Great, Pope of Rome\)</FONT><BR>';

<!-- Answer   7 -->
a[7]=' Those who feast and give themselves over to pleasure will invariably sin with idle talking, gossip, crude jokes, and the like.  <P> The rich man\'s thirst, which is never quenched, points to the wretched state of the unrighteous in Hell, <STRONG>"where their worm dieth not, and the fire is not quenched."</STRONG> <FONT SIZE="-2" FACE="Arial">\(Mark 9:48\)</FONT> <P> Christian! Note these things well! His memory is all preserved! He remembers his brothers. He remembers how they act. He knows Lazarus. He knows Abraham, and yet he had never met the man! He never met  him at all, because he never cared about the things he said, did he? The senses in the next life  are finer and stronger. We see and we understand more, we calculate more quickly in the next life, when we are unencumbered by the flesh. Indeed, even those in Hell have finer senses, so that they can more exquisitely  feel their pain. Do you see how terrifying this is? All their passions are still preserved, but  there is no fulfillment for their passions. His thirst for liquor will never be fulfilled, his thirst for women, for song, all of it will  go unfulfilled and will GNAW at him, and hurt him, and cut him, for eternity! "Their worm dieth not, and the fire is not quenched", <FONT SIZE="-2" FACE="Arial">\(Mark 9:48\)</FONT> it says in the scripture. Our passions are the worm! They will eat  at us, unless we exorcise them now, so that we will be unencumbered by them. And in the next life, every knee shall bend , and all things shall be made known. Those in Hades, they will  know, they will see Father Abraham, and this will make their pain even more real and more exquisite. <p> We should tremble when we think of these things!<BR>';

<!-- Answer   8 -->
a[8]=' All will receive some reward, even the evil. Let this not be only in this life for us. <P> <I>"All this then is said to Him because he chose the happiness of the world, and loved no other life but that in which he proudly boasted; but he says, Lazarus received evil things, because he knew that the perishableness of this life, its labors, sorrows, and sickness, are the penalty of sin, for we all die in Adam who by transgression was made liable to death."</I> <FONT SIZE="-2" FACE="Arial">\(Blessed Augustine\)</FONT>  <P> <I>"He says, You received good things in your life, \(as if your due;\) as though he said, If you have done any good thing for which a reward might be due, you have received all things in that world, living luxuriously, abounding in riches, enjoying the pleasure of prosperous undertakings; but he if he committed any evil has received all, afflicted with poverty, hunger, and the depths of wretchedness. And each of you came hither naked; Lazarus indeed of sin, wherefore he receives his consolation; you of righteous wherefore you endure your inconsolable punishment; and hence it follows, But now he is comforted, and you are tormented. "</I> <FONT SIZE="-2" FACE="Arial">\(St John Chrysostom\)</FONT> <P> <I>"Whatsoever then you have well in this world, when you recollect to have done any thing good, be very fearful about it, lest the prosperity granted you be your recompense for the same good. And when you behold poor men doing any thing blameably, fear not, seeing that perhaps those whom the remains of the slightest iniquity defiles, the fire of honesty cleanses. "</I> <FONT SIZE="-2" FACE="Arial">\(St Gregory the great, Pope of Rome\)</FONT><BR>';

<!-- Answer   9 -->
a[9]=' <I>"Whom does this rich man represent, this man so richly dressed, who enjoyed all those daily banquets? Is it not the Jewish people, who made a cult of exterior things, using the delights of the law which they had received, for vain motives, not for true profit? And whom does Lazarus signify, covered in wounds, if not the Gentile peoples? These, when converted to God, were not ashamed to confess their sins, that is to say, they had many wounds and open sores. As when some infection comes from within the body to ulcers of the skin, so showing itself exteriorly, so when we confess our sins, it is in a sense an outbreak of our sores. In confession we manifest in a very profitable way the virus of sin which had concealed its venom within the soul. Exterior wounds bring to the surface the festering sore beneath, and when we confess our sins, we uncover this hidden sore. But the unfortunate Lazarus wished only to eat of the crumbs that fell from the rich man\'s table, and no one would give him any, because those proud people disdained to admit the Gentiles to the knowledge of their law."</I> <FONT SIZE="-2" FACE="Arial">\(St Gregory the Great, Pope of Rome\)</FONT><BR>';
