	<TITLE>/i ) 
		{
			$t=2; 
			#push( @template_1,$_ );
			next;
		}

		if( m!<SCRIPT\s*LANGUAGE="JavaScript"\s*type="text/javascript"\s*SRC=header.js>\s*</SCRIPT>!i )
		{
			if( open( HEADER,"C:/www/orthodox.net/questions/header.html") ) 
			{ 
				$_ = "<!-- BEGIN:header.html -->\n";
				foreach $l ( <HEADER> ) 
				{ 
					
					last if($l =~ m!</BODY>!i );
					last if($l =~ m!</HTML>!i );
					next if($l =~ /^<!DOCTYPE/i); 
					next if($l =~ /<HTML>/i);
					next if($l =~ /<BODY>/i);
					$isHead=1 if($l =~ /<HEAD>/i );
					$isHead=0 if($l =~ s!</HEAD>!!i);
					$l =~ s!<LINK REL=[^>]*>!!;
					next if($isHead); 
					next if( $l =~ /^\s*$/s );
					if( $l =~ m!<A HREF="JavaScript:document.location=[^>]*! )
					{
						$l =~ s!<A HREF="JavaScript:document.location=[^>]*!<a href=https://www.orthodox.net//cgi-bin/html_print.pl/$FILENAME!;
						print "$_\n";
					}
					$_ .= $l; 
				}
				close HEADER; 
				$_ .= "\n<!-- END:header.html-->\n";
			}			
		}

		if( /<!--\s*BEGIN:Row1Col3text\s*-->.*/i )
		{
			$t=3; 
			push( @template_2,$_ ); 
			next;
		}
		if( /<!--\s*BEGIN:CUSTOMIZE:BODY.MAINCONTENT\s*-->.*/i 
		    || /<!--\s*BEGIN:Row2Col3text\s*-->.*/i 
                  ) 
		{
			$t=4; 
			push( @template_3,$_ ); 
			next;
		}

		# We will skip the nav bar lins - between 
		# <!-- BEGIN:row1col1.links --> and <!-- END:row1col1.links -->	
		if( /<!--\s*BEGIN:Row1Col1.links\s*-->/i )
		{ 
			$in_row1col1_links=1; 
			next;
		}
		if( /<!--\s*END:Row1Col1.links\s*-->/i )
		{ 
			$in_row1col1_links=0; 
			next;
		}
		next if( $in_row1col1_links );

		if( $t == 1 ) { push( @template_1,$_ ); } 
		if( $t == 2 ) { push( @template_2,$_ ); } 
		if( $t == 3 ) 
		{ 
			$found_row2Col3text_end=1 if( /<!--\s*END:Row1Col3text\s*-->.*/i );
			if( $found_row2Col3text_end )
			{
				push( @template_3,$_ ); 
			}
		} 
		if( $t == 4 ) { push( @template_4,$_ ); } 

		#if( $t == 1 ) { print TEMPLATE1 "$_";  } 
		#if( $t == 2 ) { print TEMPLATE2 "$_";  } 
		#if( $t == 3 ) { print TEMPLATE3 "$_";  } 
		#if( $t == 4 ) { print TEMPLATE4 "$_";  } 		
	}
	close( TEMPLATE ); 
}
