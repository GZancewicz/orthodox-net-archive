	<HTML>
	<HEAD>
	Questions about the Parable of the Wedding Feast 
	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR>The Parable of the Great supper appears in Matthew 22:1-14 and is read on the 14th Sunday after Pentecost. <BR><OL><BR><LI>Summarize the parable in a few words.<BR><LI>What was the immediate purpose for the telling of this parable? Consider to whom it was told, and it\'s proximity to other events and parables in the Gospel narrative. <BR><LI>What other parable served the same immediate purpose? <BR><LI>Which parable was more "condemning"? Why?<BR></OL><BR><P><BR>Note: A similar parable, in Luke 14:16-24 describes a different event and was told for a different purpose. <BR>';

<!-- Question 1 -->
q[1]='<BR>This parable is filled with much symbolism, as in all parables.  Let us examine some of the symbols, and construct a "glossary", to help us glean the deeper meaning. <BR><P><BR><STRONG><i>"The kingdom of heaven is like unto a certain king, which made a marriage for his son ..."</STRONG></i> <SPAN class=n>Matt 22:2</SPAN><BR><OL><BR><LI>Who is the "King"? <BR><LI>Who is the son? <BR><LI>Who is the bride?<BR><LI>What is the "marriage" \(what does it represent\)?<BR></OL><BR>';

<!-- Question 2 -->
q[2]='<BR><STRONG><i>"The kingdom of heaven is like unto a certain king, which made a marriage for his son, <span class=n>{3}</span> And sent forth his servants to call them that were bidden to the wedding: and they would not come."</STRONG></i> <SPAN class=n>Matt 22:2-3\)</SPAN><BR><OL><BR><LI>Who are these first servants? <BR><LI>How did the servants accomplish their task? <BR><LI>There are two "callings" mentioned, <i>"to call them that were bidden."</i>  What are these two callings? <BR></OL><BR><BR>';

<!-- Question 3 -->
q[3]='<BR><STRONG><i>"Again, he sent forth other servants, saying, Tell them which are bidden, Behold, I have prepared my dinner: my oxen and my fatlings are killed, and all things are ready: come unto the marriage.  <span class=n>{5}</span> But they made light of it, and went their ways, one to his farm, another to his merchandise: <span class=n>{6}</span> And the remnant took his servants, and entreated them spitefully, and slew them."</STRONG></i> <SPAN class=n>Matt 22:4-6\)</SPAN><BR><P><BR><OL><BR><LI>Who are the other servants?  \(Don\'t try too hard to come up with something different on this one!\)<BR><LI>Who are the remnant, that <i>"took his servants, and entreated them spitefully, and slew them"</i><BR><LI>What is the meaning of the one who went "to his farm"?  This is an indication of a particular kind of sinful passion.<BR><LI>What is the meaning of the one who went "to his merchandise"? <BR></OL><BR><BR>';

<!-- Question 4 -->
q[4]='<BR><STRONG><i>"But when the king heard thereof, he was wroth: and he sent forth his armies, and destroyed those murderers, and burned up their city. <span class=n>{8}</span> Then saith he to his servants, The wedding is ready, but they which were bidden were not worthy."  </STRONG></i> <SPAN class=n>\(Matt 22:7-8\)</SPAN><BR><P><BR>What does Jesus prophesy here? <BR><BR>';

<!-- Question 5 -->
q[5]='<BR><STRONG><i>"Go ye therefore into the highways, and as many as ye shall find, bid to the marriage.  <span class=n>{10}</span> So those servants went out into the highways, and gathered together all as many as they found, both bad and good: and the wedding was furnished with guests."</STRONG></i> <SPAN class=n>Matt 22:9-10\)</SPAN><BR><OL><BR><LI>This is another prophesy?  Of what? <BR><LI>What do the highways represent? <BR><LI>It was said that there were <i>"both bad and good"</i> in the festal hall. <BR>	<OL><BR>	<LI>What is the meaning? <BR>	<LI>How, and when will the "good" be discerned from the "bad". <BR>	<LI>There is another parable which very dramatically illustrates this truth.  What is it? <BR>	</OL><BR></OL><BR>';

<!-- Question 6 -->
q[6]='<BR><STRONG><i>"And when the king came in to see the guests, he saw there a man which had not on a wedding garment ..."</STRONG></i> <SPAN class=n>\(Matt 22:11\)</SPAN><BR><P><BR>In order to understand what subsequently transpires, we must know of the custom of the "wedding garment", in the culture to which Jesus was speaking.  Explain this custom, and it\'s spiritual application. <BR><BR>';

<!-- Question 7 -->
q[7]='<BR><STRONG><i>"And he saith unto him, Friend, how camest thou in hither not having a wedding garment? And he was speechless."</STRONG></i> <SPAN class=n>\(Matt 22:12\)</SPAN><BR><OL><BR><LI>What does the King\'s interrogation represent? <BR><LI>Why did the King require the servant to be wearing a wedding garment?<BR><LI>Why was the servant speechless?<BR>';

<!-- Question 8 -->
q[8]='<BR><STRONG><i>"Then said the king to the servants, Bind him hand and foot, and take him away, and cast him into outer darkness, there shall be weeping and gnashing of teeth."</STRONG></i> <SPAN class=n>\(Matt 22:13\)</SPAN><BR><P><BR><OL><BR><LI>Who are the servant the king orders?<BR><LI>Why was the servant bound hand and foot?  This represents and important fact, which will help us only in this life, if we learn it, and live like we know it<BR><LI>Tell what the gnashing of teeth represents.  <BR></OL><BR><BR>';

<!-- Question 9 -->
q[9]='<BR><STRONG><i>"For many are called, but few are chosen."</STRONG></i> <SPAN class=n>\(Matt 22:14\)</SPAN><BR><P> <BR>A strange saying.  What does it mean? <BR>';

<!-- Question 10 -->
q[10]='<BR>Compare and contrast the Parable of the Evil Husbandmen and the Parable of the Wedding Feast. <BR>';


	<!-- Answer   0 -->
a[0]=' The parable of the wedding Feast was told to many of the Jews who were plotting to kill Jesus.  His purpose was to show them that they were without excuse for their rejection of Christ, and foretold the destruction of Jerusalem, just as the parable of the evil husbandmen \(which is read on the preceding Sunday, the 13th after Pentecost\).  <P> In the parable, a "certain king" who made a great supper in celebration of the marriage of his son, and invited many to come.  He sent out servants to extend the invitation, but they were rejected.  He then sent out more servants, and these were also rejected with lame excuses, and some of the invitees even went so far as to beat and kill the man\'s servants.  This angered the king, and he sent forth his armies to destroy the ungrateful and evil invitees. He then sent out more servants, telling them to go out into the highways, and bid as many as they found to come to the wedding feast.  The wedding hall was filled with guests, "both good and bad". During the feast the king went out about his guests and found a man who was not wearing his wedding garment, and questioned him about it.  The man was speechless and without excuse, and the king ordered that this disobedient man be cast out of the wedding hall, and bound.  At the end of the parable, Jesus gives the warning: "For many are called, but few are chosen" <SPAN class=n>\(Matthew 22:14\)</SPAN> <P><BR>The parable of the Great Supper heaps even greater condemnation upon the Jews who were soon to crucify their Messiah, because it details the rejection of a wedding feast by the King\'s servants, which is a gift given totally gratis, whereas in the parable of the evil husbandmen, their rejection of their master came after he asked of them some fruits of his vineyard, which He had provided for them, with the expectation that they would work in it.  Since the parable of the wedding feast follows the other parable, it serves to amplify and make even more clear the great crime of the Jews, and indeed, all those who reject the God-man Jesus Christ. <BR>';

<!-- Answer   1 -->
a[1]=' In the parable, the King is God, and the Son is Jesus Christ.  The marriage is an allusion to the joy that is possible for those who are the bride of Christ, that is, the church.  All those who love Christ, and live in the light of His commandments are joined to Him, in His body, as a bride and bridegroom are joined in marriage.  <P> <i>"And wherefore is it called a marriage?  One may say.  That thou mightest learn God\'s tender care, His yearning towards us, the cheerfulness of the state of things, that there is nothing sorrowful there, nor sad, but all things are full of spiritual joy: Therefore also John calls Him a bridegroom, therefore Paul again saith, "For I have espoused you to one husband;" and, "This is a great mystery, but I speak concerning Christ and the Church.""</i> <SPAN class=n>\(St John Chrysostom\)</SPAN><BR>';

<!-- Answer   2 -->
a[2]=' The servants are the holy prophets, who proclaimed the coming of Christ by their words and deeds.  <P> <i>"And when were they bidden? By all the prophets; by John again; for unto Christ he would pass all on, saying, "He must increase, I must decrease;"7 by the Son Himself again, "Come unto me, all ye that labor and are heavy laden, and I will refresh you;" and again, "If any man thirst, let him come unto me, and drink."9  But not by words only, but also by actions did He bid them, after His ascension by Peter, and those with him. "For He that wrought effectually in Peter," it is said, "to the apostleship of the circumcision, was mighty also in me towards the Gentiles."</i> <P> The two callings darkly mention a deep mystery - how God is revealed to the human soul.  Our salvation is corporate, and it is personal.  Truly the breath of the Holy Spirit enlightens a man, but this does not happen to him in isolation, as he must also be part of a body, that is the church, and respond to it\'s faithful teaching.  <P> <i>"If they were already invited, why are they going to invite them again? Learn, then, that each of us by nature has been called towards the good, for we are being called by the word of the innate teacher within us. But God also sends us external teachers, to call us from without, we who were first called by the word in our nature."</i> <SPAN class=n>\(Bl. Theophylact, Commentary on Matt 22:1-7\)</SPAN><BR>';

<!-- Answer   3 -->
a[3]=' The second set of servants also represents the prophets.  God sent many prophets to His people, and from Moses to Zachariah, through john the Baptizer, their message was not heard and obeyed, and some of the prophets were even persecuted and killed. Our Lord in another place confirms this and accuses the Jews: <i>"O Jerusalem, Jerusalem, thou that killest the prophets, and stonest them which are sent unto thee, how often would I have gathered thy children together, even as a hen gathereth her chickens under her wings, and ye would not! <span class=n>{38}</span> Behold, your house is left unto you desolate.  "</i> <SPAN class=n>\(Mat 23:37-38\) </SPAN> <P> The one who "went to his farm" denotes those who are turned towards a life of pleasure and carnality - in this case the field represents the flesh, that is, the body.  Many fools choose the pleasures of the flesh above the invitation of God to become holy.  <P> The one who went to his merchandise represents sins of acquisitiveness, and worldliness.  Certainly, many who call themselves Christians, and yet keep their pocketbooks tightly closed, and give not their tithe to God, are guilty of this sin!<BR>';

<!-- Answer   4 -->
a[4]=' Jesus prophesies the razing razing of Jerusalem with these terrible words: <i>"By His armies we understand the Romans under Vespasian and Titus, who having slaughtered the inhabitants of Judea, laid in ashes the faithless city."</i> <SPAN class=n>\(St. Jerome\)</SPAN> <P> The attentive Christina will also recognize in these words the foretelling of the state of the soul and body that rejects the mercy of God, and follows it\'s own path of sensual cares and worldly life. <BR>';

<!-- Answer   5 -->
a[5]=' The parable of the Wedding Feast not only condemns the Jews who would reject Christ, but is also prophecies the coming on of the Gentiles.  Highways lead away from the city, the heavenly Jerusalem.  Unclean things were kept outside the city walls, and the Gentiles were also considered unclean.  Highways twist and turn, and lead to many places, and this signifies the many and varied errors of the Gentiles, who knew not the true God.  The kings servants brought good and bad into the festal hall, and the church has always been filled with good and bad. In the last day, the good will be distinguished from the bad, as tares from the wheat \(which the Lord also spoke of in a parable\).  The good will be known by how much they became like Christ - how much they lived in the light of the gospel.  <BR>';

<!-- Answer   6 -->
a[6]=' "... if those that were called to a feast did not have their own festive garments, they received garments at the entrance from the steward of the house.  Anyone who refused to receive such a garment upon arrival expressed thereby disdain and even contempt for the master of the house, as if saying: "I shall eat and drink with thee, but I want nothing to do with thee."  <SPAN class=n>\(Fr Victor Patapov,<A HREF=" http://www.stjohndc.org/parables/9509.htm"> http://www.stjohndc.org/parables/9509.htm</A>\)</SPAN> <BR>';

<!-- Answer   7 -->
a[7]=' The King passing among his guests represents the last judgment. We are admitted to the feast, that is baptized and brought into the church, at no cost, but we are given a "wedding garment" and charged to keep it clean.  We sing in the baptism service: <i>"As many as have been baptized into Christ, have put on Christ."</i> Our Lord is good and pure, and we must desire to become like Him, and learn of Him, that is, to "put on Christ".  This is what constitutes the wearing of a wedding garment.  It is a life of repentance, and desire, and acceptance of God\'s mercy.  At the last judgment, we will be examined - have we lived in the light we have been given? If we have not struggled to keep clean the wedding garment we have been given, all of our ingratitude and false way of living will be manifestly exposed, and there will be no opportunity for excuses. <P> <i>"And yet the calling was of grace; wherefore then doth He take a strict account?  Because although to be called and to be cleansed was of grace, yet, when called and clothed in clean garments, to continue keeping them so, this is of the diligence of them that are called."</i> <SPAN class=n>\(St John Chrysostom\)</SPAN> <P> <i>"Wherefore also great is the punishment appointed for them that have been remiss.  For as they did despite by not coming, so also thou by thus sitting down with a corrupt life. For to come in with filthy garments is this namely, to depart hence having one\'s life impure; wherefore also he was speechless."</i> <SPAN class=n>\(St John Chrysostom\)</SPAN> <P> <i>"The Dread Judgment knows no witness or court records. Everything is inscribed in the souls of men, and these inscriptions, these "books," will be opened. Everything will become clear to all and to oneself; the state of a person\'s soul sends him to the right or the left. Some will go to the place of rejoicing, others to the place of horror. When the books will be opened it will become clear to all that the root of all transgressions is in a man\'s soul. Consider a drunkard or a fornicator: when the body dies, some think the sin, too, has died. No; the inclination to sin was in the soul, and to the soul the sin was sweet. And if the soul has not repented of this sin, has not freed itself of it, it will come to the Dread Judgment with the same desire for the sweetness of sin and will never sate this desire. There will be the suffering of hatred and wrath in this soul. This is the state of hell. "The fiery Gehenna" -  this is the inner fire, the fire of weakness and anger, and here will be the wailing and gnashing of teeth of powerless wrath."</i> <SPAN class=n>\(Saint John \(Maximovitch\), Archbishop of Shanghai and San Francisco, The Sunday of the Last Judgment, 1956. From Orthodox Life, Vol.2, 1985\)</SPAN><BR>';

<!-- Answer   8 -->
a[8]=' The angels will be Gods\' servants in the last judgement:  <P>  <i>"... in the time of harvest I will say to the reapers, Gather ye together first the tares, and bind them in bundles to burn them: but gather the wheat into my barn... <span class=n>{39}</span> ... the reapers are the angels. <span class=n>{40}</span> As therefore the tares are gathered and burned in the fire; so shall it be in the end of this world. <span class=n>{41}</span> The Son of man shall send forth his angels, and they shall gather out of his kingdom all things that offend, and them which do iniquity; <span class=n>{42}</span> And shall cast them into a furnace of fire: there shall be wailing and gnashing of teeth. <SPAN class=n>\(Mat 13:30, 39-42\)</SPAN> <P> The binding of the unworthy servant indicates the "binding" of the soul\'s powers of action. <i>"for in this present age is the time to act and do, but in the age to come all of the soul\'s powers of action are bound, and a man cannot then do any good thing to outweigh his sins"</i> <SPAN class=n>\(Bl Theophylact, Commentary on Matt 22:11-14\)</SPAN> <P> <i>"The gnashing of the teeth is the meaningless repentance that will then take place"</i> <SPAN class=n>\(Ibid.\)</SPAN><BR>';

<!-- Answer   9 -->
a[9]=' Our Lord\'s saying was partly directed towards the Jews, who were overly confident of their special position before God.  They did not understand the meaning of this rebuke.  God calls all, but chooses few, because few answer the call.  <P> <i>" For as many as are led by the Spirit of God, they are the sons of God. <span class=n>{15}</span> For ye have not received the spirit of bondage again to fear; but ye have received the Spirit of adoption, whereby we cry, Abba, Father. <span class=n>{16}</span> The Spirit itself beareth witness with our spirit, that we are the children of God: <span class=n>{17}</span> And if children, then heirs; heirs of God, and joint-heirs with Christ; if so be that we suffer with him, that we may be also glorified together. "</i> <SPAN class=n>\(Rom 8:14-17\)</SPAN><BR>';

<!-- Answer   10 -->
a[10]=' <UL> <LI>Similarities <BR><OL> <LI>Both rebuked the Jews for their rejection of the Messiah <LI>Both prophesied the destruction of Jerusalem  <LI>Both prophesy the calling of the Gentiles </OL><BR><LI>Differences <BR><OL> But this parable hath something also more than the other. For it proclaims beforehand both the casting out of the Jews, and the calling of the Gentiles; and it indicates together with this also the strictness of the life required, and how great the punishment appointed for the careless.  </OL><BR></UL><BR> <i>"Seest thou both in the former parable and in this the difference between the Son and the servants?  Seest thou at once the great affinity between both parables, and the great difference also?  For this also indicates God\'s long-suffering, and His great providential care, and the Jew\'s ingratitude. But this parable hath something also more than the other does.  For it proclaims beforehand both the casting out of the Jews, and the calling of the Gentiles; and it indicates together with this also the strictness of the life required, and how great the punishment appointed for the careless."</i><BR>';


	var module='matt_21_1-14_parable_wedding_feast_14sunape_1.html';
