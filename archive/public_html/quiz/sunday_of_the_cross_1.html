<!-- Question 9 -->
q[9]='<BR>How does one venerate the cross at the matins service?<BR>How would one person venerate the cross.  How should two people venerate the cross \(this is done to save a little time, when there is a large amount of the faithful\).<BR><BR>';


	<!-- Answer   0 -->
a[0]='<BR>IN THE prophet Ezekiel \(9:6\) it is said that when the Angel of the Lord was sent to punish and destroy the sinning people, it was told him not to strike those on whom the "mark" had been made.  In the original text this mark is called "tau," the Hebrew letter corresponding to the letter "T.", which is how in ancient times the cross was made, which then was an instrument of punishment. <P> Moses, who held his arms raised in the form of a cross during the battle, gave victory to the Israelites over the Amalekites.  He also, dividing the Red Sea by a blow of his rod and by a transverse blow uniting the waters again, saved Israel from Pharaoh, who drowned in the water, while Israel crossed over on the dry bottom \(Exodus, chs.  14, 17\). <P> Elisha brought a child back to life again by stretching upon him in the form of a cross:  <P> And when Elisha was come into the house, behold, the child was dead, and laid upon his bed.  <span class=n>{33}</span> He went in therefore, and shut the door upon them twain, and prayed unto the LORD.  <span class=n>{34}</span> And he went up, and lay upon the child, and put his mouth upon his mouth, and his eyes upon his eyes, and his hands upon his hands: and he stretched himself upon the child; and the flesh of the child waxed warm.  <span class=n>{35}</span> Then he returned, and walked in the house to and fro; and went up, and stretched himself upon him: and the child sneezed seven times, and the child opened his eyes.  \(2 Ki 4:32-35\)<BR>';

a[1]=' And Jesus answered them, saying, The hour is come, that the Son of man should be glorified.  <span class=n>{24}</span> Verily, verily, I say unto you, Except a corn of wheat fall into the ground and die, it abideth alone: but if it die, it bringeth forth much fruit.  <span class=n>{25}</span> He that loveth his life shall lose it; and he that hateth his life in this world shall keep it unto life eternal.  <span class=n>{26}</span> If any man serve me, let him follow me; and where I am, there shall also my servant be: if any man serve me, him will my Father honor.  <span class=n>{27}</span> Now is my soul troubled; and what shall I say?  Father, save me from this hour: but for this cause came I unto this hour.  <span class=n>{28}</span> Father, glorify thy name.  Then came there a voice from heaven, saying, I have both glorified it, and will glorify it again.  <span class=n>{29}</span> The people therefore, that stood by, and heard it, said that it thundered: others said, An angel spake to him.  <span class=n>{30}</span> Jesus answered and said, This voice came not because of me, but for your sakes.  <span class=n>{31}</span> Now is the judgment of this world: now shall the prince of this world be cast out.  <span class=n>{32}</span> And I, if I be lifted up from the earth, will draw all men unto me.  <span class=n>{33}</span> This he said, signifying what death he should die.  \(John 12:23-33\) <P> Jesus said to Peter, after his three-fold restoration:  <P>P Verily, verily, I say unto thee, When thou wast young, thou girdedst thyself, and walkedst whither thou wouldest: but when thou shalt be old, thou shalt stretch forth thy hands, and another shall gird thee, and carry thee whither thou wouldest not.  <span class=n>{19}</span> This spake he, signifying by what death he should glorify God.  And when he had spoken this, he saith unto him, Follow me.  \(John 21:18-19\)<BR>';

a[2]=' the Romans used crucifixion as a punishment for slaves and the worst criminals.  It was a punishment designed to invoke terror, because of it\'s extreme pain, and the way it displayed the dying man for all to see in his death agonies.  No Roman citizen was ever crucified. <BR>';

<!-- Answer   4 -->
a[4]=' Christians do not prostrate on Sunday because this is the day we always celebrate the Resurrection, and we recall how God is able to make us stand.  Our standing reminds us of the resurrection.  There are one or two Sundays a year when we do prostrate \(the Third Sunday of Great Lent, and the Exaltation of the Holy Cross, if it falls on a Sunday.  On this day, the hymn "Before Thy cross", which we sing while prostration, teaches us what our prostrations mean: <P>  Before Thy Cross, / we fall down in worship, O Master, / and Thy holy Resurrection / we glorify.  <P> When we prostrate, it is in worship of the Risen Lord, and when we raise ourselves up, we recall the resurrection.  <P> A Christian prostrates when he makes the sign of the cross, and falls to his hands and knees \(it is usually easier to have the hands touch the floor a moment before the knees\), and bows his head to the ground, then gets back up.<BR>';

<!-- Answer   5 -->
a[5]=' The cross is the sign of victory.  The mind of the church also knows this symbol as an effective prayer for all circumstances, if it is made with faith.  There are innumerable examples of the deliverance from Christians from every kind of danger, merely when they made the sign of the cross with faith.  <P> The sign of the cross is made by placing the thumb and first 2 fingers of the right hand together in a point, which symbolizes the Holy Trinity, with the other two fingers against the palm, which symbolizes the two natures of Christ, and touching the forehead, then the breast, then the right and left shoulders.  The is another Orthodox rite, called "Old Believer", or "Old Rite", where the fingers are held differently, but the meaning is the same. <BR>';

<!-- Answer   6 -->
a[6]=' St Helen, mother of St Constantine, discovered the Holy and Precious cross during excavations in Jerusalem, in the 4th century.  The cross was found lying with the other crosses, form the thieves that had been crucified on each side of Christ.  The true cross was identified when a dead man was raised back to life again after the cross was touched to him. <BR>';

<!-- Answer   7 -->
a[7]=' WE sing the troparion of the cross every Wednesday and Friday.  On Wednesday, Christ was betrayed \(sold\), and on Friday He was crucified. <P> Most Sunday matins services, among the canons we sing is the "Canon to the Cross and Resurrection".  <P> On Friday\'s, instead of a Theotokion in some places of the services, we sing a "StavroTheotokion", which is a hymn about the Theotokos and the Holy Cross.  <P> We make the sign of the cross  innumerable times, during our daily life, for every circumstance. <BR>';

<!-- Answer   8 -->
a[8]=' 3rd Sunday of Great Lent <BR> Exaltation of the Precious and Life-giving cross \(Sep 14\) <BR> Procession of the Holy cross \(Aug 1\) ';

<!-- Answer   9 -->
a[9]=' In general, whenever one venerates an icon, or the Holy Gospel, or the Holy Cross in the center of the church, he makes two bows or prostrations, while making the sign of the cross.  He then kisses the holy object on the icon stand, turns to the priest and receives a blessing, and returns back in front of the icon stand and does another bow or prostration.  <BR> 2 bows, get a blessing, another bow <P> When two people venerate, they do everything together.  The eldest gets a blessing first, and returns to the front of the icon stand, and waits for his partner.  When they both are back in from of the icon stand, they do their final bow or prostration together.  <P> On the Sunday of the Holy cross, prostrations are done in front of the Cross.<BR>';
