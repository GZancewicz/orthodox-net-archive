<!-- Answer   2 -->
a[2]=' Both. <BR>For example, the greatest dogma, \(the existence of God, Who is one God in three persons: Father, Son, and Holy Spirit\) can only be understood by becoming holy and pure, because God only reveals Himself according to the purity of the soul. An understanding of the inner life of the Holy Trinity can only be obtained by aquiring the virtue which the Trinity most exemplifies - Love. <BR><SPAN CLASS=n>[John 7:17]</SPAN>  If any man will do his will, he shall know of the doctrine, whether it be of God, or whether I speak of myself.<BR><SPAN CLASS=n>[1<SPAN CLASS=n> John 4:8]</SPAN></SPAN>  He that loveth not knoweth not God; for God is love.<BR>';

<!-- Answer   3 -->
a[3]=' All we know about God was revealed to us by Him.<BR>';

<!-- Answer   4 -->
a[4]=' Not all dogmas are written down. Some are only knowable by the extremely pure, some of which have been  "... caught up into paradise, and heard unspeakable words, which it is not lawful for a man to utter." <SPAN CLASS=n>[2 Cor 12:4]</SPAN> <BR>Some dogmas have not been fully revealed, such as the state of the soul after the final judgment. <BR><blockquote> [27, 66] "Of the dogmas and  kerygmas <SPAN CLASS=n>[preaching or proclaiming the Good News]</SPAN> preserved in the Church, some we possess from written teaching and others we receive from the tradition of the Apostles <SPAN CLASS=n>[2 Thes 2: 15; 2 Tim 2: 2; 1 Jn 2: 24]</SPAN> handed on to us in mystery. In respect to piety both our of the same force. No one will contradict any of these, no one, at any rate, who is even moderately versed in matter ecclesiastical. Indeed, were we to try to reject unwritten customs as having no great authority, we would unwittingly injure the Gospel in its vitals; or rather we would reduce  kerygma to a mere term. For instance, to take the first and most general example, who taught us in writing to sign with the sign of the cross those who have trusted in the name of our Lord Jesus Christ? What writing has taught us to turn to the East in prayer? Which of the saints left us in writing the words of the epiclesis at the consecration <SPAN CLASS=n>[prayer the priest prays at every Mass that the Holy Spirit will change the bread and wine into the Body and Blood of Christ]</SPAN> of the Bread of the Eucharist and of the cup of Benediction? For we are not content with those words the Apostle or the gospel has recorded, but we say other things also, both before and after; and we regard these other words, which we have received from unwritten teaching, as being of great importance to the mystery."<BR>"Where is it written that we are to bless the baptismal water, the oil of anointing, and even the one who is being baptized? Is it not from silent and mystical tradition? Indeed, in what written word is even the anointing with oil taught? Where does it say that in baptizing there is to be a triple immersion? And the rest of the things done in baptism,--where is it written that we are to renounce Satan and his angels? Does this not come from that secret and arcane teaching which are Fathers guarded in a silence not too curiously meddled with and not idly investigated, when they had learned well that reverence for the mysteries is best preserved by silence . . . . In the same way the Apostles and Fathers who, in the beginning, prescribed the Church\'s rites, guarded in secrecy and silence the dignity of the mysteries; for that which is blabbed at random and in the public ear is no mystery at all. This is the reason for our handing on of unwritten precepts and practices: that the knowledge of our dogmas may not be neglected and held in contempt by the multitude through too great a familiarity. Dogma and kerygma are two distinct things. Dogma is observed in silence; kerygma is proclaimed to all the world."<BR>[St Basil the Great, "The Holy Spirit" 27:66  ] </blockquote><BR><blockquote>  What are "our traditions"? They are everything that the God-man Christ, He Himself, and by the Holy Spirit, gave the commandment to hold and to live according to Them; whatever He delivered to his Church, in which He dwells continuously with His Holy \'Spirit \(Cf. Mt. 28:19-29\). "Our traditions" are our whole life in grace in God, Christ, and the Holy Spirit, the life of us Christians, which began in the Church of Christ, through the Apostles, by the decent of the Holy Spirit. ... Thus, our "traditions" are the new life of the grace in the Holy Spirit, which is the soul of the Church, the life in the Eternal Truth of God, in the Eternal Justice of God, in the Eternal Love of God, in the Eternal Life of God. Here man is not creating anything, nor can he create the Eternal Truth, the Eternal Justice, the Eternal Love, the Eternal Life, but they are for him to accept, to change into his own. <SPAN CLASS=n>[Fr. Justin Popovich in Orthodox Faith and Life in Christ]</SPAN> </blockquote><BR></blockquote>  Christian religion is not a certain philosophic system, about which learned men, trained in metaphysical studies, argue and then either espouse or reject, according to the opinion each one has formed. It is faith, established in the souls of men, which ought to be spread to the many and be maintained in their consciousness.<BR>There are truths in Christianity that are above out intellectual comprehension, incapable of being grasped by the finite mind of man. Our intellect takes cognizance of them, becomes convinced of their reality, and testifies about their supernatural existence.<BR>Christianity is a religion of revelation. The Divine reveals its glory only to those who have been perfected through virtue. Christianity teaches perfection through virtue and demands that its followers become holy and perfect. It disapproves of and opposes those who are under the influence of the imagination. He who is truly perfect in virtue becomes through Divine help outside the flesh and the world, and truly enters another, spiritual world; not, however, through the imagination, but through the effulgence of Divine grace. Without grace, without revelation, no man, even the most virtuous, can transcend the flesh and the world.<BR>["Modern Orthodox Saints, St. Nectarios of Aegina", Dr. Constantine Cavarnos, Institute for Byzantine and Modern Greek Studies, Belmont, Massachusetts., 1981., pp. 154-187] </blockquote><BR>';
