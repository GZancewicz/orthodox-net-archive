	<HEAD>
	Questions about St. Thomas Sunday
	<SCRIPT>
	var q = new Object();
	var a = new Object();
	<!-- Question 0 -->
q[0]='<BR>When is the Sunday of St. Thomas?  Why?  On the Sunday of St. Thomas, two hymns normally sung in Sunday matins are not sung.  What are these hymns?  Why are they not sung?  <BR><BR>';

<!-- Question 1 -->
q[1]='<BR>A Hymn normally sung once in Sunday matins is sung three times, in the matins for St. Thomas Sunday, and until when?  What is the hymn?  <BR><BR>';

<!-- Question 2 -->
q[2]='<BR>How many days after the resurrection were required for Thomas to believe?  Why did he not originally <BR>believe?  <BR><BR>';

<!-- Question 3 -->
q[3]='<BR>How does the Holy Spirit, through the services characterize Thomas\' unbelief?  <BR><BR>';

<!-- Question 4 -->
q[4]='<BR>What strident words did the Holy Apostle Thomas say, which were quite similar to the Holy Apostle <BR>Peter\'s just before the Passion Week of our Savior?  Were these words shown to be sincere?  <BR><BR>';

<!-- Question 5 -->
q[5]='<BR>"And after eight days again his disciples were within, and Thomas with them: then came Jesus, the doors being shut, and stood in the midst ...  Then saith he to Thomas ...  and be not faithless, but believing.<BR>And Thomas answered and said unto him, My Lord and my God."  \(John 20:26-27 \(parts\), 20:28\)<BR><BR>What is the theological meaning of St. Thomas\' expression of worship?  <BR><BR>';

<!-- Question 6 -->
q[6]='<BR>How many times had the apostles as a group seen the risen Lord before St. Thomas saw Him and believed?  <BR><BR>';

<!-- Question 7 -->
q[7]='<BR>What important priestly charism was given by Christ when He came to the upper room the first time He saw the apostles?  <BR><BR>';

<!-- Question 8 -->
q[8]='<BR>What far away land did St. Thomas spread the Gospel to, where he met his end as a martyr?  <BR>';

<!-- Question 9 -->
q[9]='<BR>What is unique about how the church reads the story of the doubting of Thomas?  <BR><BR>';


	<!-- Answer   0 -->
a[0]=' St Thomas Sunday is the Second Sunday of Pascha, or, said another way, the first Sunday after the Sunday of Pascha.   <P> The Gospel text for the day gives a clue as to why the celebration is at this time: <P><i> "Then the same day at evening, being the first day of the week, when the doors were shut where the disciples were assembled for fear of the Jews, came Jesus and stood in the midst, and saith unto them, Peace be unto you."  \(John 20:19\) <P> "But Thomas, one of the twelve, called Didymus, was not with them when Jesus came.  The other disciples therefore said unto him, We have seen the Lord.  But he said unto them, Except I shall see in his hands the print of the nails, and put my finger into the print of the nails, and thrust my hand into his side, I will not believe."  \(John 20:24-26\) <P> And after eight days again his disciples were within, and Thomas with them: then came Jesus, the doors being shut, and stood in the midst, and said, Peace be unto you.  ...  " \(John 20:27\) </i> <P> On the Sunday of St. Thomas, the <STRONG><i>Resurrectional Evlogitaria</STRONG></i> sung before the Hymns of ascent which precede the Gospel, and immediately after either the Polyeleos or 118th psalm in normal times\) are not sung, and neither is the <STRONG><i>"Magnificat"</STRONG></i> \("My soul magnifies the Lord...", which is usually sung between the eighth and ninth ode of the matins canon\).  These hymns are omitted because the feast of St. Thomas Sunday is a <STRONG><i>"Feast of the Lord"</STRONG></i>, and it supersedes EVERYTHING from the normal Resurrectional service, just as Nativity, or another feast of the Lord would.  <BR>';

<!-- Answer   1 -->
a[1]=' "Having beheld the resurrection" \(certainly very familiar to everyone who has sung the Paschal Hours in lieu of morning prayers during Bright week, since it is also sung three times then\), is normally sung once in Sunday matins, just after the Gospel is read.  During the Paschal season, until and including the  Sunday preceding Ascension Thursday, it is sung three times.  <BR>';

<!-- Answer   2 -->
a[2]=' According to the Gospel of St. John, Jesus appeared unto the Apostles the first time on the evening of  Pascha, with Thomas being absent, then the second time eight days later, with him being present.  He  originally did not believe because of the incredible reality of the resurrection.  He needed to see the  evidence. <BR> ';

<!-- Answer   3 -->
a[3]=' The church characterizes St. Thomas\' unbelief as "good", because it led to a greater manifestation of the reality of Christ\'s resurrection in the flesh:  <BR><BR> "As the disciples were in doubt, / the Savior came on the eighth day / to where they were gathered and granted them peace, / and cried unto Thomas: / Come, O Apostle, and feel the palms in which they fastened the nails.  / O good unbelief of Thomas, / which hath led the hearts of the faithful to knowledge!  / Hence, he cried out with fear: // O my Lord and my God, glory be to Thee."  \(Sticheron from Lord I have cried, vespers for St. Thomas Sunday\) <BR>';

<!-- Answer   4 -->
a[4]=' Just before Jesus went to Bethany to raise Lazarus, which preceded His passion week by only a little, St.   John recounts in his Gospel:  <BR> "Then said Thomas, which is called Didymus, unto his fellow disciples, Let us also go, that we may die  with him."  \(John 11:16\). <BR> This sentiment was also expressed by the Holy Apostle Peter during the passion week:  <BR> "Simon Peter said unto him, Lord, whither goest thou?  Jesus answered him, Whither I go, thou canst not  follow me now; but thou shalt follow me afterwards.  Peter said unto him, Lord, why cannot I follow thee now?  I will lay down my life for thy sake.  Jesus answered him, Wilt thou lay down thy life for my sake?  Verily, verily, I say unto thee, The cock shall not crow, till thou hast denied me thrice."  \(John 13:36-38\) <BR><BR> St. John Chrysostom also states quite clearly the magnificent transformation of Thomas, and his great courage:  <BR> \'Now they all feared the attacks of the Jews, but Thomas above the rest; wherefore also he said,  Ver.  16.  "Let us go, that we also may die with Him."  Some say that he desired himself to die; but it is not so; the expression is rather one of cowardice.  Yet he was not rebuked, for Christ as yet supported his weakness, but afterwards he became stronger than all, and invincible.  \(6\) For the wonderful thing is this; that we see one who was so weak before the Crucifixion, become after the Crucifixion, and after having believed in the Resurrection, more zealous than any.  So great was the power of Christ.  The very man who dared not go in company with Christ to Bethany, the same while not seeing Christ ran \(7\) well nigh through the inhabited world, and dwelt in the midst of nations that were full of murder, and desirous to kill him.\'  \(St. John Chrysostom, sermon on St. John\'s Gospel, verse 21:12\)<BR>';

<!-- Answer   5 -->
a[5]=' An Old Believer Sermon, based mostly on the writings of St. John Chrysostom and Blessed Archbishop Theofylact of Bulgaria, among others, explains that the expression "My Lord and my God" indicates the dual nature of Christ.  As a man, He is called Lord, as an earthly king might be, and also is God.   <P> The Aposticha for the Vespers service echoes this idea:  <P>  "O strange wonder, / unbelief hath given birth unto steadfast faith!  / For Thomas said: / Unless I see, I shall not believe.  / And when he touched the side of Christ, / he spake with divine authority / concerning the Incarnate One Who is the very Son of God, / and recognized Him as the One Who suffered in the flesh.  / He proclaimed the Risen God, and cried with a radiant voice: // O my Lord and my God, glory be to Thee".   <P> When Thomas proclaimed "My Lord and My God", he was saying something wholly unique, never said before.  This was the first time Jesus was explicitly called God by one of His disciples. ';

<!-- Answer   6 -->
a[6]=' Jesus appeared to all the apostles save Thomas on the eve of the day of the Resurrection - Sunday evening.  He did not appear again unto them until eight days later, when Thomas was with them.   <BR><BR> "Then the same day at evening, being the first day of the week, when the doors were shut where the disciples were assembled for fear of the Jews, came Jesus and stood in the midst ...  But Thomas, one of the twelve, called Didymus, was not with them when Jesus came.  And after eight days again his disciples were within, and Thomas with them: then came Jesus, the doors being shut, and stood in the midst..." \(John 20:19a, 24,26a\)<BR>';

<!-- Answer   7 -->
a[7]=' Jesus gave the apostles, and whom they would appoint, and their successors, down through the ages, the authority to bind and loose sins.  A priest \(or bishop, of course\), usually exercises this authority and responsibility in the sacrament of confession.   <P> "Then the same day at evening, being the first day of the week, when the doors were shut where the disciples were assembled for fear of the Jews, came Jesus and stood in the midst, and saith unto them, Peace be unto you.  ...  Then said Jesus to them again, Peace be unto you: as my Father hath sent me, even so send I you.  And when he had said this, he breathed on them, and saith unto them, Receive ye the Holy Ghost: Whosoever sins ye remit, they are remitted unto them; and whose soever sins ye retain, they are retained."  \(John 20:19,21-23\)<BR>';

<!-- Answer   8 -->
a[8]=' The Holy Apostle Thomas spread the gospel to India, where he courageously met his end, being run through with five lances.<BR>';

<!-- Answer   9 -->
a[9]=' On the day of Pascha, a portion of the story of the doubting of Thomas is read during Vespers.  This Gospel is usually read in many languages, often in three short sections.  The next week, on St. Thomas Sunday, the entire selection read during vespers is read again, and the story is finished, during the Divine Liturgy.  This is the only time when a part of a gospel is read one week, then the reading is completed the next week.  It is also not common to read a gospel selection in daily vespers.  <BR> ';
